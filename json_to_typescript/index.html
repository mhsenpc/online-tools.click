<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to TypeScript Interface Generator | online-tools.click</title>
    <meta name="description" content="Free, fast, and secure online JSON to TypeScript interface generator. Convert JSON objects to TypeScript interfaces with nested object support.">

    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
        }
        .dark {
            --bg-card: #111827;
            --text-main: #f9fafb;
        }

        body { transition: background-color 0.2s, color 0.2s; }

        .input-area {
            @apply w-full h-64 bg-white dark:bg-gray-900 border-2 border-gray-200 dark:border-gray-800 rounded-xl p-4 text-sm font-mono outline-none focus:border-blue-500 transition-all overflow-y-auto;
        }

        .output-area {
            @apply w-full h-64 bg-white dark:bg-gray-900 border-2 border-gray-200 dark:border-gray-800 rounded-xl p-4 text-sm font-mono outline-none focus:border-blue-500 transition-all overflow-y-auto;
        }
    </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GHGXLWQR4V"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-GHGXLWQR4V');
  </script>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans overflow-y-auto">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="text-center mb-10">
            <div class="mb-4">
                <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider hover:opacity-80 transition-opacity">
                    online-tools.click
                </a>
            </div>
            <h1 class="text-4xl font-bold mb-2 tracking-tight">JSON to TypeScript Interface Generator</h1>
            <p class="text-gray-500 dark:text-gray-400 text-lg">Convert JSON objects to TypeScript interfaces instantly.</p>
        </header>

        <main class="space-y-6">
            <!-- Options -->
            <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 shadow-sm">
                <div class="flex flex-wrap gap-6 items-center">
                    <div class="flex items-center gap-3">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="opt-readonly" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                            <span class="text-sm group-hover:text-blue-500 transition-colors">Make properties readonly</span>
                        </label>
                    </div>
                    <div class="flex items-center gap-3">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="opt-optional" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                            <span class="text-sm group-hover:text-blue-500 transition-colors">Make all properties optional</span>
                        </label>
                    </div>
                    <div class="flex items-center gap-3">
                        <label for="interface-name" class="text-sm font-bold uppercase tracking-widest text-gray-400">Interface Name</label>
                        <input type="text" id="interface-name" value="MyInterface" class="bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-lg px-3 py-1 text-sm outline-none transition-all w-40">
                    </div>
                </div>
            </div>

            <!-- Converter -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Input -->
                <div class="space-y-3">
                    <div class="flex items-center justify-between px-2">
                        <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400">JSON Input</h2>
                        <div class="flex gap-2">
                            <button id="btn-sample" class="text-xs font-bold text-blue-500 hover:text-blue-600 uppercase tracking-tighter transition-colors">Load Sample</button>
                            <button id="btn-clear" class="text-xs font-bold text-red-500 hover:text-red-600 uppercase tracking-tighter transition-colors">Clear</button>
                        </div>
                    </div>
                    <textarea id="json-input" class="input-area" placeholder='Paste your JSON here...
{
  "name": "John",
  "age": 30,
  "isActive": true
}'></textarea>
                </div>

                <!-- Output -->
                <div class="space-y-3">
                    <div class="flex items-center justify-between px-2">
                        <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400">TypeScript Interface</h2>
                        <button id="btn-copy" class="text-xs font-bold text-blue-500 hover:text-blue-600 uppercase tracking-tighter transition-colors">Copy to Clipboard</button>
                    </div>
                    <div id="ts-output" class="output-area" contenteditable="false"></div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex justify-center">
                <button id="btn-convert" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg shadow-blue-500/20 transition-all active:scale-95">
                    Convert to TypeScript
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="mt-16 text-center text-xs text-gray-400 dark:text-gray-600 border-t border-gray-200 dark:border-gray-800 pt-8 space-y-4">
            <p>🔒 100% Client-Side: Your JSON stays in the browser. No tracking or logging.</p>
            <div class="flex justify-center gap-4">
                <button onclick="document.documentElement.classList.toggle('dark')" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-tighter">Toggle Theme</button>
                <span>&bull;</span>
                <a href="https://online-tools.click" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-tighter">Utility Hub</a>
            </div>
        </footer>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-2 bg-gray-900 text-white text-sm font-medium rounded-full shadow-2xl opacity-0 translate-y-10 pointer-events-none transition-all duration-300 z-50">
        Copied to clipboard!
    </div>

    <script>
        const jsonInput = document.getElementById('json-input');
        const tsOutput = document.getElementById('ts-output');
        const btnConvert = document.getElementById('btn-convert');
        const btnCopy = document.getElementById('btn-copy');
        const btnSample = document.getElementById('btn-sample');
        const btnClear = document.getElementById('btn-clear');
        const optReadonly = document.getElementById('opt-readonly');
        const optOptional = document.getElementById('opt-optional');
        const interfaceName = document.getElementById('interface-name');
        const toast = document.getElementById('toast');

        // Sample JSON data
        const sampleJson = {
            "user": {
                "id": 123,
                "name": "John Doe",
                "email": "john@example.com",
                "isActive": true,
                "roles": ["admin", "user"],
                "profile": {
                    "avatar": "https://example.com/avatar.jpg",
                    "bio": "Software developer",
                    "settings": {
                        "theme": "dark",
                        "notifications": true
                    }
                },
                "metadata": null
            },
            "timestamp": "2024-01-15T10:30:00Z",
            "count": 42
        };

        // TypeScript type mapping
        function getType(value, key = '') {
            if (value === null) return 'null';
            if (typeof value === 'string') return 'string';
            if (typeof value === 'number') return 'number';
            if (typeof value === 'boolean') return 'boolean';
            if (Array.isArray(value)) {
                if (value.length === 0) return 'any[]';
                const arrayType = getType(value[0], key.slice(0, -1)); // Remove 's' from plural keys
                return `${arrayType}[]`;
            }
            if (typeof value === 'object') return 'object';
            return 'any';
        }

        // Convert JSON object to TypeScript interface
        function jsonToInterface(obj, name = 'MyInterface', indent = 0) {
            if (obj === null || typeof obj !== 'object') {
                return '';
            }

            const indentStr = '  '.repeat(indent);
            const readonly = optReadonly.checked ? 'readonly ' : '';
            const optional = optOptional.checked ? '?' : '';

            let interface = `${indentStr}interface ${name} {\n`;

            for (const key of Object.keys(obj)) {
                const value = obj[key];
                const type = getType(value, key);

                // Format property name (handle special characters)
                const propertyName = /^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(key) ? key : `"${key}"`;

                if (type === 'object') {
                    // Generate nested interface
                    const nestedName = capitalizeFirstLetter(key);
                    const nestedInterface = jsonToInterface(value, nestedName, indent);
                    interface = nestedInterface + interface;
                    interface += `${indentStr}  ${readonly}${propertyName}${optional}: ${nestedName};\n`;
                } else {
                    interface += `${indentStr}  ${readonly}${propertyName}${optional}: ${type};\n`;
                }
            }

            interface += `${indentStr}}\n`;
            return interface;
        }

        function capitalizeFirstLetter(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function convert() {
            const jsonStr = jsonInput.value.trim();
            if (!jsonStr) {
                tsOutput.value = '';
                return;
            }

            try {
                const jsonObj = JSON.parse(jsonStr);
                const name = interfaceName.value || 'MyInterface';
                const tsInterface = jsonToInterface(jsonObj, name);
                tsOutput.value = tsInterface.trim();
            } catch (error) {
                tsOutput.value = `Error: Invalid JSON\n\n${error.message}`;
            }
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-10'), 2000);
        }

        // Event listeners
        btnConvert.onclick = convert;

        btnCopy.onclick = () => {
            const text = tsOutput.value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copied to clipboard!');
            });
        };

        btnSample.onclick = () => {
            jsonInput.value = JSON.stringify(sampleJson, null, 2);
            convert();
        };

        btnClear.onclick = () => {
            jsonInput.value = '';
            tsOutput.value = '';
        };

        // Auto-convert on interface name change
        interfaceName.onkeyup = (e) => {
            if (jsonInput.value.trim()) {
                convert();
            }
        };

        // Auto-convert on option change
        optReadonly.onchange = () => {
            if (jsonInput.value.trim()) {
                convert();
            }
        };

        optOptional.onchange = () => {
            if (jsonInput.value.trim()) {
                convert();
            }
        };

        // Init Theme
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
