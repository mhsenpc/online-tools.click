<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Debugger | online-tools.click</title>
    <meta name="description" content="Free, secure, and fast online JWT debugger. Decode JSON Web Tokens instantly with syntax highlighting, security warnings, and expiration checks. 100% private.">

    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],

        }
    </script>

    <style>
        :root {
            --bg-editor: #ffffff;
            --text-editor: #1a1a1a;
            --border-editor: #e5e7eb;
            --line-num-bg: #f9fafb;
            --line-num-text: #9ca3af;
        }
        .dark {
            --bg-editor: #0d1117;
            --text-editor: #c9d1d9;
            --border-editor: #30363d;
            --line-num-bg: #0d1117;
            --line-num-text: #484f58;
        }

        body { transition: background-color 0.2s, color 0.2s; }

        .editor-textarea {
            background-color: var(--bg-editor);
            color: var(--text-editor);
            caret-color: #3b82f6;
            resize: none;
            outline: none;
            border-color: var(--border-editor);
        }

        /* JSON Syntax Highlighting */
        .json-key { color: #0550ae; }
        .dark .json-key { color: #79c0ff; }
        .json-string { color: #0a3069; }
        .dark .json-string { color: #a5d6ff; }
        .json-number { color: #0550ae; }
        .dark .json-number { color: #79c0ff; }
        .json-boolean { color: #0550ae; }
        .dark .json-boolean { color: #79c0ff; }
        .json-null { color: #6e7781; }
        .dark .json-null { color: #8b949e; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #30363d; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        /* Status indicators */
        .status-valid { background-color: #dcfce7; color: #166534; }
        .dark .status-valid { background-color: rgba(22, 101, 52, 0.3); color: #4ade80; }

        .status-warning { background-color: #fef3c7; color: #92400e; }
        .dark .status-warning { background-color: rgba(146, 64, 14, 0.3); color: #fbbf24; }

        .status-error { background-color: #fee2e2; color: #991b1b; }
        .dark .status-error { background-color: rgba(153, 27, 27, 0.3); color: #f87171; }

        /* Security alerts */
        .security-alert {
            border-left: 4px solid;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
        }
        .security-alert.critical {
            border-color: #ef4444;
            background-color: #fee2e2;
        }
        .dark .security-alert.critical {
            background-color: rgba(239, 68, 68, 0.1);
        }
        .security-alert.warning {
            border-color: #f59e0b;
            background-color: #fef3c7;
        }
        .dark .security-alert.warning {
            background-color: rgba(245, 158, 11, 0.1);
        }
    </style>

<body class="h-full overflow-hidden bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans">

    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-3 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 z-20 relative">
        <div class="flex items-center gap-4">
            <span class="text-2xl">🔐</span>
            <div>
                <h1 class="text-xl font-bold text-gray-900 dark:text-white">JWT Debugger</h1>
                <p class="text-xs text-gray-500 dark:text-gray-400">Privacy-focused • Auto-decodes instantly • 100% client-side</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" aria-label="Toggle theme">
                <svg class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
                <svg class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
            </button>
            <a href="/" class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                ← Back to Tools
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-hidden">
        <div class="flex flex-col lg:flex-row h-full">

            <!-- Left Panel - Input -->
            <div class="w-full lg:w-1/2 flex flex-col border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900">
                <!-- Input Header -->
                <div class="flex items-center justify-between px-4 py-2 border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50">
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-medium text-gray-700 dark:text-gray-300">JWT Token</span>
                        <div id="token-status" class="hidden px-2 py-0.5 text-xs font-medium rounded-full status-valid"></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="load-example" class="text-xs text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200 transition-colors">
                            Load Example
                        </button>
                        <button id="clear-input" class="text-xs text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200 transition-colors">
                            Clear
                        </button>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="flex-1 relative">
                    <textarea
                        id="jwt-input"
                        class="editor-textarea w-full h-full p-4 font-mono text-sm border-0 rounded-none focus:ring-0"
                        placeholder="Paste your JWT token here to auto-decode...

Example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
                        spellcheck="false"></textarea>
                </div>

                <!-- Error Display -->
                <div id="error-container" class="hidden px-4 py-3 bg-red-50 dark:bg-red-900/20 border-t border-red-200 dark:border-red-800">
                    <div class="flex items-start gap-2">
                        <svg class="w-5 h-5 text-red-600 dark:text-red-400 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                        </svg>
                        <div class="flex-1">
                            <p id="error-message" class="text-sm text-red-800 dark:text-red-200 font-medium"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Output -->
            <div class="w-full lg:w-1/2 flex flex-col overflow-hidden bg-gray-50 dark:bg-gray-950">

                <!-- Security Alerts -->
                <div id="security-alerts" class="p-4 space-y-2 border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-900/50">
                    <h3 class="text-xs font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wide mb-2">Security Analysis</h3>
                    <div id="alerts-container" class="text-sm text-gray-600 dark:text-gray-400">
                        <p class="text-gray-500 dark:text-gray-500 italic">Enter a JWT token to see security analysis...</p>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="flex border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900">
                    <button class="jwt-tab active px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 border-b-2 border-blue-500" data-tab="header">
                        Header
                    </button>
                    <button class="jwt-tab px-4 py-2 text-sm font-medium text-gray-500 dark:text-gray-400 border-b-2 border-transparent hover:text-gray-700 dark:hover:text-gray-200" data-tab="payload">
                        Payload
                    </button>
                    <button class="jwt-tab px-4 py-2 text-sm font-medium text-gray-500 dark:text-gray-400 border-b-2 border-transparent hover:text-gray-700 dark:hover:text-gray-200" data-tab="signature">
                        Signature
                    </button>
                </div>

                <!-- Tab Content -->
                <div class="flex-1 overflow-hidden">
                    <!-- Header Tab -->
                    <div id="tab-header" class="jwt-tab-content h-full">
                        <div class="h-full overflow-auto p-4">
                            <pre id="header-output" class="text-sm font-mono whitespace-pre-wrap break-words">Header content will appear here...</pre>
                        </div>
                    </div>

                    <!-- Payload Tab -->
                    <div id="tab-payload" class="jwt-tab-content hidden h-full">
                        <div class="h-full overflow-auto p-4">
                            <pre id="payload-output" class="text-sm font-mono whitespace-pre-wrap break-words">Payload content will appear here...</pre>
                        </div>
                    </div>

                    <!-- Signature Tab -->
                    <div id="tab-signature" class="jwt-tab-content hidden h-full">
                        <div class="h-full overflow-auto p-4">
                            <div id="signature-output" class="text-sm font-mono whitespace-pre-wrap break-words">Signature information will appear here...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // JWT Debugger Implementation
        (function() {
            'use strict';

            // DOM Elements
            const jwtInput = document.getElementById('jwt-input');
            const headerOutput = document.getElementById('header-output');
            const payloadOutput = document.getElementById('payload-output');
            const signatureOutput = document.getElementById('signature-output');
            const errorContainer = document.getElementById('error-container');
            const errorMessage = document.getElementById('error-message');
            const tokenStatus = document.getElementById('token-status');
            const alertsContainer = document.getElementById('alerts-container');
            const themeToggle = document.getElementById('theme-toggle');
            const clearBtn = document.getElementById('clear-input');
            const loadExampleBtn = document.getElementById('load-example');
            const tabs = document.querySelectorAll('.jwt-tab');
            const tabContents = document.querySelectorAll('.jwt-tab-content');

            // Theme handling
            function initTheme() {
                const isDark = localStorage.getItem('theme') === 'dark' ||
                               (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (isDark) {
                    document.documentElement.classList.add('dark');
                }
            }

            themeToggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            });

            // Tab handling
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetTab = tab.dataset.tab;

                    tabs.forEach(t => {
                        t.classList.remove('active', 'border-blue-500', 'text-gray-700', 'dark:text-gray-300');
                        t.classList.add('border-transparent', 'text-gray-500', 'dark:text-gray-400');
                    });

                    tab.classList.add('active', 'border-blue-500', 'text-gray-700', 'dark:text-gray-300');
                    tab.classList.remove('border-transparent', 'text-gray-500', 'dark:text-gray-400');

                    tabContents.forEach(content => {
                        content.classList.add('hidden');
                    });

                    document.getElementById(`tab-${targetTab}`).classList.remove('hidden');
                });
            });

            // JWT Decoding functions
            function base64UrlDecode(str) {
                str = str.replace(/-/g, '+').replace(/_/g, '/');
                while (str.length % 4) str += '=';
                try {
                    return decodeURIComponent(atob(str).split('').map(c => {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                } catch (e) {
                    return atob(str);
                }
            }

            function formatJSON(obj) {
                return JSON.stringify(obj, null, 2);
            }

            function syntaxHighlight(json) {
                if (typeof json !== 'string') {
                    json = JSON.stringify(json, null, 2);
                }
                return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                    let cls = 'json-number';
                    if (/^"/.test(match)) {
                        if (/:$/.test(match)) {
                            cls = 'json-key';
                        } else {
                            cls = 'json-string';
                        }
                    } else if (/true|false/.test(match)) {
                        cls = 'json-boolean';
                    } else if (/null/.test(match)) {
                        cls = 'json-null';
                    }
                    return '<span class="' + cls + '">' + match + '</span>';
                });
            }

            function formatDate(timestamp) {
                const date = new Date(timestamp * 1000);
                return date.toLocaleString();
            }

            function getTimeUntil(timestamp) {
                const now = Math.floor(Date.now() / 1000);
                const diff = timestamp - now;

                if (diff < 0) {
                    return `expired ${Math.abs(Math.floor(diff / 60))} minutes ago`;
                }

                const minutes = Math.floor(diff / 60);
                const hours = Math.floor(minutes / 60);
                const days = Math.floor(hours / 24);

                if (days > 0) return `expires in ${days} day${days > 1 ? 's' : ''}`;
                if (hours > 0) return `expires in ${hours} hour${hours > 1 ? 's' : ''}`;
                if (minutes > 0) return `expires in ${minutes} minute${minutes > 1 ? 's' : ''}`;
                return 'expires in less than a minute';
            }

            function analyzeSecurity(header, payload) {
                const alerts = [];

                // Check algorithm
                if (header.alg) {
                    if (header.alg === 'none') {
                        alerts.push({
                            severity: 'critical',
                            title: '⚠️ Critical: Insecure Algorithm',
                            message: 'The "none" algorithm is insecure and should never be used in production.'
                        });
                    } else if (!['HS256', 'HS384', 'HS512', 'RS256', 'RS384', 'RS512', 'ES256', 'ES384', 'ES512'].includes(header.alg)) {
                        alerts.push({
                            severity: 'warning',
                            title: '⚡ Warning: Unusual Algorithm',
                            message: `Algorithm "${header.alg}" is not commonly used. Verify this is intended.`
                        });
                    }
                }

                // Check expiration
                if (payload.exp) {
                    const now = Math.floor(Date.now() / 1000);
                    if (payload.exp < now) {
                        alerts.push({
                            severity: 'critical',
                            title: '⚠️ Critical: Token Expired',
                            message: `This token expired on ${formatDate(payload.exp)} (${getTimeUntil(payload.exp)}).`
                        });
                    } else {
                        const timeUntil = getTimeUntil(payload.exp);
                        alerts.push({
                            severity: 'warning',
                            title: '⏰ Token Expiration',
                            message: `This token ${timeUntil} (${formatDate(payload.exp)}).`
                        });
                    }
                }

                // Check not before
                if (payload.nbf) {
                    const now = Math.floor(Date.now() / 1000);
                    if (payload.nbf > now) {
                        alerts.push({
                            severity: 'warning',
                            title: '⏰ Token Not Yet Valid',
                            message: `This token is not valid until ${formatDate(payload.nbf)}.`
                        });
                    }
                }

                // Check issued at
                if (payload.iat) {
                    const now = Math.floor(Date.now() / 1000);
                    const issuedAgo = now - payload.iat;
                    const hoursAgo = Math.floor(issuedAgo / 3600);

                    if (hoursAgo > 24) {
                        alerts.push({
                            severity: 'info',
                            title: 'ℹ️ Token Age',
                            message: `This token was issued ${hoursAgo} hour${hoursAgo > 1 ? 's' : ''} ago.`
                        });
                    }
                }

                return alerts;
            }

            function displayAlerts(alerts) {
                if (alerts.length === 0) {
                    alertsContainer.innerHTML = '<p class="text-gray-500 dark:text-gray-500 italic">No security concerns detected.</p>';
                    return;
                }

                const html = alerts.map(alert => {
                    const alertClass = alert.severity === 'critical' ? 'critical' :
                                      alert.severity === 'warning' ? 'warning' : 'info';
                    return `
                        <div class="security-alert ${alertClass}">
                            <div class="font-medium">${alert.title}</div>
                            <div class="text-sm mt-1">${alert.message}</div>
                        </div>
                    `;
                }).join('');

                alertsContainer.innerHTML = html;
            }

            function decodeJWT(token) {
                try {
                    // Clean input
                    token = token.trim();

                    if (!token) {
                        clearOutput();
                        return;
                    }

                    // Validate JWT format
                    const parts = token.split('.');
                    if (parts.length !== 3) {
                        throw new Error('Invalid JWT format. A JWT must have exactly 3 parts separated by dots.');
                    }

                    // Decode header
                    const headerData = base64UrlDecode(parts[0]);
                    const header = JSON.parse(headerData);

                    // Decode payload
                    const payloadData = base64UrlDecode(parts[1]);
                    const payload = JSON.parse(payloadData);

                    // Get signature
                    const signature = parts[2];

                    // Display results
                    headerOutput.innerHTML = syntaxHighlight(formatJSON(header));
                    payloadOutput.innerHTML = syntaxHighlight(formatJSON(payload));
                    signatureOutput.textContent = signature;

                    // Show success status
                    tokenStatus.textContent = 'Valid JWT';
                    tokenStatus.classList.remove('hidden', 'status-warning', 'status-error');
                    tokenStatus.classList.add('status-valid');

                    // Hide error
                    errorContainer.classList.add('hidden');

                    // Security analysis
                    const alerts = analyzeSecurity(header, payload);
                    displayAlerts(alerts);

                } catch (error) {
                    showError(error.message);
                }
            }

            function showError(message) {
                errorMessage.textContent = message;
                errorContainer.classList.remove('hidden');

                tokenStatus.textContent = 'Invalid JWT';
                tokenStatus.classList.remove('status-valid');
                tokenStatus.classList.add('status-error');

                // Clear outputs
                headerOutput.textContent = 'Header content will appear here...';
                payloadOutput.textContent = 'Payload content will appear here...';
                signatureOutput.textContent = 'Signature information will appear here...';

                alertsContainer.innerHTML = '<p class="text-gray-500 dark:text-gray-500 italic">Enter a valid JWT token to see security analysis...</p>';
            }

            function clearOutput() {
                headerOutput.textContent = 'Header content will appear here...';
                payloadOutput.textContent = 'Payload content will appear here...';
                signatureOutput.textContent = 'Signature information will appear here...';
                tokenStatus.classList.add('hidden');
                errorContainer.classList.add('hidden');
                alertsContainer.innerHTML = '<p class="text-gray-500 dark:text-gray-500 italic">Enter a JWT token to see security analysis...</p>';
            }

            // Event listeners
            jwtInput.addEventListener('input', () => {
                const token = jwtInput.value.trim();
                if (token) {
                    decodeJWT(token);
                } else {
                    clearOutput();
                }
            });

            clearBtn.addEventListener('click', () => {
                jwtInput.value = '';
                clearOutput();
            });

            loadExampleBtn.addEventListener('click', () => {
                const exampleJWT = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyLCJleHAiOjE3MzAwNjQwMDB9.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c';
                jwtInput.value = exampleJWT;
                decodeJWT(exampleJWT);
            });

            // Initialize
            initTheme();
        })();
    </script>
