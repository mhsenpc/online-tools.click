<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Query Formatter (Advanced Dialects) | Online Tools</title>
    <meta name="description" content="Free, client-side SQL query formatter with advanced dialect support. Format queries for T-SQL, BigQuery, Snowflake, and more with keyword-case control.">
    <meta property="og:title" content="SQL Query Formatter (Advanced Dialects) | Online Tools">
    <meta property="og:description" content="Format SQL queries with dialect-specific support, keyword-case control, and advanced indentation options.">
    <meta property="og:url" content="https://online-tools.click/sql_formatter_advanced/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://online-tools.click/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SQL Query Formatter (Advanced Dialects) | Online Tools">
    <meta name="twitter:description" content="Format SQL queries with dialect-specific support and keyword-case control.">
    <meta name="twitter:image" content="https://online-tools.click/og-image.png">
    <link rel="canonical" href="https://online-tools.click/sql_formatter_advanced/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --keyword: #ff79c6;
            --string: #f1fa8c;
            --number: #bd93f9;
            --comment: #6272a4;
            --function: #50fa7b;
            --operator: #ff79c6;
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
            --success: #22c55e;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
            --space-section: 112px;
            --space-group: 64px;
            --space-element: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 48px 32px;
        }

        header {
            text-align: center;
            margin-bottom: var(--space-section);
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        .workspace {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: var(--space-group);
            margin-bottom: var(--space-section);
        }

        .sidebar {
            background: var(--bg-elevated);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--border);
            height: fit-content;
            position: sticky;
            top: 24px;
        }

        .settings-group {
            margin-bottom: var(--space-element);
        }

        .settings-group:last-child {
            margin-bottom: 0;
        }

        .settings-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            display: block;
        }

        .settings-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }

        .radio-option:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .radio-option input[type="radio"] {
            cursor: pointer;
        }

        .radio-option label {
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
        }

        select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            outline: none;
            border-color: var(--border-focus);
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: var(--space-element);
        }

        .editor-section {
            background: var(--bg-elevated);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .editor-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-focus);
            color: var(--text);
        }

        .editor-content {
            position: relative;
            height: 400px;
        }

        textarea {
            width: 100%;
            height: 100%;
            padding: 20px;
            background: var(--bg-input);
            border: none;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            resize: none;
        }

        textarea:focus {
            outline: none;
        }

        .output-section {
            background: var(--bg-elevated);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .output-content {
            padding: 20px;
            background: var(--bg-input);
            min-height: 400px;
            max-height: 600px;
            overflow: auto;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            white-space: pre;
        }

        .output-content .keyword { color: var(--keyword); }
        .output-content .string { color: var(--string); }
        .output-content .number { color: var(--number); }
        .output-content .comment { color: var(--comment); }
        .output-content .function { color: var(--function); }
        .output-content .operator { color: var(--operator); }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 14px;
        }

        .error-message {
            display: none;
            background: var(--error-bg);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-bottom: var(--space-element);
            font-size: 14px;
        }

        .error-message.show {
            display: block;
        }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 32px;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }

        .checkbox-option:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .checkbox-option input[type="checkbox"] {
            cursor: pointer;
        }

        .checkbox-option label {
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .dialect-badge {
            display: inline-block;
            padding: 2px 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            margin-left: 8px;
        }

        @media (max-width: 1024px) {
            .workspace {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .editor-content {
                height: 300px;
            }
        }
    </style>
  <script type="module" crossorigin src="/assets/index-BVA3E_Fu.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>SQL Query Formatter <span class="dialect-badge">Advanced Dialects</span></h1>
            <p class="subtitle">Format SQL queries with dialect-specific support for T-SQL, BigQuery, Snowflake, and more. 100% client-side.</p>
        </header>

        <div class="error-message" id="error-message"></div>

        <div class="workspace">
            <aside class="sidebar">
                <div class="settings-group">
                    <span class="settings-label">SQL Dialect</span>
                    <select id="dialect-select">
                        <option value="standard">Standard SQL</option>
                        <option value="tsql">T-SQL (SQL Server)</option>
                        <option value="bigquery">BigQuery</option>
                        <option value="snowflake">Snowflake</option>
                        <option value="postgres">PostgreSQL</option>
                        <option value="mysql">MySQL</option>
                    </select>
                </div>

                <div class="settings-group">
                    <span class="settings-label">Keyword Case</span>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="case-upper" name="keyword-case" value="upper" checked>
                            <label for="case-upper">UPPERCASE</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="case-lower" name="keyword-case" value="lower">
                            <label for="case-lower">lowercase</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="case-camel" name="keyword-case" value="camel">
                            <label for="case-camel">CamelCase</label>
                        </div>
                    </div>
                </div>

                <div class="settings-group">
                    <span class="settings-label">Indentation</span>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="indent-2" name="indent-size" value="2">
                            <label for="indent-2">2 spaces</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="indent-4" name="indent-size" value="4" checked>
                            <label for="indent-4">4 spaces</label>
                        </div>
                    </div>
                </div>

                <div class="settings-group">
                    <span class="settings-label">Options</span>
                    <div class="checkbox-group">
                        <div class="checkbox-option">
                            <input type="checkbox" id="opt-commas" checked>
                            <label for="opt-commas">Comma before column</label>
                        </div>
                        <div class="checkbox-option">
                            <input type="checkbox" id="opt-lines">
                            <label for="opt-lines">Lines between queries</label>
                        </div>
                        <div class="checkbox-option">
                            <input type="checkbox" id="opt-compact" checked>
                            <label for="opt-compact">Compact expressions</label>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="main-content">
                <div class="action-bar">
                    <button class="btn-primary" id="format-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16m-7 6h7" />
                        </svg>
                        Format SQL
                    </button>
                </div>

                <div class="editor-section">
                    <div class="editor-header">
                        <span class="panel-title">Input SQL</span>
                        <div class="editor-actions">
                            <button class="btn-icon" id="clear-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                                Clear
                            </button>
                            <button class="btn-icon" id="sample-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                                Load Sample
                            </button>
                        </div>
                    </div>
                    <div class="editor-content">
                        <textarea id="input-sql" placeholder="Enter your SQL query here..."></textarea>
                    </div>
                </div>

                <div class="output-section">
                    <div class="editor-header">
                        <span class="panel-title">Formatted Output</span>
                        <div class="editor-actions">
                            <button class="btn-icon" id="copy-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                                Copy
                            </button>
                        </div>
                    </div>
                    <div class="output-content" id="output-sql">
                        <div class="empty-state">Formatted SQL will appear here</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

</body>
</html>
