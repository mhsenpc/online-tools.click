<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Optimizer | online-tools.click</title>
    <meta name="description" content="Optimize and minify SVG files locally.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .output-box { @apply bg-gray-50 dark:bg-gray-800 p-4 rounded-xl font-mono text-sm break-all overflow-auto; min-height: 200px; }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider">online-tools.click</a>
            <h1 class="text-3xl font-bold mt-2">SVG Optimizer</h1>
        </header>

        <div class="space-y-6">
            <textarea id="in-svg" class="w-full h-64 bg-white dark:bg-gray-900 rounded-2xl p-4 font-mono text-sm outline-none border border-gray-200 dark:border-gray-800 focus:border-blue-500" placeholder="<svg>...</svg>"></textarea>
            <button id="btn-optimize" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">Optimize SVG</button>
            <div class="output-box" id="output">Optimized code will appear here...</div>
        </div>
    </div>

    <script>
        const inSvg = document.getElementById('in-svg');
        const output = document.getElementById('output');
        const btnOptimize = document.getElementById('btn-optimize');

        btnOptimize.onclick = () => {
            let svg = inSvg.value;
            // Basic minification
            svg = svg.replace(/<!--[\s\S]*?-->/g, ''); // Remove comments
            svg = svg.replace(/\s+/g, ' '); // Collapse whitespace
            svg = svg.replace(/>\s+</g, '><'); // Remove whitespace between tags
            output.innerText = svg.trim();
        };
    </script>
</body>
</html>
