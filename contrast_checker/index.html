<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrast Checker | Online Tools</title>
    <meta name="description" content="Check WCAG contrast ratios between two colors. Ensure your designs meet accessibility standards.">
    <meta property="og:title" content="Contrast Checker | Online Tools">
    <meta property="og:description" content="Check WCAG contrast ratios between two colors. Ensure your designs meet accessibility standards.">
    <meta property="og:url" content="https://online-tools.click/contrast_checker/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://online-tools.click/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Contrast Checker | Online Tools">
    <meta name="twitter:description" content="Check WCAG contrast ratios between two colors. Ensure your designs meet accessibility standards.">
    <meta name="twitter:image" content="https://online-tools.click/og-image.png">
    <link rel="canonical" href="https://online-tools.click/contrast_checker/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --accent: #ff3e00;
            --accent-glow: rgba(255, 62, 0, 0.2);
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; overflow-x: hidden; }
        header { padding: 32px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; text-decoration: none; color: var(--text); }
        .logo-sep { color: var(--text-muted); font-weight: 300; }
        .logo-sub { font-size: 20px; font-weight: 400; color: var(--text-secondary); }
        .header-right a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); transition: all 0.2s; }
        .header-right a:hover { color: var(--text); border-color: var(--border-focus); }
        main { max-width: 960px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 42px; font-weight: 700; letter-spacing: -0.04em; margin-bottom: 12px; }
        .hero p { color: var(--text-secondary); font-size: 18px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; margin-bottom: 24px; }
        .card-header { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 20px; }
        textarea, input[type="text"], input[type="number"], input[type="url"], input[type="password"], input[type="date"], input[type="time"], select {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 12px 16px; color: var(--text); font-family: var(--font-mono); font-size: 14px; outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus, input:focus, select:focus { border-color: var(--accent); }
        textarea { resize: vertical; min-height: 100px; font-family: var(--font-mono); }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px 28px; border-radius: var(--radius-sm);
            font-family: var(--font-sans); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
            display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background: #ff5522; }
        .btn-sm { padding: 8px 16px; font-size: 12px; }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .btn-secondary:hover { background: var(--bg-elevated); color: var(--text); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .flex-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .result-box { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 16px 20px; font-family: var(--font-mono); font-size: 14px; margin-top: 12px; word-break: break-all; }
        .result-box .label { color: var(--text-muted); font-family: var(--font-sans); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .stat-card { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; text-align: center; }
        .stat-card .val { font-size: 24px; font-weight: 700; font-family: var(--font-mono); }
        .stat-card .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
        .field-group { margin-bottom: 16px; }
        .field-group label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 6px; }
        .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 10px 20px; font-size: 13px; color: var(--text); opacity: 0; pointer-events: none;
            transition: opacity 0.2s, transform 0.2s; z-index: 100; }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
        hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        @media (max-width: 768px) {
            header { padding: 20px 20px; }
            .hero h1 { font-size: 28px; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="https://online-tools.click" class="logo">Online Tools</a>
            <span class="logo-sep">/</span>
            <span class="logo-sub">Contrast Checker</span>
        </div>
        <div class="header-right">
            <a href="https://online-tools.click">All Tools</a>
        </div>
    </header>
    <main>
        <section class="hero">
            <h1>Contrast Checker</h1>
            <p>Check WCAG contrast ratios between two colors. Ensure your designs meet accessibility standards.</p>
        </section>
        
<div class="card">
    <div class="card-header">Colors</div>
    <div class="grid-2">
        <div class="field-group"><label>Foreground</label><div class="flex-row"><input type="color" id="fg" value="#ffffff" onchange="syncHex('fg','fghex');check()"><input type="text" id="fghex" value="#ffffff" oninput="syncPicker('fg','fghex');check()" style="flex:1"></div></div>
        <div class="field-group"><label>Background</label><div class="flex-row"><input type="color" id="bg" value="#0f0f0f" onchange="syncHex('bg','bghex');check()"><input type="text" id="bghex" value="#0f0f0f" oninput="syncPicker('bg','bghex');check()" style="flex:1"></div></div>
    </div>
</div>
<div class="card">
    <div class="card-header">Preview</div>
    <div id="preview-box" style="padding:40px;border-radius:var(--radius-md);text-align:center;font-size:24px;font-weight:700">Sample Text</div>
</div>
<div class="card">
    <div class="card-header">Results</div>
    <div id="results"></div>
</div>

    </main>
    <div class="toast" id="toast"></div>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GHGXLWQR4V"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-GHGXLWQR4V');</script>
    <script>
    function toast(msg){
        const t=document.getElementById('toast');t.textContent=msg;t.classList.add('visible');
        setTimeout(()=>t.classList.remove('visible'),2000);
    }
    
function syncHex(id,hexId){document.getElementById(hexId).value=document.getElementById(id).value;}
function syncPicker(id,hexId){document.getElementById(id).value=document.getElementById(hexId).value;}
function luminance(r,g,b){
    const [rs,gs,bs]=[r,g,b].map(c=>{c/=255;return c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);});
    return 0.2126*rs+0.7152*gs+0.0722*bs;
}
function contrastRatio(fg,bg){
    const l1=luminance(...fg),l2=luminance(...bg);
    const lighter=Math.max(l1,l2),darker=Math.min(l1,l2);
    return (lighter+0.05)/(darker+0.05);
}
function hexToRGB(h){
    h=h.replace('#','');
    if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];
}
function check(){
    const fg=hexToRGB(document.getElementById('fghex').value);
    const bg=hexToRGB(document.getElementById('bghex').value);
    const ratio=contrastRatio(fg,bg);
    document.getElementById('preview-box').style.background=document.getElementById('bghex').value;
    document.getElementById('preview-box').style.color=document.getElementById('fghex').value;
    const aaNorm=ratio>=4.5;
    const aaLg=ratio>=3;
    const aaaNorm=ratio>=7;
    const aaaLg=ratio>=4.5;
    document.getElementById('results').innerHTML=
        `<div class="stat-grid">
            <div class="stat-card"><div class="val" style="font-size:28px">${ratio.toFixed(2)}</div><div class="lbl">Contrast Ratio</div></div>
            <div class="stat-card" style="border-color:${aaNorm?'var(--success)':'var(--error)'}"><div class="val" style="font-size:20px;color:${aaNorm?'var(--success)':'var(--error)'}">${aaNorm?'PASS':'FAIL'}</div><div class="lbl">AA Normal (4.5:1)</div></div>
            <div class="stat-card" style="border-color:${aaLg?'var(--success)':'var(--error)'}"><div class="val" style="font-size:20px;color:${aaLg?'var(--success)':'var(--error)'}">${aaLg?'PASS':'FAIL'}</div><div class="lbl">AA Large (3:1)</div></div>
            <div class="stat-card" style="border-color:${aaaNorm?'var(--success)':'var(--error)'}"><div class="val" style="font-size:20px;color:${aaaNorm?'var(--success)':'var(--error)'}">${aaaNorm?'PASS':'FAIL'}</div><div class="lbl">AAA Normal (7:1)</div></div>
        </div>`;
}
check();

    </script>
</body>
</html>
