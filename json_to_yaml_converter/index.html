<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to YAML Converter | Online Tools</title>
    <meta name="description" content="Free, client-side JSON to YAML converter. Advanced configuration mapper with custom indentation, block styles, and key sorting. Optimized for IaC files.">
    <meta property="og:title" content="JSON to YAML Converter | Online Tools">
    <meta property="og:description" content="Convert JSON to YAML with advanced configuration options. Custom indentation, block styles, and key sorting for infrastructure-as-code files.">
    <meta property="og:url" content="https://online-tools.click/json_to_yaml_converter/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://online-tools.click/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="JSON to YAML Converter | Online Tools">
    <meta name="twitter:description" content="Advanced JSON to YAML converter with styling options, key sorting, and indentation control.">
    <meta name="twitter:image" content="https://online-tools.click/og-image.png">
    <link rel="canonical" href="https://online-tools.click/json_to_yaml_converter/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
            --success: #22c55e;
            --success-bg: rgba(34, 197, 94, 0.1);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            padding: 32px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: var(--text);
        }

        .logo-sep {
            color: var(--text-muted);
            font-weight: 300;
        }

        .logo-sub {
            font-size: 20px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .header-right a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .header-right a:hover {
            border-color: var(--text-secondary);
            color: var(--text);
        }

        main {
            padding: 40px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .tool-container {
            display: grid;
            grid-template-columns: 1fr 320px 1fr;
            gap: 32px;
            margin-top: 32px;
        }

        .pane {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-height: 600px;
        }

        .pane-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .pane-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pane-title .icon {
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
            background: var(--border);
            color: var(--text-secondary);
        }

        .status-badge.valid {
            background: var(--success-bg);
            color: var(--success);
        }

        .status-badge.invalid {
            background: var(--error-bg);
            color: var(--error);
        }

        textarea {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--border-focus);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .sidebar {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }

        .option-description {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        select, input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-family: var(--font-sans);
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--border-focus);
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-option:hover {
            border-color: var(--border-focus);
        }

        .radio-option input[type="radio"] {
            cursor: pointer;
        }

        .radio-option label {
            flex: 1;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .radio-option input[type="radio"]:checked + label {
            color: var(--text);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: auto;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            border-color: var(--border-focus);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .copy-feedback {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            pointer-events: none;
        }

        .copy-feedback.show {
            opacity: 1;
            transform: translateY(0);
        }

        .error-message {
            background: var(--error-bg);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }

        @media (max-width: 1200px) {
            .tool-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                order: -1;
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 24px 20px;
            }

            main {
                padding: 24px 20px;
            }

            .tool-container {
                margin-top: 24px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="/" class="logo">Online Tools</a>
            <span class="logo-sep">/</span>
            <span class="logo-sub">JSON to YAML Converter</span>
        </div>
        <div class="header-right">
            <a href="/">Browse Tools</a>
        </div>
    </header>

    <main>
        <div class="tool-container">
            <div class="pane">
                <div class="pane-header">
                    <div class="pane-title">
                        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/>
                        </svg>
                        JSON Input
                    </div>
                    <div class="status-badge" id="jsonStatus">Ready</div>
                </div>
                <textarea id="jsonInput" placeholder="Paste or type your JSON here...

Example:
{
  &quot;name&quot;: &quot;my-app&quot;,
  &quot;version&quot;: &quot;1.0.0&quot;,
  &quot;config&quot;: {
    &quot;port&quot;: 3000,
    &quot;env&quot;: &quot;production&quot;
  }
}"></textarea>
                <div class="error-message" id="jsonError"></div>
                <div class="stats" id="jsonStats"></div>
            </div>

            <div class="sidebar">
                <div class="sidebar-title">Configuration</div>

                <div class="option-group">
                    <div class="option-label">Indentation</div>
                    <div class="option-description">Number of spaces per level</div>
                    <select id="indentation">
                        <option value="2" selected>2 spaces</option>
                        <option value="4">4 spaces</option>
                        <option value="8">8 spaces</option>
                    </select>
                </div>

                <div class="option-group">
                    <div class="option-label">Block Style</div>
                    <div class="option-description">Multi-line string formatting</div>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="styleLiteral" name="blockStyle" value="literal" checked>
                            <label for="styleLiteral">Literal (|)</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="styleFolded" name="blockStyle" value="folded">
                            <label for="styleFolded">Folded (&gt;)</label>
                        </div>
                    </div>
                </div>

                <div class="option-group">
                    <div class="option-label">Key Sorting</div>
                    <div class="option-description">Object key ordering</div>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="sortNone" name="keySort" value="none" checked>
                            <label for="sortNone">Original order</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="sortAlpha" name="keySort" value="alpha">
                            <label for="sortAlpha">Alphabetical</label>
                        </div>
                    </div>
                </div>

                <div class="option-group">
                    <div class="option-label">Line Width</div>
                    <div class="option-description">Max characters per line</div>
                    <select id="lineWidth">
                        <option value="80" selected>80 chars</option>
                        <option value="120">120 chars</option>
                        <option value="0">No limit</option>
                    </select>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-secondary" id="clearBtn">
                        Clear
                    </button>
                    <button class="btn btn-primary" id="convertBtn">
                        Convert
                    </button>
                </div>
            </div>

            <div class="pane">
                <div class="pane-header">
                    <div class="pane-title">
                        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        YAML Output
                    </div>
                    <button class="btn btn-secondary" id="copyBtn" style="padding: 8px 16px; font-size: 12px;">
                        Copy
                    </button>
                </div>
                <textarea id="yamlOutput" readonly placeholder="YAML output will appear here..."></textarea>
                <div class="stats" id="yamlStats"></div>
            </div>
        </div>
    </main>

    <div class="copy-feedback" id="copyFeedback">Copied to clipboard!</div>

    <script>
        // DOM Elements
        const jsonInput = document.getElementById('jsonInput');
        const yamlOutput = document.getElementById('yamlOutput');
        const jsonStatus = document.getElementById('jsonStatus');
        const jsonError = document.getElementById('jsonError');
        const jsonStats = document.getElementById('jsonStats');
        const yamlStats = document.getElementById('yamlStats');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const copyFeedback = document.getElementById('copyFeedback');

        // Configuration elements
        const indentSelect = document.getElementById('indentation');
        const lineWidthSelect = document.getElementById('lineWidth');

        // State
        let currentJSON = null;
        let currentYAML = '';

        // JSON to YAML conversion
        function jsonToYAML(obj, indent = 0, options = {}) {
            const { indentSpaces = 2, blockStyle = 'literal', sortKeys = 'none', lineWidth = 80 } = options;
            const spaces = ' '.repeat(indent * indentSpaces);
            let result = '';

            if (obj === null) {
                return 'null';
            }

            if (typeof obj === 'boolean') {
                return obj ? 'true' : 'false';
            }

            if (typeof obj === 'number') {
                return String(obj);
            }

            if (typeof obj === 'string') {
                return formatString(obj, spaces, blockStyle, lineWidth);
            }

            if (Array.isArray(obj)) {
                if (obj.length === 0) {
                    return '[]';
                }

                obj.forEach((item, index) => {
                    result += `${spaces}- `;
                    const itemStr = jsonToYAML(item, 0, { ...options, indentSpaces: 0 });

                    if (typeof item === 'object' && item !== null) {
                        result += '\n' + jsonToYAML(item, indent + 1, options);
                    } else {
                        result += itemStr;
                    }

                    if (index < obj.length - 1) {
                        result += '\n';
                    }
                });

                return result;
            }

            if (typeof obj === 'object') {
                const keys = Object.keys(obj);

                if (keys.length === 0) {
                    return '{}';
                }

                if (sortKeys === 'alpha') {
                    keys.sort();
                }

                keys.forEach((key, index) => {
                    const value = obj[key];
                    result += `${spaces}${key}: `;

                    if (value === null) {
                        result += 'null';
                    } else if (typeof value === 'object') {
                        result += '\n' + jsonToYAML(value, indent + 1, options);
                    } else {
                        result += jsonToYAML(value, 0, { ...options, indentSpaces: 0 });
                    }

                    if (index < keys.length - 1) {
                        result += '\n';
                    }
                });

                return result;
            }

            return String(obj);
        }

        function formatString(str, spaces, blockStyle, lineWidth) {
            if (str === '') {
                return "''";
            }

            // Check if string needs special handling
            const hasNewlines = str.includes('\n');
            const hasSpecialChars = /[:"'{}[\],&*#?|<>%]/.test(str);
            const isLong = lineWidth > 0 && str.length > lineWidth;

            // For simple strings, just return them
            if (!hasNewlines && !hasSpecialChars && !isLong) {
                return str;
            }

            // Handle multi-line strings with block style
            if (hasNewlines) {
                const lines = str.split('\n');
                const blockIndicator = blockStyle === 'literal' ? '|' : '>';
                let result = `${blockIndicator}\n`;

                lines.forEach((line, index) => {
                    result += `${spaces}  ${line}`;
                    if (index < lines.length - 1) {
                        result += '\n';
                    }
                });

                return result;
            }

            // For long strings, quote them
            return `"${str.replace(/"/g, '\\"')}"`;
        }

        // Validate JSON
        function validateJSON(json) {
            try {
                const parsed = JSON.parse(json);
                return { valid: true, data: parsed };
            } catch (error) {
                return { valid: false, error: error.message };
            }
        }

        // Update JSON status and stats
        function updateJSONStatus() {
            const json = jsonInput.value.trim();

            if (!json) {
                jsonStatus.textContent = 'Ready';
                jsonStatus.className = 'status-badge';
                jsonError.classList.remove('show');
                jsonStats.textContent = '';
                return;
            }

            const result = validateJSON(json);

            if (result.valid) {
                currentJSON = result.data;
                jsonStatus.textContent = 'Valid JSON';
                jsonStatus.className = 'status-badge valid';
                jsonError.classList.remove('show');

                // Calculate stats
                const stats = calculateJSONStats(result.data);
                jsonStats.textContent = `Keys: ${stats.keys} | Depth: ${stats.depth} | Items: ${stats.items}`;
            } else {
                currentJSON = null;
                jsonStatus.textContent = 'Invalid';
                jsonStatus.className = 'status-badge invalid';
                jsonError.textContent = result.error;
                jsonError.classList.add('show');
                jsonStats.textContent = '';
            }
        }

        // Calculate JSON statistics
        function calculateJSONStats(obj, depth = 1) {
            let stats = { keys: 0, depth: depth, items: 0 };

            if (Array.isArray(obj)) {
                stats.items = obj.length;
                obj.forEach(item => {
                    if (typeof item === 'object' && item !== null) {
                        const nested = calculateJSONStats(item, depth + 1);
                        stats.keys += nested.keys;
                        stats.depth = Math.max(stats.depth, nested.depth);
                        stats.items += nested.items;
                    }
                });
            } else if (typeof obj === 'object' && obj !== null) {
                const keys = Object.keys(obj);
                stats.keys = keys.length;
                keys.forEach(key => {
                    const value = obj[key];
                    if (typeof value === 'object' && value !== null) {
                        const nested = calculateJSONStats(value, depth + 1);
                        stats.keys += nested.keys;
                        stats.depth = Math.max(stats.depth, nested.depth);
                        stats.items += nested.items;
                    }
                });
            }

            return stats;
        }

        // Convert JSON to YAML
        function convertToYAML() {
            if (!currentJSON) {
                alert('Please enter valid JSON first');
                return;
            }

            const options = {
                indentSpaces: parseInt(indentSelect.value),
                blockStyle: document.querySelector('input[name="blockStyle"]:checked').value,
                sortKeys: document.querySelector('input[name="keySort"]:checked').value,
                lineWidth: parseInt(lineWidthSelect.value)
            };

            currentYAML = jsonToYAML(currentJSON, 0, options);
            yamlOutput.value = currentYAML;

            // Update YAML stats
            const lines = currentYAML.split('\n').length;
            const chars = currentYAML.length;
            yamlStats.textContent = `Lines: ${lines} | Characters: ${chars}`;
        }

        // Clear all inputs
        function clearAll() {
            jsonInput.value = '';
            yamlOutput.value = '';
            currentJSON = null;
            currentYAML = '';
            updateJSONStatus();
            jsonStats.textContent = '';
            yamlStats.textContent = '';
        }

        // Copy to clipboard
        async function copyToClipboard() {
            if (!currentYAML) {
                alert('No YAML to copy');
                return;
            }

            try {
                await navigator.clipboard.writeText(currentYAML);
                showCopyFeedback();
            } catch (error) {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = currentYAML;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showCopyFeedback();
            }
        }

        function showCopyFeedback() {
            copyFeedback.classList.add('show');
            setTimeout(() => {
                copyFeedback.classList.remove('show');
            }, 2000);
        }

        // Event listeners
        jsonInput.addEventListener('input', updateJSONStatus);
        convertBtn.addEventListener('click', convertToYAML);
        clearBtn.addEventListener('click', clearAll);
        copyBtn.addEventListener('click', copyToClipboard);

        // Auto-convert on config change
        [indentSelect, lineWidthSelect, ...document.querySelectorAll('input[name="blockStyle"]'), ...document.querySelectorAll('input[name="keySort"]')].forEach(element => {
            element.addEventListener('change', () => {
                if (currentJSON) {
                    convertToYAML();
                }
            });
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    convertToYAML();
                }
            }
        });
    </script>
</body>
</html>
