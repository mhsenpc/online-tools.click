<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker & Converter | online-tools.click</title>
    <meta name="description" content="Free, secure, and fast online color picker and converter. Convert between HEX, RGB, HSL, and CMYK instantly with WCAG contrast checking.">

        tailwind.config = {

                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],

    <style>
        :root {
            --bg-card: #ffffff;
        }
        .dark {
            --bg-card: #111827;
        }
        body { transition: background-color 0.2s, color 0.2s; }
        
        .color-preview {
            width: 100%;
            height: 120px;
            border-radius: 12px;
            transition: background-color 0.1s;
            border: 1px solid rgba(0,0,0,0.1);
        }
        
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 50px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
    </style>

<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans overflow-y-auto">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <div class="mb-4">
                <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider hover:opacity-80 transition-opacity">
                    online-tools.click
                </a>
            </div>
            <h1 class="text-4xl font-bold mb-2 tracking-tight">Color Picker</h1>
            <p class="text-gray-500 dark:text-gray-400 text-lg font-medium">Visual color selection and multi-format conversion.</p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Picker & Preview -->
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 shadow-sm space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Select Color</label>
                        <input type="color" id="main-picker" value="#3b82f6" class="rounded-lg overflow-hidden">
                    </div>
                    
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Preview</label>
                        <div id="preview-box" class="color-preview flex items-center justify-center text-xl font-bold">
                            <span id="preview-text">ABC</span>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400">WCAG Contrast</label>
                        <div class="grid grid-cols-2 gap-3">
                            <div id="contrast-white" class="p-3 rounded-xl border border-gray-100 dark:border-gray-800 text-center">
                                <div class="text-[10px] text-gray-400 mb-1 uppercase">On White</div>
                                <div class="font-bold text-sm" id="ratio-white">---</div>
                            </div>
                            <div id="contrast-black" class="p-3 rounded-xl border border-gray-100 dark:border-gray-800 text-center">
                                <div class="text-[10px] text-gray-400 mb-1 uppercase">On Black</div>
                                <div class="font-bold text-sm" id="ratio-black">---</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Formats -->
            <div class="lg:col-span-7 space-y-4">
                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-8 shadow-sm space-y-6">
                    <!-- HEX -->
                    <div class="flex items-center gap-4">
                        <div class="w-20 shrink-0 text-xs font-bold text-gray-400 uppercase tracking-wider">HEX</div>
                        <div class="relative flex-1">
                            <input type="text" id="val-hex" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2 font-mono text-sm outline-none transition-all">
                        </div>
                        <button onclick="copyVal('val-hex')" class="p-2 text-gray-400 hover:text-blue-500 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m-7 10l7-7"></path></svg>
                        </button>
                    </div>

                    <!-- RGB -->
                    <div class="flex items-center gap-4">
                        <div class="w-20 shrink-0 text-xs font-bold text-gray-400 uppercase tracking-wider">RGB</div>
                        <div class="relative flex-1">
                            <input type="text" id="val-rgb" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2 font-mono text-sm outline-none transition-all">
                        </div>
                        <button onclick="copyVal('val-rgb')" class="p-2 text-gray-400 hover:text-blue-500 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m-7 10l7-7"></path></svg>
                        </button>
                    </div>

                    <!-- HSL -->
                    <div class="flex items-center gap-4">
                        <div class="w-20 shrink-0 text-xs font-bold text-gray-400 uppercase tracking-wider">HSL</div>
                        <div class="relative flex-1">
                            <input type="text" id="val-hsl" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2 font-mono text-sm outline-none transition-all">
                        </div>
                        <button onclick="copyVal('val-hsl')" class="p-2 text-gray-400 hover:text-blue-500 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m-7 10l7-7"></path></svg>
                        </button>
                    </div>

                    <!-- CMYK -->
                    <div class="flex items-center gap-4">
                        <div class="w-20 shrink-0 text-xs font-bold text-gray-400 uppercase tracking-wider">CMYK</div>
                        <div class="relative flex-1">
                            <input type="text" id="val-cmyk" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2 font-mono text-sm outline-none transition-all" readonly>
                        </div>
                        <button onclick="copyVal('val-cmyk')" class="p-2 text-gray-400 hover:text-blue-500 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m-7 10l7-7"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- Palette -->
                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 shadow-sm">
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-4">Recent Palette</label>
                    <div id="palette" class="flex flex-wrap gap-3">
                        <!-- Palette colors added here -->
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-16 text-center text-xs text-gray-400 dark:text-gray-600 border-t border-gray-200 dark:border-gray-800 pt-8 space-y-4">
            <p>🔒 100% Private: All color conversions happen client-side in your browser.</p>
            <div class="flex justify-center gap-4">
                <button onclick="document.documentElement.classList.toggle('dark')" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-tighter">Toggle Theme</button>
                <span>&bull;</span>
                <a href="https://online-tools.click" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-tighter">Utility Hub</a>
            </div>
        </footer>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-2 bg-gray-900 text-white text-sm font-medium rounded-full shadow-2xl opacity-0 translate-y-10 pointer-events-none transition-all duration-300 z-50">
        Copied to clipboard
    </div>

    <script>
        const mainPicker = document.getElementById('main-picker');
        const previewBox = document.getElementById('preview-box');
        const previewText = document.getElementById('preview-text');
        const hexInput = document.getElementById('val-hex');
        const rgbInput = document.getElementById('val-rgb');
        const hslInput = document.getElementById('val-hsl');
        const cmykInput = document.getElementById('val-cmyk');
        const paletteContainer = document.getElementById('palette');
        const toast = document.getElementById('toast');

        // --- Conversion Logic ---
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
        }

        function rgbToHsl(r, g, b) {
            r /= 255, g /= 255, b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max == min) h = s = 0;
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }

        function rgbToCmyk(r, g, b) {
            let c = 1 - (r / 255);
            let m = 1 - (g / 255);
            let y = 1 - (b / 255);
            let k = Math.min(c, m, y);
            c = Math.round(((c - k) / (1 - k)) * 100) || 0;
            m = Math.round(((m - k) / (1 - k)) * 100) || 0;
            y = Math.round(((y - k) / (1 - k)) * 100) || 0;
            k = Math.round(k * 100) || 0;
            return { c, m, y, k };
        }

        function getLuminance(r, g, b) {
            const a = [r, g, b].map(v => {
                v /= 255;
                return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
            });
            return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
        }

        function getContrastRatio(l1, l2) {
            const ratio = (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
            return ratio.toFixed(2);
        }

        // --- UI Updates ---
        function updateAll(hex) {
            const rgb = hexToRgb(hex);
            if (!rgb) return;
            
            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
            const cmyk = rgbToCmyk(rgb.r, rgb.g, rgb.b);
            
            // Text inputs
            hexInput.value = hex.toUpperCase();
            rgbInput.value = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
            hslInput.value = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
            cmykInput.value = `cmyk(${cmyk.c}%, ${cmyk.m}%, ${cmyk.y}%, ${cmyk.k}%)`;
            
            // Preview
            previewBox.style.backgroundColor = hex;
            const luminance = getLuminance(rgb.r, rgb.g, rgb.b);
            previewText.style.color = luminance > 0.5 ? '#000' : '#fff';
            
            // Contrast
            const whiteLum = getLuminance(255, 255, 255);
            const blackLum = getLuminance(0, 0, 0);
            
            const ratioWhite = getContrastRatio(luminance, whiteLum);
            const ratioBlack = getContrastRatio(luminance, blackLum);
            
            document.getElementById('ratio-white').textContent = ratioWhite + ':1';
            document.getElementById('ratio-black').textContent = ratioBlack + ':1';
            
            document.getElementById('ratio-white').className = ratioWhite >= 4.5 ? 'font-bold text-emerald-500' : 'font-bold text-red-500';
            document.getElementById('ratio-black').className = ratioBlack >= 4.5 ? 'font-bold text-emerald-500' : 'font-bold text-red-500';
            
            saveToPalette(hex);
        }

        function saveToPalette(hex) {
            let palette = JSON.parse(localStorage.getItem('color_palette') || '[]');
            if (palette[0] === hex) return;
            palette = [hex, ...palette.filter(c => c !== hex)].slice(0, 14);
            localStorage.setItem('color_palette', JSON.stringify(palette));
            renderPalette();
        }

        function renderPalette() {
            const palette = JSON.parse(localStorage.getItem('color_palette') || '[]');
            paletteContainer.innerHTML = palette.map(color => `
                <button onclick="selectFromPalette('${color}')" class="w-8 h-8 rounded-lg border border-gray-200 dark:border-gray-700 transition-transform hover:scale-110 shadow-sm" style="background-color: ${color}" title="${color}"></button>
            `).join('');
        }

        window.selectFromPalette = (hex) => {
            mainPicker.value = hex;
            updateAll(hex);
        };

        window.copyVal = (id) => {
            const input = document.getElementById(id);
            navigator.clipboard.writeText(input.value).then(() => {
                toast.classList.remove('opacity-0', 'translate-y-10');
                setTimeout(() => toast.classList.add('opacity-0', 'translate-y-10'), 2000);
            });
        };

        // --- Events ---
        mainPicker.oninput = (e) => updateAll(e.target.value);
        
        hexInput.onchange = (e) => {
            let val = e.target.value;
            if (!val.startsWith('#')) val = '#' + val;
            if (/^#[0-9A-F]{6}$/i.test(val)) {
                mainPicker.value = val;
                updateAll(val);
            }
        };

        rgbInput.onchange = (e) => {
            const match = e.target.value.match(/\d+/g);
            if (match && match.length === 3) {
                const hex = rgbToHex(parseInt(match[0]), parseInt(match[1]), parseInt(match[2]));
                mainPicker.value = hex;
                updateAll(hex);
            }
        };

        // --- Init ---
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        renderPalette();
        updateAll(mainPicker.value);
    </script>
</body>
</html>
