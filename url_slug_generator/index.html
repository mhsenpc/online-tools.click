<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Slug Generator | online-tools.click</title>
    <meta name="description" content="Generate URL-friendly slugs from your text instantly. Free, fast, and secure client-side slug generator.">
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
        }
        .dark {
            --bg-card: #111827;
            --text-main: #f9fafb;
        }
        
        body { transition: background-color 0.2s, color 0.2s; }

        .output-area {
            @apply w-full bg-white dark:bg-gray-900 border-2 border-gray-200 dark:border-gray-800 rounded-2xl p-6 text-xl font-mono text-blue-600 dark:text-blue-400 outline-none focus:border-blue-500 transition-all shadow-inner overflow-x-auto;
            min-height: 80px;
            display: flex;
            align-items: center;
        }
    </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GHGXLWQR4V"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-GHGXLWQR4V');
  </script>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans overflow-y-auto">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="text-center mb-10">
            <div class="mb-4">
                <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider hover:opacity-80 transition-opacity">
                    online-tools.click
                </a>
            </div>
            <h1 class="text-4xl font-bold mb-2 tracking-tight">URL Slug Generator</h1>
            <p class="text-gray-500 dark:text-gray-400 text-lg">Generate clean, URL-friendly slugs in real-time.</p>
        </header>

        <main class="grid grid-cols-1 gap-8">
            <!-- Input -->
            <div class="space-y-4">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400">Enter Title</label>
                <input type="text" id="input-text" placeholder="My Awesome Blog Post Title" class="w-full bg-white dark:bg-gray-900 border-2 border-gray-200 dark:border-gray-800 rounded-xl px-6 py-4 text-lg outline-none focus:border-blue-500 transition-all">
            </div>

            <!-- Settings -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 shadow-sm">
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-4">Separator</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="separator" value="-" checked class="text-blue-600">
                            <span>Hyphen (-)</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="separator" value="_" class="text-blue-600">
                            <span>Underscore (_)</span>
                        </label>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 shadow-sm flex items-center justify-between">
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400">Options</label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" id="opt-lowercase" checked class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Lowercase</span>
                    </label>
                </div>
            </div>

            <!-- Output -->
            <div class="space-y-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400">Generated Slug</h2>
                    <button id="btn-copy" class="text-xs font-bold text-blue-500 hover:text-blue-600 uppercase tracking-tighter transition-colors">Copy to Clipboard</button>
                </div>
                <div id="output-slug" class="output-area"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="mt-16 text-center text-xs text-gray-400 dark:text-gray-600 border-t border-gray-200 dark:border-gray-800 pt-8 space-y-4">
            <p>🔒 100% Client-Side: Your content stays in the browser. No tracking or logging.</p>
            <div class="flex justify-center gap-4">
                <button onclick="document.documentElement.classList.toggle('dark')" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-tighter">Toggle Theme</button>
                <span>&bull;</span>
                <a href="https://online-tools.click" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-tighter">Utility Hub</a>
            </div>
        </footer>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-2 bg-gray-900 text-white text-sm font-medium rounded-full shadow-2xl opacity-0 translate-y-10 pointer-events-none transition-all duration-300 z-50">
        Copied!
    </div>

    <script>
        const inputText = document.getElementById('input-text');
        const outputSlug = document.getElementById('output-slug');
        const optLowercase = document.getElementById('opt-lowercase');
        const btnCopy = document.getElementById('btn-copy');
        const toast = document.getElementById('toast');
        const separators = document.getElementsByName('separator');

        function generateSlug() {
            let text = inputText.value;
            let separator = '-';
            separators.forEach(s => { if(s.checked) separator = s.value; });
            
            let slug = text.trim();
            
            // Convert to lowercase if needed
            if (optLowercase.checked) {
                slug = slug.toLowerCase();
            }

            // Remove non-word chars and replace with separator
            // Keep alphanumeric, underscore, hyphen
            // Remove special characters
            slug = slug.replace(/[^a-z0-9]+/gi, separator);
            
            // Trim separators from start/end
            const escSep = separator.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            slug = slug.replace(new RegExp('^' + escSep + '+|' + escSep + '+$', 'g'), '');
            
            outputSlug.innerText = slug;
        }

        inputText.addEventListener('input', generateSlug);
        optLowercase.addEventListener('change', generateSlug);
        separators.forEach(s => s.addEventListener('change', generateSlug));

        btnCopy.onclick = () => {
            const text = outputSlug.innerText;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                toast.classList.remove('opacity-0', 'translate-y-10');
                setTimeout(() => toast.classList.add('opacity-0', 'translate-y-10'), 2000);
            });
        };

        // Init Theme
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
