<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random String & Secret Generator | Online Tools</title>
    <meta name="description" content="Secure, client-side random string and secret generator. Generate API keys, tokens, or placeholder text. 100% private.">
    <meta property="og:title" content="Random String & Secret Generator | Online Tools">
    <meta property="og:description" content="Secure, client-side random string and secret generator. Generate API keys, tokens, or placeholder text.">
    <meta property="og:url" content="https://online-tools.click/random_string_secret_generator/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://online-tools.click/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Random String & Secret Generator | Online Tools">
    <meta name="twitter:description" content="Secure, client-side random string and secret generator. 100% private.">
    <meta name="twitter:image" content="https://online-tools.click/og-image.png">
    <link rel="canonical" href="https://online-tools.click/random_string_secret_generator/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --accent: #ff3e00;
            --accent-glow: rgba(255, 62, 0, 0.2);
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
            --space-element: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            padding: 32px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: var(--text);
        }

        .logo-sep {
            color: var(--text-muted);
            font-weight: 300;
        }

        .logo-sub {
            font-size: 20px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .header-right a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .header-right a:hover {
            color: var(--text);
            border-color: var(--border-focus);
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 48px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 12px;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        .result-container {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .main-result {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .string-display {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            background: var(--bg-input);
            padding: 20px 24px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .string-display::-webkit-scrollbar {
            display: none;
        }

        .string-display:hover {
            border-color: var(--border-focus);
        }

        .btn-generate {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            width: 64px;
            height: 64px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
            flex-shrink: 0;
        }

        .btn-generate:hover {
            transform: rotate(30deg);
            background: #ff5522;
        }

        .btn-generate svg {
            width: 28px;
            height: 28px;
        }

        .presets-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .preset-btn {
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            border-color: var(--border-focus);
            color: var(--text);
            background: var(--bg-elevated);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .setting-label {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .length-control {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .length-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        .length-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid var(--bg-elevated);
            box-shadow: 0 0 0 2px var(--accent);
        }

        .length-number {
            font-family: var(--font-mono);
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            width: 40px;
            text-align: right;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            border: 1px solid var(--border);
            transition: all 0.2s;
            user-select: none;
        }

        .checkbox-item:hover {
            border-color: var(--border-focus);
        }

        .checkbox-item.active {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .checkbox-item input {
            display: none;
        }

        .checkbox-text {
            font-size: 14px;
            font-weight: 500;
        }

        .history-container {
            margin-top: 40px;
        }

        .history-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .history-item {
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            border-color: var(--border-focus);
            background: var(--bg-elevated);
        }

        .history-item svg {
            width: 14px;
            height: 14px;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .history-item:hover svg {
            opacity: 1;
        }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 20px;
            font-size: 13px;
            color: var(--text);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 100;
        }

        .toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
            .hero h1 {
                font-size: 32px;
            }
            .string-display {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="https://online-tools.click" class="logo">Online Tools</a><span class="logo-sep"> / </span><span class="logo-sub">Random String Generator</span>
        </div>
        <div class="header-right">
            <a href="https://online-tools.click">All Tools</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Random String Generator</h1>
            <p>Generate secure random strings, secrets, and unique identifiers. 100% client-side.</p>
        </section>

        <div class="result-container">
            <div class="presets-bar">
                <button class="preset-btn" data-preset="password">Strong Password</button>
                <button class="preset-btn" data-preset="url-safe">URL-Safe Secret</button>
                <button class="preset-btn" data-preset="simple">Simple String</button>
                <button class="preset-btn" data-preset="hex">Hexadecimal</button>
            </div>

            <div class="main-result">
                <div class="string-display" id="string-display" title="Click to copy">
                    ••••••••••••
                </div>
                <button class="btn-generate" id="generate-btn" title="Generate New">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg>
                </button>
            </div>
        </div>

        <div class="settings-grid">
            <div class="setting-group">
                <label class="setting-label">String Length</label>
                <div class="length-control">
                    <input type="range" class="length-slider" id="length-slider" min="1" max="256" value="32">
                    <span class="length-number" id="length-number">32</span>
                </div>

                <div class="checkbox-group">
                    <label class="checkbox-item active">
                        <span class="checkbox-text">Uppercase Letters (A-Z)</span>
                        <input type="checkbox" id="include-upper" checked>
                    </label>
                    <label class="checkbox-item active">
                        <span class="checkbox-text">Lowercase Letters (a-z)</span>
                        <input type="checkbox" id="include-lower" checked>
                    </label>
                    <label class="checkbox-item active">
                        <span class="checkbox-text">Numbers (0-9)</span>
                        <input type="checkbox" id="include-numbers" checked>
                    </label>
                    <label class="checkbox-item active">
                        <span class="checkbox-text">Symbols (!@#$%^&*)</span>
                        <input type="checkbox" id="include-symbols" checked>
                    </label>
                </div>
            </div>

            <div class="setting-group">
                <label class="setting-label">Advanced Options</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <span class="checkbox-text">Exclude Ambiguous (O, 0, l, 1)</span>
                        <input type="checkbox" id="exclude-ambiguous">
                    </label>
                    <label class="checkbox-item">
                        <span class="checkbox-text">Include Brackets ((), [], {})</span>
                        <input type="checkbox" id="include-brackets">
                    </label>
                    <label class="checkbox-item">
                        <span class="checkbox-text">URL Safe Only (-._~)</span>
                        <input type="checkbox" id="url-safe">
                    </label>
                </div>
            </div>
        </div>

        <div class="history-container">
            <div class="setting-label">Recently Generated</div>
            <div class="history-list" id="history-list"></div>
        </div>
    </main>

    <div class="toast" id="toast">Copied to clipboard</div>

    <script>
        const stringDisplay = document.getElementById('string-display');
        const generateBtn = document.getElementById('generate-btn');
        const lengthSlider = document.getElementById('length-slider');
        const lengthNumber = document.getElementById('length-number');
        const historyList = document.getElementById('history-list');
        const toast = document.getElementById('toast');

        let history = [];

        function secureRandom(max) {
            const array = new Uint32Array(1);
            window.crypto.getRandomValues(array);
            return array[0] % max;
        }

        function generateString() {
            const length = parseInt(lengthSlider.value);
            const excludeAmbiguous = document.getElementById('exclude-ambiguous').checked;
            const urlSafeOnly = document.getElementById('url-safe').checked;
            
            let upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
            let lower = 'abcdefghijkmnopqrstuvwxyz';
            let numbers = '23456789';
            let symbols = '!@#$%^&*';
            
            if (!excludeAmbiguous) {
                upper += 'IO';
                lower += 'l';
                numbers += '01';
            }

            if (urlSafeOnly) {
                symbols = '-._~';
            } else if (document.getElementById('include-brackets').checked) {
                symbols += '()[]{}';
            }

            let pool = '';
            if (document.getElementById('include-upper').checked) pool += upper;
            if (document.getElementById('include-lower').checked) pool += lower;
            if (document.getElementById('include-numbers').checked) pool += numbers;
            if (document.getElementById('include-symbols').checked) pool += symbols;

            if (pool === '') return 'Select Options';

            let result = '';
            for (let i = 0; i < length; i++) {
                result += pool[secureRandom(pool.length)];
            }
            return result;
        }

        function updateUI(str) {
            stringDisplay.textContent = str;
            addToHistory(str);
        }

        function addToHistory(str) {
            if (str === 'Select Options') return;
            if (history.includes(str)) return;
            history.unshift(str);
            if (history.length > 10) history.pop();
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = history.map(str => `
                <div class="history-item" onclick="copyText('${str}')">
                    <span>${str.length > 24 ? str.substring(0, 21) + '...' : str}</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </div>
            `).join('');
        }

        function copyText(text) {
            if (text === 'Select Options') return;
            navigator.clipboard.writeText(text).then(() => {
                toast.classList.add('visible');
                setTimeout(() => toast.classList.remove('visible'), 1500);
            });
        }

        generateBtn.addEventListener('click', () => updateUI(generateString()));
        stringDisplay.addEventListener('click', () => copyText(stringDisplay.textContent));

        lengthSlider.addEventListener('input', () => {
            lengthNumber.textContent = lengthSlider.value;
        });

        document.querySelectorAll('.checkbox-item input').forEach(input => {
            input.addEventListener('change', (e) => {
                e.target.closest('.checkbox-item').classList.toggle('active', e.target.checked);
            });
        });

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const preset = btn.dataset.preset;
                const setChecked = (id, val) => {
                    const el = document.getElementById(id);
                    el.checked = val;
                    el.closest('.checkbox-item').classList.toggle('active', val);
                };

                if (preset === 'password') {
                    lengthSlider.value = 20;
                    setChecked('include-upper', true);
                    setChecked('include-lower', true);
                    setChecked('include-numbers', true);
                    setChecked('include-symbols', true);
                    setChecked('exclude-ambiguous', false);
                    setChecked('url-safe', false);
                } else if (preset === 'url-safe') {
                    lengthSlider.value = 48;
                    setChecked('include-upper', true);
                    setChecked('include-lower', true);
                    setChecked('include-numbers', true);
                    setChecked('include-symbols', true);
                    setChecked('url-safe', true);
                } else if (preset === 'simple') {
                    lengthSlider.value = 12;
                    setChecked('include-upper', false);
                    setChecked('include-lower', true);
                    setChecked('include-numbers', true);
                    setChecked('include-symbols', false);
                } else if (preset === 'hex') {
                    lengthSlider.value = 32;
                    setChecked('include-upper', false);
                    setChecked('include-lower', true);
                    setChecked('include-numbers', true);
                    setChecked('include-symbols', false);
                    // Custom logic for hex would go here, but this is a close approximation
                }
                lengthNumber.textContent = lengthSlider.value;
                updateUI(generateString());
            });
        });

        // Initial
        updateUI(generateString());
    </script>

    </script>
</body>
</html>
