<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Lookup Tool | online-tools.click</title>
    <meta name="description" content="Free online DNS lookup tool for troubleshooting records.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .output-box { @apply bg-gray-50 dark:bg-gray-800 p-4 rounded-xl font-mono text-sm break-all; min-height: 200px; }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider">online-tools.click</a>
            <h1 class="text-3xl font-bold mt-2">DNS Lookup Tool</h1>
        </header>

        <div class="space-y-6">
            <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 shadow-sm space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="in-domain" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2 outline-none" placeholder="example.com">
                    <select id="sel-type" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2 outline-none">
                        <option value="A">A</option>
                        <option value="AAAA">AAAA</option>
                        <option value="MX">MX</option>
                        <option value="CNAME">CNAME</option>
                        <option value="TXT">TXT</option>
                    </select>
                </div>
                <button id="btn-lookup" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">Lookup DNS</button>
            </div>

            <div class="output-box" id="output">Results will appear here...</div>
        </div>
    </div>

    <script>
        const inDomain = document.getElementById('in-domain');
        const selType = document.getElementById('sel-type');
        const btnLookup = document.getElementById('btn-lookup');
        const output = document.getElementById('output');

        btnLookup.onclick = async () => {
            const domain = inDomain.value;
            const type = selType.value;
            if (!domain) return;
            
            output.innerText = "Querying...";
            try {
                const response = await fetch(`https://dns.google/resolve?name=${domain}&type=${type}`);
                const data = await response.json();
                if (data.Answer) {
                    output.innerText = JSON.stringify(data.Answer, null, 2);
                } else {
                    output.innerText = "No records found.";
                }
            } catch (e) {
                output.innerText = "Error: " + e.message;
            }
        };
    </script>
</body>
</html>
