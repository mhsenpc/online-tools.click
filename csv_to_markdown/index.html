<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to Markdown Table Converter | Online Tools</title>
    <meta name="description" content="Convert CSV data to formatted Markdown tables. Perfect for GitHub READMEs and technical documentation. 100% client-side.">
    <meta property="og:title" content="CSV to Markdown Table Converter | Online Tools">
    <meta property="og:description" content="Convert CSV data to formatted Markdown tables. 100% private.">
    <meta property="og:url" content="https://online-tools.click/csv_to_markdown/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://online-tools.click/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CSV to Markdown Table Converter | Online Tools">
    <meta name="twitter:description" content="Convert CSV to Markdown tables instantly. 100% private.">
    <meta name="twitter:image" content="https://online-tools.click/og-image.png">
    <link rel="canonical" href="https://online-tools.click/csv_to_markdown/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --accent: #ff3e00;
            --accent-glow: rgba(255, 62, 0, 0.2);
            --success: #22c55e;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            padding: 32px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: var(--text);
        }

        .logo-sep {
            color: var(--text-muted);
            font-weight: 300;
        }

        .logo-sub {
            font-size: 20px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .header-right a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .header-right a:hover {
            color: var(--text);
            border-color: var(--border-focus);
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 48px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 12px;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Converter Layout */
        .converter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 40px;
        }

        .panel {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .panel-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-icon:hover {
            color: var(--text);
            border-color: var(--border-focus);
        }

        .input-area {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            resize: none;
            color: var(--text);
            min-height: 400px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area:focus {
            border-color: var(--border-focus);
        }

        .output-area {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 400px;
        }

        /* Alignment Controls */
        .alignment-section {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .alignment-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .alignment-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
        }

        .alignment-label {
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-mono);
            color: var(--text-secondary);
            min-width: 80px;
        }

        .alignment-buttons {
            display: flex;
            gap: 4px;
        }

        .align-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .align-btn:hover {
            color: var(--text);
            border-color: var(--border-focus);
        }

        .align-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Options */
        .options-section {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-group input {
            display: none;
        }

        .checkbox-indicator {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .checkbox-group input:checked + .checkbox-indicator {
            background: var(--accent);
            border-color: var(--accent);
        }

        .checkbox-indicator svg {
            width: 12px;
            height: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .checkbox-group input:checked + .checkbox-indicator svg {
            opacity: 1;
        }

        .checkbox-text {
            font-size: 14px;
            font-weight: 500;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 20px;
            font-size: 13px;
            color: var(--text);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 100;
        }

        .toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Preview Table */
        .preview-section {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-top: 24px;
        }

        .preview-content {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 24px;
            overflow-x: auto;
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
        }

        .preview-table th,
        .preview-table td {
            padding: 12px;
            text-align: left;
            border: 1px solid var(--border);
        }

        .preview-table th {
            background: var(--bg-elevated);
            font-weight: 600;
        }

        @media (max-width: 1024px) {
            .converter-grid {
                grid-template-columns: 1fr;
            }
            .hero h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="https://online-tools.click" class="logo">Online Tools</a><span class="logo-sep"> / </span><span class="logo-sub">CSV to Markdown</span>
        </div>
        <div class="header-right">
            <a href="https://online-tools.click">All Tools</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>CSV to Markdown Table Converter</h1>
            <p>Convert CSV data to formatted Markdown tables. Perfect for GitHub READMEs and documentation.</p>
        </section>

        <div class="converter-grid">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">CSV Input</span>
                    <div class="panel-actions">
                        <button class="btn-icon" onclick="loadSample()">Load Sample</button>
                        <button class="btn-icon" onclick="clearInput()">Clear</button>
                    </div>
                </div>
                <textarea class="input-area" id="csv-input" placeholder="Paste your CSV data here...

Example:
Name,Role,Country
Alice,Developer,USA
Bob,Designer,UK
Charlie,Manager,Canada"></textarea>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Markdown Output</span>
                    <div class="panel-actions">
                        <button class="btn-icon" onclick="copyOutput()">Copy to Clipboard</button>
                    </div>
                </div>
                <div class="output-area" id="markdown-output"></div>
            </div>
        </div>

        <div class="alignment-section" id="alignment-section" style="display: none;">
            <div class="section-title">Column Alignment</div>
            <div class="alignment-controls" id="alignment-controls"></div>
        </div>

        <div class="options-section">
            <label class="checkbox-group">
                <input type="checkbox" id="has-header" checked>
                <div class="checkbox-indicator">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <span class="checkbox-text">First row is header</span>
            </label>
        </div>

        <div class="preview-section" id="preview-section" style="display: none;">
            <div class="section-title">Preview</div>
            <div class="preview-content">
                <table class="preview-table" id="preview-table"></table>
            </div>
        </div>
    </main>

    <div class="toast" id="toast">Copied to clipboard</div>

    <script>
        // --- Elements ---
        const csvInput = document.getElementById('csv-input');
        const markdownOutput = document.getElementById('markdown-output');
        const hasHeaderCheckbox = document.getElementById('has-header');
        const alignmentSection = document.getElementById('alignment-section');
        const alignmentControls = document.getElementById('alignment-controls');
        const previewSection = document.getElementById('preview-section');
        const previewTable = document.getElementById('preview-table');
        const toast = document.getElementById('toast');

        let columnAlignments = [];

        // --- CSV Parsing ---
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            if (lines.length === 0 || text.trim() === '') return [];

            const parseLine = (line) => {
                const result = [];
                let current = '';
                let inQuotes = false;

                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    const nextChar = line[i + 1];

                    if (char === '"') {
                        if (inQuotes && nextChar === '"') {
                            current += '"';
                            i++;
                        } else {
                            inQuotes = !inQuotes;
                        }
                    } else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }

                result.push(current.trim());
                return result;
            };

            return lines.map(parseLine);
        }

        // --- Markdown Generation ---
        function generateMarkdown(data) {
            if (data.length === 0) return '';

            const hasHeader = hasHeaderCheckbox.checked;
            let startIndex = 0;
            let headerRow = [];

            if (hasHeader && data.length > 0) {
                headerRow = data[0];
                startIndex = 1;
            }

            // Initialize alignments if needed
            while (columnAlignments.length < headerRow.length) {
                columnAlignments.push('left');
            }

            let markdown = '';

            // Header row
            if (hasHeader) {
                markdown += '| ' + headerRow.map(cell => cell).join(' | ') + ' |\n';
                markdown += '| ' + columnAlignments.slice(0, headerRow.length).map(align => {
                    if (align === 'center') return ':---:';
                    if (align === 'right') return '---:';
                    return '---';
                }).join(' | ') + ' |\n';
            }

            // Data rows
            for (let i = startIndex; i < data.length; i++) {
                markdown += '| ' + data[i].map(cell => cell).join(' | ') + ' |\n';
            }

            return markdown;
        }

        // --- Alignment Controls ---
        function updateAlignmentControls(columnCount) {
            alignmentControls.innerHTML = '';

            for (let i = 0; i < columnCount; i++) {
                const item = document.createElement('div');
                item.className = 'alignment-item';

                const label = document.createElement('span');
                label.className = 'alignment-label';
                label.textContent = `Column ${i + 1}`;

                const buttons = document.createElement('div');
                buttons.className = 'alignment-buttons';

                ['left', 'center', 'right'].forEach(align => {
                    const btn = document.createElement('button');
                    btn.className = 'align-btn';
                    if (columnAlignments[i] === align) btn.classList.add('active');
                    btn.textContent = align.charAt(0).toUpperCase();
                    btn.title = align.charAt(0).toUpperCase() + align.slice(1);
                    btn.onclick = () => {
                        columnAlignments[i] = align;
                        updateAlignmentControls(columnCount);
                        convert();
                    };
                    buttons.appendChild(btn);
                });

                item.appendChild(label);
                item.appendChild(buttons);
                alignmentControls.appendChild(item);
            }
        }

        // --- Preview Table ---
        function updatePreview(data) {
            if (data.length === 0) {
                previewSection.style.display = 'none';
                return;
            }

            previewSection.style.display = 'block';
            const hasHeader = hasHeaderCheckbox.checked;
            let startIndex = 0;

            if (hasHeader && data.length > 0) {
                startIndex = 1;
            }

            // Build table
            let html = '';

            if (hasHeader) {
                html += '<thead><tr>';
                data[0].forEach(cell => {
                    html += `<th>${cell}</th>`;
                });
                html += '</tr></thead>';
            }

            html += '<tbody>';
            for (let i = startIndex; i < data.length; i++) {
                html += '<tr>';
                data[i].forEach(cell => {
                    html += `<td>${cell}</td>`;
                });
                html += '</tr>';
            }
            html += '</tbody>';

            previewTable.innerHTML = html;
        }

        // --- Main Conversion ---
        function convert() {
            const text = csvInput.value;
            const data = parseCSV(text);

            if (data.length === 0 || text.trim() === '') {
                markdownOutput.textContent = '';
                alignmentSection.style.display = 'none';
                previewSection.style.display = 'none';
                return;
            }

            // Update alignments
            const maxCols = Math.max(...data.map(row => row.length));
            while (columnAlignments.length < maxCols) {
                columnAlignments.push('left');
            }

            // Update UI
            if (hasHeaderCheckbox.checked && data.length > 0) {
                alignmentSection.style.display = 'block';
                updateAlignmentControls(data[0].length);
            } else {
                alignmentSection.style.display = 'none';
            }

            // Generate output
            const markdown = generateMarkdown(data);
            markdownOutput.textContent = markdown;

            // Update preview
            updatePreview(data);
        }

        // --- Event Listeners ---
        csvInput.addEventListener('input', convert);

        hasHeaderCheckbox.addEventListener('change', () => {
            columnAlignments = [];
            convert();
        });

        // --- Helper Functions ---
        function loadSample() {
            csvInput.value = `Name,Role,Country,Experience
Alice Johnson,Senior Developer,USA,8 years
Bob Smith,UX Designer,UK,5 years
Charlie Brown,Project Manager,Canada,12 years
Diana Prince,DevOps Engineer,USA,6 years
Eve Davis,Data Scientist,Australia,7 years`;
            columnAlignments = [];
            convert();
        }

        function clearInput() {
            csvInput.value = '';
            columnAlignments = [];
            convert();
        }

        function copyOutput() {
            const text = markdownOutput.textContent;
            if (!text) return;

            navigator.clipboard.writeText(text).then(() => {
                toast.classList.add('visible');
                setTimeout(() => toast.classList.remove('visible'), 1500);
            });
        }

        // --- Initial Load ---
        // Auto-convert on load if there's content
        if (csvInput.value.trim()) {
            convert();
        }
    </script>

</body>
</html>
