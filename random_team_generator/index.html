<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Team Generator | Online Tools</title>
    <meta name="description" content="Quickly and randomly split a list of names into equal teams. Simple, fast, and fair.">
    <meta property="og:title" content="Random Team Generator | Online Tools">
    <meta property="og:description" content="Quickly and randomly split a list of names into equal teams. Simple, fast, and fair.">
    <meta property="og:url" content="https://online-tools.click/random_team_generator/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://online-tools.click/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Random Team Generator | Online Tools">
    <meta name="twitter:description" content="Quickly and randomly split a list of names into equal teams.">
    <meta name="twitter:image" content="https://online-tools.click/og-image.png">
    <link rel="canonical" href="https://online-tools.click/random_team_generator/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --accent: #ff3e00;
            --accent-glow: rgba(255, 62, 0, 0.2);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            padding: 32px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 20px; font-weight: 700; text-decoration: none; color: var(--text); }
        .logo-sep { color: var(--text-muted); }
        .logo-sub { font-size: 20px; color: var(--text-secondary); }
        .header-right a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); transition: all 0.2s; }
        .header-right a:hover { color: var(--text); border-color: var(--border-focus); }

        main { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        .hero { text-align: center; margin-bottom: 48px; }
        .hero h1 { font-size: 48px; font-weight: 700; letter-spacing: -0.04em; margin-bottom: 12px; }
        .hero p { color: var(--text-secondary); font-size: 18px; }

        .form-container {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 32px;
        }

        .input-group { margin-bottom: 24px; }
        label { display: block; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px; }
        
        textarea {
            width: 100%;
            height: 150px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            padding: 16px;
            font-family: var(--font-sans);
            font-size: 16px;
            resize: vertical;
        }

        .control-row { display: flex; gap: 16px; align-items: center; }
        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            color: var(--text);
            width: 100px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: #ff5522; }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }

        .team-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 24px;
        }

        .team-title { font-weight: 700; margin-bottom: 12px; color: var(--accent); }
        .member-list { list-style: none; }
        .member-list li { padding: 4px 0; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="https://online-tools.click" class="logo">Online Tools</a><span class="logo-sep"> / </span><span class="logo-sub">Team Generator</span>
        </div>
        <div class="header-right"><a href="https://online-tools.click">All Tools</a></div>
    </header>

    <main>
        <section class="hero">
            <h1>Team Generator</h1>
            <p>Randomly split your group into balanced teams.</p>
        </section>

        <div class="form-container">
            <div class="input-group">
                <label>Names (one per line or comma-separated)</label>
                <textarea id="names-input" placeholder="Alice, Bob, Charlie..."></textarea>
            </div>
            <div class="control-row">
                <div class="input-group" style="margin-bottom:0">
                    <label>Number of Teams</label>
                    <input type="number" id="team-count" min="1" value="2">
                </div>
                <button id="generate-btn">Generate Teams</button>
            </div>
        </div>

        <div id="results" class="teams-grid"></div>
    </main>

    <script>
        document.getElementById('generate-btn').addEventListener('click', () => {
            const input = document.getElementById('names-input').value;
            const teamCount = parseInt(document.getElementById('team-count').value);
            
            const names = input.split(/[\n,]+/).map(n => n.trim()).filter(n => n.length > 0);
            if (names.length === 0) return alert('Enter some names first!');
            
            // Shuffle
            for (let i = names.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [names[i], names[j]] = [names[j], names[i]];
            }

            const teams = Array.from({ length: teamCount }, () => []);
            names.forEach((name, i) => {
                teams[i % teamCount].push(name);
            });

            const results = document.getElementById('results');
            results.innerHTML = '';
            
            teams.forEach((team, i) => {
                const card = document.createElement('div');
                card.className = 'team-card';
                card.innerHTML = `
                    <div class="team-title">Team ${i + 1}</div>
                    <ul class="member-list">
                        ${team.map(m => `<li>${m}</li>`).join('')}
                    </ul>
                `;
                results.appendChild(card);
            });
        });
    </script>
</body>
</html>
