<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Generator - online-tools.click</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/figlet.js/1.5.1/figlet.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h1 { margin-top: 0; font-size: 1.5rem; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input[type="text"], select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .preview-container {
            margin-top: 2rem;
            position: relative;
        }
        pre {
            background: #1e293b;
            color: #f8fafc;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: "Cascadia Code", "Source Code Pro", Menlo, Monaco, Consolas, monospace;
            min-height: 100px;
            white-space: pre;
            margin: 0;
        }
        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .copy-btn:hover { opacity: 0.9; }
        .footer { margin-top: 2rem; color: #64748b; font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ASCII Art Generator</h1>
        
        <div class="input-group">
            <label for="text-input">Text to Transform</label>
            <input type="text" id="text-input" placeholder="Enter text here..." value="Hello World">
        </div>

        <div class="input-group">
            <label for="font-select">Style (Font)</label>
            <select id="font-select">
                <option value="Standard">Standard</option>
                <option value="Slant">Slant</option>
                <option value="Shadow">Shadow</option>
                <option value="Small">Small</option>
                <option value="Script">Script</option>
                <option value="Epic">Epic</option>
                <option value="Banner">Banner</option>
            </select>
        </div>

        <div class="preview-container">
            <button class="copy-btn" id="copy-btn">Copy</button>
            <pre id="output"></pre>
        </div>
    </div>

    <div class="footer">
        Powered by FIGlet.js
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const fontSelect = document.getElementById('font-select');
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copy-btn');

        function generate() {
            const text = textInput.value || " ";
            const font = fontSelect.value;
            
            figlet.text(text, { font: font }, function(err, data) {
                if (err) {
                    output.textContent = "Error generating ASCII art";
                    return;
                }
                output.textContent = data;
            });
        }

        textInput.addEventListener('input', generate);
        fontSelect.addEventListener('change', generate);

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(output.textContent);
            const originalText = copyBtn.textContent;
            copyBtn.textContent = 'Copied!';
            setTimeout(() => copyBtn.textContent = originalText, 2000);
        });

        // Initial generation
        generate();
    </script>
</body>
</html>
