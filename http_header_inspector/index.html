<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP Header Inspector | online-tools.click</title>
    <meta name="description" content="Inspect and format HTTP request/response headers with security audit.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .header-row:hover { @apply bg-gray-50 dark:bg-gray-800; }
        .security-present { @apply bg-green-50 dark:bg-green-900/20 border-l-4 border-green-500; }
        .security-missing { @apply bg-red-50 dark:bg-red-900/20 border-l-4 border-red-500; }
        .security-warning { @apply bg-yellow-50 dark:bg-yellow-900/20 border-l-4 border-yellow-500; }
        textarea { font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace; }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider">online-tools.click</a>
            <h1 class="text-3xl font-bold mt-2">HTTP Header Inspector</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm mt-2">Parse, analyze, and audit HTTP headers with security checks</p>
        </header>

        <div class="grid lg:grid-cols-2 gap-6">
            <!-- Input Section -->
            <div class="space-y-4">
                <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 border border-gray-200 dark:border-gray-800">
                    <div class="flex justify-between items-center mb-3">
                        <label class="font-bold text-xs text-gray-400 uppercase">Raw Headers</label>
                        <div class="flex gap-2">
                            <button id="btn-sample" class="text-xs bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded hover:bg-gray-300 dark:hover:bg-gray-600">Load Sample</button>
                            <button id="btn-clear" class="text-xs bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded hover:bg-gray-300 dark:hover:bg-gray-600">Clear</button>
                        </div>
                    </div>
                    <textarea id="raw-headers" class="w-full h-64 p-3 rounded-xl bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Paste raw HTTP headers here...

Example:
HTTP/1.1 200 OK
Content-Type: application/json
X-Frame-Options: DENY
Strict-Transport-Security: max-age=31536000"></textarea>
                </div>

                <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 border border-gray-200 dark:border-gray-800">
                    <label class="font-bold text-xs text-gray-400 uppercase mb-2 block">Search Headers</label>
                    <input type="text" id="search-input" class="w-full p-2 rounded-xl bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Filter by header name or value...">
                </div>
            </div>

            <!-- Output Section -->
            <div class="space-y-4">
                <!-- Status Line -->
                <div id="status-line" class="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-3 border border-blue-200 dark:border-blue-800">
                    <span class="font-bold text-xs text-blue-600 dark:text-blue-400 uppercase">Status</span>
                    <div id="status-content" class="text-sm mt-1 text-gray-700 dark:text-gray-300">No headers parsed yet</div>
                </div>

                <!-- Parsed Headers Table -->
                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden">
                    <div class="p-4 border-b border-gray-200 dark:border-gray-800">
                        <span class="font-bold text-xs text-gray-400 uppercase">Parsed Headers (<span id="header-count">0</span>)</span>
                    </div>
                    <div id="headers-table" class="divide-y divide-gray-200 dark:divide-gray-800 max-h-80 overflow-y-auto">
                        <div class="p-8 text-center text-gray-400 text-sm">Enter headers to see parsed results</div>
                    </div>
                </div>

                <!-- Security Audit -->
                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800">
                    <div class="p-4 border-b border-gray-200 dark:border-gray-800">
                        <span class="font-bold text-xs text-gray-400 uppercase">Security Header Audit</span>
                    </div>
                    <div id="security-audit" class="p-4 space-y-2 max-h-64 overflow-y-auto">
                        <div class="text-gray-400 text-sm text-center">Parse headers to see security analysis</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Content Type Info -->
        <div id="content-type-info" class="mt-6 bg-white dark:bg-gray-900 rounded-2xl p-4 border border-gray-200 dark:border-gray-800 hidden">
            <span class="font-bold text-xs text-gray-400 uppercase">Content-Type Detection</span>
            <div id="content-type-content" class="text-sm mt-2"></div>
        </div>
    </div>

    <script>
        const rawHeaders = document.getElementById('raw-headers');
        const headersTable = document.getElementById('headers-table');
        const securityAudit = document.getElementById('security-audit');
        const searchInput = document.getElementById('search-input');
        const headerCount = document.getElementById('header-count');
        const statusLine = document.getElementById('status-line');
        const statusContent = document.getElementById('status-content');
        const contentTypeInfo = document.getElementById('content-type-info');
        const contentTypeContent = document.getElementById('content-type-content');
        const btnSample = document.getElementById('btn-sample');
        const btnClear = document.getElementById('btn-clear');

        let parsedHeaders = [];

        // Security headers to check
        const securityHeaders = {
            'Strict-Transport-Security': { description: 'Enforces HTTPS connections', severity: 'high' },
            'Content-Security-Policy': { description: 'Prevents XSS attacks', severity: 'high' },
            'X-Frame-Options': { description: 'Prevents clickjacking', severity: 'medium' },
            'X-Content-Type-Options': { description: 'Prevents MIME sniffing', severity: 'medium' },
            'X-XSS-Protection': { description: 'XSS filter (legacy)', severity: 'low' },
            'Referrer-Policy': { description: 'Controls referrer information', severity: 'medium' },
            'Permissions-Policy': { description: 'Controls browser features', severity: 'medium' },
            'Cross-Origin-Opener-Policy': { description: 'Isolates browsing contexts', severity: 'low' },
            'Cross-Origin-Resource-Policy': { description: 'Controls cross-origin resource access', severity: 'low' },
            'Cross-Origin-Embedder-Policy': { description: 'Controls cross-origin embedder', severity: 'low' }
        };

        const sampleHeaders = `HTTP/1.1 200 OK
Date: Wed, 15 Apr 2026 18:34:00 GMT
Content-Type: application/json; charset=utf-8
Content-Length: 1234
Connection: keep-alive
Server: nginx/1.18.0
Cache-Control: max-age=3600, public
ETag: "abc123"
X-Frame-Options: DENY
X-Content-Type-Options: nosniff
X-XSS-Protection: 1; mode=block
Strict-Transport-Security: max-age=31536000; includeSubDomains
Referrer-Policy: strict-origin-when-cross-origin
Set-Cookie: session=abc123; Path=/; Secure; HttpOnly; SameSite=Strict
Access-Control-Allow-Origin: https://example.com
Access-Control-Allow-Methods: GET, POST, OPTIONS
Access-Control-Allow-Headers: Content-Type, Authorization`;

        function parseHeaders(text) {
            const lines = text.trim().split('\n');
            const headers = [];
            let statusLine = null;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                // Check for status line (HTTP/1.x or HTTP/2)
                if (line.match(/^HTTP\/\d(\.\d)?/i) || line.match(/^HTTP\/2/)) {
                    statusLine = line;
                    continue;
                }

                // Parse header: "Name: Value"
                const colonIndex = line.indexOf(':');
                if (colonIndex > 0) {
                    const name = line.substring(0, colonIndex).trim();
                    const value = line.substring(colonIndex + 1).trim();
                    headers.push({ name, value, originalLine: line });
                }
            }

            return { statusLine, headers };
        }

        function renderHeaders(headers, filter = '') {
            const filterLower = filter.toLowerCase();
            const filtered = headers.filter(h =>
                h.name.toLowerCase().includes(filterLower) ||
                h.value.toLowerCase().includes(filterLower)
            );

            headerCount.textContent = filtered.length;

            if (filtered.length === 0) {
                headersTable.innerHTML = '<div class="p-8 text-center text-gray-400 text-sm">No matching headers found</div>';
                return;
            }

            headersTable.innerHTML = filtered.map(h => {
                const isSecurityHeader = securityHeaders.hasOwnProperty(h.name);
                const securityClass = isSecurityHeader ? 'security-present' : '';

                return `
                    <div class="header-row p-3 ${securityClass} cursor-pointer">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <span class="font-mono font-semibold text-sm text-blue-600 dark:text-blue-400">${escapeHtml(h.name)}</span>
                                ${isSecurityHeader ? '<span class="ml-2 text-xs bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300 px-2 py-0.5 rounded">SECURITY</span>' : ''}
                            </div>
                            <button class="copy-btn text-gray-400 hover:text-blue-600 text-xs" data-value="${escapeHtml(h.value)}">Copy</button>
                        </div>
                        <div class="font-mono text-sm text-gray-600 dark:text-gray-400 mt-1 break-all">${escapeHtml(h.value)}</div>
                    </div>
                `;
            }).join('');

            // Add copy functionality
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.onclick = () => {
                    navigator.clipboard.writeText(btn.dataset.value);
                    btn.textContent = 'Copied!';
                    setTimeout(() => btn.textContent = 'Copy', 1500);
                };
            });
        }

        function renderSecurityAudit(headers) {
            const headerNames = new Map(headers.map(h => [h.name.toLowerCase(), h]));
            const auditResults = [];

            for (const [header, info] of Object.entries(securityHeaders)) {
                const present = headerNames.has(header.toLowerCase());
                const severity = info.severity;

                if (present) {
                    const headerValue = headerNames.get(header.toLowerCase()).value;
                    auditResults.push({
                        type: 'present',
                        header,
                        value: headerValue,
                        description: info.description,
                        severity
                    });
                } else {
                    auditResults.push({
                        type: 'missing',
                        header,
                        description: info.description,
                        severity
                    });
                }
            }

            // Check for additional security indicators
            const cookies = headers.filter(h => h.name.toLowerCase() === 'set-cookie');
            if (cookies.length > 0) {
                const secureCookies = cookies.filter(c =>
                    c.value.toLowerCase().includes('secure') &&
                    c.value.toLowerCase().includes('httponly')
                );
                if (secureCookies.length < cookies.length) {
                    auditResults.push({
                        type: 'warning',
                        header: 'Cookie Security',
                        description: 'Some cookies lack Secure or HttpOnly flags',
                        severity: 'medium'
                    });
                }
            }

            // Sort by severity (high > medium > low) and type (missing > warning > present)
            const severityOrder = { high: 0, medium: 1, low: 2 };
            auditResults.sort((a, b) => {
                if (a.type !== b.type) {
                    const typeOrder = { missing: 0, warning: 1, present: 2 };
                    return typeOrder[a.type] - typeOrder[b.type];
                }
                return severityOrder[a.severity] - severityOrder[b.severity];
            });

            if (auditResults.length === 0) {
                securityAudit.innerHTML = '<div class="text-gray-400 text-sm text-center">No security information available</div>';
                return;
            }

            securityAudit.innerHTML = auditResults.map(r => {
                const severityColor = {
                    high: r.type === 'missing' ? 'text-red-600' : 'text-green-600',
                    medium: r.type === 'missing' ? 'text-orange-600' : 'text-green-600',
                    low: 'text-gray-600'
                }[r.severity];

                const bgClass = {
                    present: 'security-present',
                    missing: 'security-missing',
                    warning: 'security-warning'
                }[r.type];

                const icon = {
                    present: '✓',
                    missing: '✗',
                    warning: '⚠'
                }[r.type];

                return `
                    <div class="p-2 rounded ${bgClass}">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="font-semibold text-sm">${icon} ${escapeHtml(r.header)}</span>
                                <span class="text-xs ${severityColor} ml-2">${r.severity.toUpperCase()}</span>
                            </div>
                            ${r.value ? `<button class="copy-btn text-gray-400 hover:text-blue-600 text-xs" data-value="${escapeHtml(r.value)}">Copy</button>` : ''}
                        </div>
                        <div class="text-xs text-gray-600 dark:text-gray-400 mt-1">${escapeHtml(r.description)}</div>
                        ${r.value ? `<div class="font-mono text-xs text-gray-500 mt-1 break-all">${escapeHtml(r.value)}</div>` : ''}
                    </div>
                `;
            }).join('');

            // Add copy functionality
            securityAudit.querySelectorAll('.copy-btn').forEach(btn => {
                btn.onclick = () => {
                    navigator.clipboard.writeText(btn.dataset.value);
                    btn.textContent = 'Copied!';
                    setTimeout(() => btn.textContent = 'Copy', 1500);
                };
            });
        }

        function updateContentTypeInfo(headers) {
            const contentType = headers.find(h => h.name.toLowerCase() === 'content-type');

            if (!contentType) {
                contentTypeInfo.classList.add('hidden');
                return;
            }

            const value = contentType.value;
            const mimeType = value.split(';')[0].trim().toLowerCase();
            const charset = value.match(/charset=([^;]+)/i)?.[1]?.trim() || 'Not specified';

            let formatInfo = '';
            const formatDescriptions = {
                'application/json': 'JavaScript Object Notation - structured data',
                'application/xml': 'XML document',
                'text/html': 'HTML web page',
                'text/plain': 'Plain text',
                'text/css': 'Cascading Style Sheets',
                'text/javascript': 'JavaScript code',
                'application/x-www-form-urlencoded': 'Form-encoded data',
                'multipart/form-data': 'Multipart form data (file uploads)',
                'application/pdf': 'PDF document',
                'image/': 'Binary image data',
                'video/': 'Binary video data',
                'audio/': 'Binary audio data',
                'application/zip': 'ZIP archive',
                'application/octet-stream': 'Generic binary data'
            };

            for (const [type, desc] of Object.entries(formatDescriptions)) {
                if (mimeType === type || mimeType.startsWith(type.replace('*', ''))) {
                    formatInfo = desc;
                    break;
                }
            }

            if (!formatInfo) {
                formatInfo = 'Other content type';
            }

            contentTypeContent.innerHTML = `
                <div class="grid md:grid-cols-3 gap-4 text-sm">
                    <div>
                        <span class="text-gray-400">MIME Type:</span>
                        <div class="font-mono font-semibold">${escapeHtml(mimeType)}</div>
                    </div>
                    <div>
                        <span class="text-gray-400">Charset:</span>
                        <div class="font-mono font-semibold">${escapeHtml(charset)}</div>
                    </div>
                    <div>
                        <span class="text-gray-400">Description:</span>
                        <div>${escapeHtml(formatInfo)}</div>
                    </div>
                </div>
            `;
            contentTypeInfo.classList.remove('hidden');
        }

        function updateStatusLine(statusLineText) {
            if (statusLineText) {
                const parts = statusLineText.split(' ');
                const protocol = parts[0] || '';
                const statusCode = parts[1] || '';
                const statusText = parts.slice(2).join(' ') || '';

                const statusClass = {
                    '2': 'text-green-600',
                    '3': 'text-yellow-600',
                    '4': 'text-orange-600',
                    '5': 'text-red-600'
                }[statusCode[0]] || 'text-gray-600';

                statusContent.innerHTML = `
                    <span class="font-mono">${escapeHtml(protocol)}</span>
                    <span class="font-mono font-bold ${statusClass} ml-2">${escapeHtml(statusCode)}</span>
                    <span class="ml-2">${escapeHtml(statusText)}</span>
                `;
            } else {
                statusContent.textContent = 'No status line detected';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function processHeaders() {
            const text = rawHeaders.value;
            if (!text.trim()) {
                headersTable.innerHTML = '<div class="p-8 text-center text-gray-400 text-sm">Enter headers to see parsed results</div>';
                securityAudit.innerHTML = '<div class="text-gray-400 text-sm text-center">Parse headers to see security analysis</div>';
                headerCount.textContent = '0';
                statusContent.textContent = 'No headers parsed yet';
                contentTypeInfo.classList.add('hidden');
                parsedHeaders = [];
                return;
            }

            const { statusLine: status, headers } = parseHeaders(text);
            parsedHeaders = headers;

            renderHeaders(headers, searchInput.value);
            renderSecurityAudit(headers);
            updateContentTypeInfo(headers);
            updateStatusLine(status);
        }

        rawHeaders.oninput = processHeaders;
        searchInput.oninput = () => renderHeaders(parsedHeaders, searchInput.value);

        btnSample.onclick = () => {
            rawHeaders.value = sampleHeaders;
            processHeaders();
        };

        btnClear.onclick = () => {
            rawHeaders.value = '';
            searchInput.value = '';
            processHeaders();
        };

        // Auto-process on load if there's content
        if (rawHeaders.value.trim()) {
            processHeaders();
        }
    </script>

</body>
</html>
