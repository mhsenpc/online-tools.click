<head>

    <meta name="description" content="Free, secure, and fast online SQL query minifier. Strip comments and whitespace from your SQL code to reduce its size instantly.">
    
    <!-- External Libraries -->

    <style>

<body class="h-full overflow-hidden bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans">

    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-3 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 z-20 relative">
        <div class="flex items-center gap-4">
            <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider hover:opacity-80 transition-opacity">
                online-tools.click
            </a>
            <div class="h-4 w-px bg-gray-300 dark:bg-gray-700"></div>
            <h1 class="text-lg font-semibold">SQL Tools</h1>
        </div>
        
        <div class="flex items-center gap-3">
            <button id="btn-theme-toggle" class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                <svg id="sun-icon" class="hidden w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 17.657l.707.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
                <svg id="moon-icon" class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"></path></svg>
            </button>
        </div>
    </header>

    <!-- Toolbar -->
    <div class="flex items-center gap-4 px-6 py-2 bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 overflow-x-auto">
        <div class="flex items-center gap-2">
            <button id="btn-minify" class="px-3 py-1 text-xs rounded bg-blue-600 hover:bg-blue-700 text-white font-medium transition-all">Minify SQL</button>
        </div>
        <div class="h-4 w-px bg-gray-300 dark:bg-gray-700"></div>
        <div id="stats" class="text-xs text-gray-500 font-medium hidden sm:block"></div>
        <div class="flex-1"></div>
        <button id="btn-copy" class="text-xs font-medium text-gray-600 dark:text-gray-400 hover:text-blue-600 transition-colors">Copy Output</button>
        <button id="btn-clear" class="text-xs font-medium text-gray-600 dark:text-gray-400 hover:text-red-600 transition-colors ml-4">Clear</button>
    </div>

    <!-- Main Workspace -->
    <main class="flex h-full flex-1 overflow-hidden">
        <div class="flex flex-col md:flex-row w-full h-full">
            <!-- Input -->
            <section class="w-full md:w-1/2 flex flex-col h-1/2 md:h-full border-b md:border-b-0 md:border-r border-gray-200 dark:border-gray-800">
                <div class="px-4 py-1 bg-gray-100 dark:bg-gray-800 text-[10px] font-bold text-gray-500 uppercase tracking-widest border-b border-gray-200 dark:border-gray-800">Input SQL</div>
                <textarea id="input-area" class="editor-textarea flex-1 p-6 font-mono text-sm leading-relaxed" placeholder="Paste your SQL here..."></textarea>
            </section>

            <!-- Output -->
            <section class="w-full md:w-1/2 flex flex-col h-1/2 md:h-full bg-white dark:bg-gray-950">
                <div class="px-4 py-1 bg-gray-100 dark:bg-gray-800 text-[10px] font-bold text-gray-500 uppercase tracking-widest border-b border-gray-200 dark:border-gray-800">Minified SQL</div>
                <textarea id="output-area" class="editor-textarea flex-1 p-6 font-mono text-sm leading-relaxed" readonly placeholder="Results will appear here..."></textarea>
            </section>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-2 bg-gray-900 text-white text-sm font-medium rounded-full shadow-2xl opacity-0 translate-y-10 pointer-events-none transition-all duration-300 z-50">
        Copied to clipboard
    </div>

    <script>
        const inputArea = document.getElementById('input-area');
        const outputArea = document.getElementById('output-area');
        const btnMinify = document.getElementById('btn-minify');
        const statsEl = document.getElementById('stats');
        const toast = document.getElementById('toast');

        // --- Core Logic ---
        function minifySQL(sql) {
            let result = '';
            let i = 0;
            let inString = false;
            let inMultiLineComment = false;
            let inSingleLineComment = false;
            let quoteChar = null;

            while (i < sql.length) {
                if (inString) {
                    result += sql[i];
                    if (sql[i] === quoteChar) {
                        // Check for escaped quote
                        if (i + 1 < sql.length && sql[i+1] === quoteChar) {
                            result += sql[i+1];
                            i++;
                        } else {
                            inString = false;
                            quoteChar = null;
                        }
                    }
                    i++;
                    continue;
                }

                if (inMultiLineComment) {
                    if (sql.substring(i, i + 2) === '*/') {
                        inMultiLineComment = false;
                        i += 2;
                    } else {
                        i++;
                    }
                    continue;
                }

                if (inSingleLineComment) {
                    if (sql[i] === '\n') {
                        inSingleLineComment = false;
                    }
                    i++;
                    continue;
                }

                // Check for start of comments
                if (sql.substring(i, i + 2) === '/*') {
                    inMultiLineComment = true;
                    i += 2;
                    continue;
                }

                if (sql.substring(i, i + 2) === '--') {
                    inSingleLineComment = true;
                    i += 2;
                    continue;
                }

                // Start of string
                if (sql[i] === "'" || sql[i] === '"') {
                    inString = true;
                    quoteChar = sql[i];
                    result += sql[i];
                    i++;
                    continue;
                }

                // Whitespace
                if (/\s/.test(sql[i])) {
                    if (result.length > 0 && !/\s$/.test(result)) {
                        result += ' ';
                    }
                    i++;
                    continue;
                }

                result += sql[i];
                i++;
            }
            return result.trim();
        }

        function updateStats(inSize, outSize) {
            if (inSize === 0) {
                statsEl.classList.add('hidden');
                return;
            }
            const ratio = ((1 - outSize / inSize) * 100).toFixed(1);
            statsEl.textContent = `Reduced by ${ratio}% (${inSize} → ${outSize} bytes)`;
            statsEl.classList.remove('hidden');
        }

        // --- Events ---
        btnMinify.onclick = () => {
            const input = inputArea.value.trim();
            if (!input) return;
            const output = minifySQL(input);
            outputArea.value = output;
            updateStats(input.length, output.length);
        };

        document.getElementById('btn-clear').onclick = () => {
            inputArea.value = '';
            outputArea.value = '';
            statsEl.classList.add('hidden');
        };

        document.getElementById('btn-copy').onclick = () => {
            if (!outputArea.value) return;
            navigator.clipboard.writeText(outputArea.value).then(() => {
                toast.classList.remove('opacity-0', 'translate-y-10');
                setTimeout(() => toast.classList.add('opacity-0', 'translate-y-10'), 2000);
            });
        };

        // --- Theme ---
        const themeBtn = document.getElementById('btn-theme-toggle');
        themeBtn.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateThemeIcons();
        };

        function updateThemeIcons() {
            if (document.documentElement.classList.contains('dark')) {
                document.getElementById('sun-icon').classList.remove('hidden');
                document.getElementById('moon-icon').classList.add('hidden');
            } else {
                document.getElementById('sun-icon').classList.add('hidden');
                document.getElementById('moon-icon').classList.remove('hidden');
            }
        }

        // --- Init ---
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcons();
        
        inputArea.value = "-- Sample SQL\nSELECT id, name\nFROM users\nWHERE id = 1; /* Comment */";
    </script>
</body>
