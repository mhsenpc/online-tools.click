<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Contrast Analyzer | Online Tools</title>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --text: #ffffff; --border: #333; --accent: #22c55e; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; display: flex; justify-content: center; }
        .container { background: var(--panel); padding: 32px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 500px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.8; }
        input { width: 100%; height: 50px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: transparent; }
        .result { padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 24px; }
        .score { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
        .criteria { font-size: 14px; opacity: 0.9; }
        .preview { padding: 20px; border-radius: 8px; text-align: center; font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin-bottom: 24px;">Contrast Analyzer</h2>
        <div class="grid">
            <div><label>Text Color</label><input type="color" id="text-color" value="#ffffff"></div>
            <div><label>Background</label><input type="color" id="bg-color" value="#000000"></div>
        </div>
        <div class="result" id="result-box">
            <div class="score" id="score">21.0:1</div>
            <div class="criteria" id="criteria">AA & AAA Pass</div>
        </div>
        <div class="preview" id="preview-box">Sample Text Preview</div>
    </div>

    <script>
        const textColorInput = document.getElementById('text-color');
        const bgColorInput = document.getElementById('bg-color');
        const scoreEl = document.getElementById('score');
        const criteriaEl = document.getElementById('criteria');
        const previewBox = document.getElementById('preview-box');
        const resultBox = document.getElementById('result-box');

        function getLuminance(hex) {
            let rgb = hex.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i).slice(1).map(c => parseInt(c, 16) / 255);
            rgb = rgb.map(c => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4));
            return 0.2126 * rgb[0] + 0.7152 * rgb[1] + 0.0722 * rgb[2];
        }

        function analyze() {
            const l1 = getLuminance(textColorInput.value);
            const l2 = getLuminance(bgColorInput.value);
            const ratio = (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
            
            scoreEl.textContent = ratio.toFixed(2) + ":1";
            
            const isAA = ratio >= 4.5;
            const isAAA = ratio >= 7;
            const isLargeAA = ratio >= 3;
            
            criteriaEl.textContent = isAAA ? "AAA Pass" : (isAA ? "AA Pass" : "Fail");
            resultBox.style.backgroundColor = ratio < 3 ? "#450a0a" : (ratio < 4.5 ? "#713f12" : "#064e3b");
            
            previewBox.style.color = textColorInput.value;
            previewBox.style.backgroundColor = bgColorInput.value;
        }

        [textColorInput, bgColorInput].forEach(i => i.addEventListener('input', analyze));
        analyze();
    </script>
</body>
</html>
