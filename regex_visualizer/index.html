<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Visualize regex pattern explanations. Enter a regex and see what parts match.">
    <meta property="og:title" content="Regex Visualizer | Online Tools">
    <meta property="og:description" content="Visualize regex pattern explanations. Enter a regex and see what parts match.">
    <meta property="og:url" content="https://online-tools.click/regex_visualizer/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://online-tools.click/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Regex Visualizer | Online Tools">
    <meta name="twitter:description" content="Visualize regex pattern explanations. Enter a regex and see what parts match.">
    <meta name="twitter:image" content="https://online-tools.click/og-image.png">
    <link rel="canonical" href="https://online-tools.click/regex_visualizer/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --accent: #ff3e00;
            --accent-glow: rgba(255, 62, 0, 0.2);
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; overflow-x: hidden; }
        header { padding: 32px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; text-decoration: none; color: var(--text); }
        .logo-sep { color: var(--text-muted); font-weight: 300; }
        .logo-sub { font-size: 20px; font-weight: 400; color: var(--text-secondary); }
        .header-right a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); transition: all 0.2s; }
        .header-right a:hover { color: var(--text); border-color: var(--border-focus); }
        main { max-width: 960px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 42px; font-weight: 700; letter-spacing: -0.04em; margin-bottom: 12px; }
        .hero p { color: var(--text-secondary); font-size: 18px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; margin-bottom: 24px; }
        .card-header { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 20px; }
        textarea, input[type="text"], input[type="number"], input[type="url"], input[type="password"], input[type="date"], input[type="time"], select {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 12px 16px; color: var(--text); font-family: var(--font-mono); font-size: 14px; outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus, input:focus, select:focus { border-color: var(--accent); }
        textarea { resize: vertical; min-height: 100px; font-family: var(--font-mono); }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px 28px; border-radius: var(--radius-sm);
            font-family: var(--font-sans); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
            display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background: #ff5522; }
        .btn-sm { padding: 8px 16px; font-size: 12px; }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .btn-secondary:hover { background: var(--bg-elevated); color: var(--text); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .flex-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .result-box { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 16px 20px; font-family: var(--font-mono); font-size: 14px; margin-top: 12px; word-break: break-all; }
        .result-box .label { color: var(--text-muted); font-family: var(--font-sans); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .stat-card { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; text-align: center; }
        .stat-card .val { font-size: 24px; font-weight: 700; font-family: var(--font-mono); }
        .stat-card .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
        .field-group { margin-bottom: 16px; }
        .field-group label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 6px; }
        .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 10px 20px; font-size: 13px; color: var(--text); opacity: 0; pointer-events: none;
            transition: opacity 0.2s, transform 0.2s; z-index: 100; }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
        hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        @media (max-width: 768px) {
            header { padding: 20px 20px; }
            .hero h1 { font-size: 28px; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="https://online-tools.click" class="logo">Online Tools</a>
            <span class="logo-sep">/</span>
            <span class="logo-sub">Regex Visualizer</span>
        </div>
        <div class="header-right">
            <a href="https://online-tools.click">All Tools</a>
        </div>
    </header>
    <main>
        <section class="hero">
            <h1>Regex Visualizer</h1>
            <p>Visualize regex pattern explanations. Enter a regex and see what parts match.</p>
        </section>
        
<div class="card">
    <div class="card-header">Regex Pattern</div>
    <input type="text" id="pattern" value="\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b" oninput="visualize()" style="font-family:var(--font-mono);font-size:16px">
    <div class="flex-row" style="margin-top:8px">
        <label style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px">
            <input type="checkbox" id="flags-g" checked> Global
        </label>
        <label style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px">
            <input type="checkbox" id="flags-i"> Case insensitive
        </label>
    </div>
</div>
<div class="card">
    <div class="card-header">Test String</div>
    <textarea id="test" placeholder="Enter test string..." oninput="testRegex()" style="min-height:100px">Contact us at support@example.com or sales@company.org</textarea>
</div>
<div class="card">
    <div class="card-header">Matches <span id="match-count" style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-secondary)"></span></div>
    <div class="result-box" id="matches" style="min-height:40px"></div>
</div>
<div class="card">
    <div class="card-header">Pattern Breakdown</div>
    <div id="breakdown" style="font-size:14px;line-height:2"></div>
</div>

    </main>
    <div class="toast" id="toast"></div>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GHGXLWQR4V"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-GHGXLWQR4V');</script>
    <script>
    function toast(msg){
        const t=document.getElementById('toast');t.textContent=msg;t.classList.add('visible');
        setTimeout(()=>t.classList.remove('visible'),2000);
    }
    
function visualize(){
    const p=document.getElementById('pattern').value;
    const b=document.getElementById('breakdown');
    if(!p){b.innerHTML='';return;}
    let html='',i=0;
    while(i<p.length){
        const ch=p[i];
        if(ch==='\\'&&i+1<p.length){
            const next=p[i+1];
            const classes={d:'Digit [0-9]',w:'Word [a-zA-Z0-9_]',s:'Whitespace',b:'Word boundary',D:'Non-digit',W:'Non-word',S:'Non-whitespace','.':'Any char'};
            const label=classes[next]||`Escape: ${next}`;
            html+=`<span style="color:var(--accent)">\\${next}</span><span style="color:var(--text-muted);font-size:12px"> (${label})</span> `;
            i+=2;
        }else if(ch==='['){
            const end=p.indexOf(']',i);
            const chars=p.slice(i+1,end);
            html+=`<span style="color:#f59e0b">[${chars}]</span><span style="color:var(--text-muted);font-size:12px"> (char class)</span> `;
            i=end+1;
        }else if('+*?'.includes(ch)){
            const labels={'+':'1 or more','*':'0 or more','?':'0 or 1'};
            html+=`<span style="color:var(--success)">${ch}</span><span style="color:var(--text-muted);font-size:12px"> (${labels[ch]})</span> `;
            i++;
        }else if(ch==='('){
            html+=`<span style="color:#8b5cf6">(</span><span style="color:var(--text-muted);font-size:12px"> (group)</span> `;
            i++;
        }else if(ch===')'){
            html+=`<span style="color:#8b5cf6">)</span><span style="color:var(--text-muted);font-size:12px"> (close)</span> `;
            i++;
        }else if(ch==='^'||ch==='$'){
            html+=`<span style="color:#f59e0b">${ch}</span><span style="color:var(--text-muted);font-size:12px"> (${ch==='^'?'start':'end'})</span> `;
            i++;
        }else if(ch==='|'){
            html+=`<span style="color:#8b5cf6">|</span><span style="color:var(--text-muted);font-size:12px"> (OR)</span> `;
            i++;
        }else if(ch==='.'){
            html+=`<span style="color:#ec4899">.</span><span style="color:var(--text-muted);font-size:12px"> (any char)</span> `;
            i++;
        }else if(ch==='{'){
            const end=p.indexOf('}',i);
            html+=`<span style="color:var(--success)">${p.slice(i,end+1)}</span><span style="color:var(--text-muted);font-size:12px"> (quantifier)</span> `;
            i=end+1;
        }else{
            html+=`<span>${ch}</span> `;
            i++;
        }
    }
    b.innerHTML=html||'(empty)';
    testRegex();
}
function testRegex(){
    const p=document.getElementById('pattern').value;
    const test=document.getElementById('test').value;
    const mc=document.getElementById('match-count');
    const mEl=document.getElementById('matches');
    try{
        let flags='g';
        if(document.getElementById('flags-i').checked) flags+='i';
        const re=new RegExp(p,flags);
        const matches=[...test.matchAll(re)];
        mc.textContent=`— ${matches.length} match${matches.length!==1?'es':''}`;
        mEl.innerHTML=matches.length?matches.map(m=>`<div style="background:var(--bg-input);padding:8px 12px;border-radius:4px;margin:4px 0;font-family:var(--font-mono);font-size:13px"><strong>Match:</strong> "${escapeHTML(m[0])}" <span style="color:var(--text-muted)">(index: ${m.index})</span></div>`).join(''):'<span style="color:var(--text-muted)">No matches</span>';
    }catch(e){
        mc.textContent='';
        mEl.innerHTML=`<span style="color:var(--error)">Invalid regex: ${e.message}</span>`;
    }
}
function escapeHTML(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);}
visualize();

    </script>
</body>
</html>
