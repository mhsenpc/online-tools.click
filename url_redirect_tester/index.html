<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Redirect Tester - Trace Redirect Chains</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="url"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .option label {
            font-size: 14px;
            color: #555;
            cursor: pointer;
        }

        #results {
            margin-top: 30px;
        }

        .redirect-chain {
            border-left: 3px solid #667eea;
            padding-left: 20px;
            margin-top: 20px;
        }

        .redirect-step {
            position: relative;
            padding: 16px;
            margin-bottom: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .redirect-step:hover {
            transform: translateX(4px);
        }

        .redirect-step::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 0 2px #667eea;
        }

        .step-number {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .url {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            word-break: break-all;
            color: #333;
            margin-bottom: 8px;
        }

        .status-code {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .status-200 {
            background: #d4edda;
            color: #155724;
        }

        .status-301 {
            background: #fff3cd;
            color: #856404;
        }

        .status-302 {
            background: #cce5ff;
            color: #004085;
        }

        .status-304 {
            background: #e2e3e5;
            color: #383d41;
        }

        .status-307 {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-308 {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .meta-info {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #856404;
        }

        .error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .final-destination {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .final-destination h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .final-url {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            word-break: break-all;
            margin-bottom: 8px;
        }

        .page-title {
            font-size: 14px;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }

        .hidden {
            display: none;
        }

        .info-note {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #0c5460;
        }

        .info-note strong {
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 URL Redirect Tester</h1>
        <p class="subtitle">Trace redirect chains and analyze URL forwarding paths</p>

        <div class="info-note">
            <strong>ℹ️ How it works</strong>
            This tool traces HTTP redirects to show you the complete path from a shortened URL to its final destination.
            It helps identify hidden redirects, affiliate links, or potentially malicious forwarding.
        </div>

        <div class="input-group">
            <div class="input-row">
                <input
                    type="url"
                    id="url-input"
                    placeholder="Enter URL to test (e.g., https://bit.ly/example)"
                    spellcheck="false"
                >
                <button id="test-btn">Test URL</button>
            </div>

            <div class="options">
                <div class="option">
                    <input type="checkbox" id="follow-redirects" checked>
                    <label for="follow-redirects">Follow all redirects</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="show-headers">
                    <label for="show-headers">Show response headers</label>
                </div>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <script type="module" src="dist/bundle.js"></script>
</body>
</html>
