    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --accent: #ff3e00;
            --accent-glow: rgba(255, 62, 0, 0.2);
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; overflow-x: hidden; }
        header { padding: 32px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; text-decoration: none; color: var(--text); }
        .logo-sep { color: var(--text-muted); font-weight: 300; }
        .logo-sub { font-size: 20px; font-weight: 400; color: var(--text-secondary); }
        .header-right a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); transition: all 0.2s; }
        .header-right a:hover { color: var(--text); border-color: var(--border-focus); }
        main { max-width: 960px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 42px; font-weight: 700; letter-spacing: -0.04em; margin-bottom: 12px; }
        .hero p { color: var(--text-secondary); font-size: 18px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; margin-bottom: 24px; }
        .card-header { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 20px; }
        textarea, input[type="text"], input[type="number"], input[type="url"], input[type="password"], input[type="date"], input[type="time"], select {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 12px 16px; color: var(--text); font-family: var(--font-mono); font-size: 14px; outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus, input:focus, select:focus { border-color: var(--accent); }
        textarea { resize: vertical; min-height: 100px; font-family: var(--font-mono); }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px 28px; border-radius: var(--radius-sm);
            font-family: var(--font-sans); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
            display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background: #ff5522; }
        .btn-sm { padding: 8px 16px; font-size: 12px; }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .btn-secondary:hover { background: var(--bg-elevated); color: var(--text); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .flex-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .result-box { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 16px 20px; font-family: var(--font-mono); font-size: 14px; margin-top: 12px; word-break: break-all; }
        .result-box .label { color: var(--text-muted); font-family: var(--font-sans); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .stat-card { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; text-align: center; }
        .stat-card .val { font-size: 24px; font-weight: 700; font-family: var(--font-mono); }
        .stat-card .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
        .field-group { margin-bottom: 16px; }
        .field-group label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 6px; }
        .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 10px 20px; font-size: 13px; color: var(--text); opacity: 0; pointer-events: none;
            transition: opacity 0.2s, transform 0.2s; z-index: 100; }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
        hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        @media (max-width: 768px) {
            header { padding: 20px 20px; }
            .hero h1 { font-size: 28px; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }

<body>
    <header>
        <div class="header-left">
            <a href="https://online-tools.click" class="logo">Online Tools</a>
            <span class="logo-sep">/</span>
            <span class="logo-sub">MAC Address Lookup</span>
        </div>
        <div class="header-right">
            <a href="https://online-tools.click">All Tools</a>
        </div>
    </header>
    <main>
        <section class="hero">
            <h1>MAC Address Lookup</h1>
            <p>Look up the manufacturer / vendor of a MAC address (OUI lookup).</p>
        </section>
        
<div class="card">
    <div class="card-header">Enter MAC Address</div>
    <input type="text" id="input" placeholder="e.g. 00:1A:2B:3C:4D:5E" oninput="lookup()" style="font-family:var(--font-mono);font-size:18px">
    <div style="margin-top:8px;font-size:12px;color:var(--text-muted)">Formats: 001A2B3C4D5E, 00:1A:2B:3C:4D:5E, 00-1A-2B-3C-4D-5E</div>
</div>
<div class="card">
    <div class="card-header">Vendor / Manufacturer</div>
    <div id="result" style="font-size:24px;font-weight:700;text-align:center"></div>
    <div id="oui-info" style="text-align:center;margin-top:8px;color:var(--text-secondary)"></div>
</div>

    </main>
    <div class="toast" id="toast"></div>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GHGXLWQR4V"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-GHGXLWQR4V');</script>
    <script>
    function toast(msg){
        const t=document.getElementById('toast');t.textContent=msg;t.classList.add('visible');
        setTimeout(()=>t.classList.remove('visible'),2000);
    }
    
// Built-in OUI database (common prefixes)
const OUI={'000000':'Xerox','00037F':'Cisco','000C29':'VMware','000C14':'Dell','000C6E':'Apple','000F1F':'HP','001018':'Samsung','0013D4':'Apple','001422':'HTC','001636':'Intel','0016CB':'Dell','001B63':'Apple','001C42':'Google','001CC4':'Cisco','001D09':'Apple','001E4F':'Dell','001EE2':'Microsoft','001F29':'Lenovo','0021E8':'Panasonic','0022BD':'LG','0023DF':'Apple','00241D':'Google','00247B':'Sony','002481':'Nokia','00254B':'Amazon','0025A0':'Intel','00269E':'Apple','0026B0':'Cisco','0026BB':'Dell','00278A':'Microsoft','00405A':'Cisco','0050F2':'Microsoft','007C5F':'HTC','008025':'Dell','008037':'HP','00A0C9':'Intel','00B0D0':'LG','00C0CA':'Apple','00D0B7':'Samsung','00E04C':'VMware','00E008':'Nokia','00E018':'Apple','00F076':'Apple','080007':'Apple','0C7465':'Apple','1002B5':'HP','10A932':'Dell','10C537':'Google','14ABB5':'Apple','18C086':'Dell','1CBD0E':'Intel','20FABB':'D-Link','24470E':'Cisco','281F6E':'Ubiquiti','2C0BE9':'Raspberry Pi','2C27D7':'Intel','303AE4':'Apple','30D46A':'Samsung','34DAE6':'LG','381C4A':'Apple','3822D6':'Sony','3C0754':'Cisco','3CD16E':'Intel','400E67':'Asus','40B0FA':'Lenovo','44862E':'Huawei','44C347':'Broadcom','48022A':'Intel','488ADA':'Apple','4C0F6E':'Aruba','4CF22F':'Dell','507A5A':'HP','525400':'QEMU','545399':'Raspberry Pi','54A677':'Intel','5CF938':'Apple','645299':'Samsung','64BC11':'UniFi','681B3A':'Microsoft','6CB56B':'Apple','7014A6':'Cisco','74811A':'Google','78D6F0':'Amazon','7CC3A1':'Apple','801F12':'Virgin Media','80CEB8':'Intel','843A4B':'Asus','88A25B':'Google','901797':'Intel','9097DF':'Samsung','942132':'D-Link','9803D8':'Apple','98DA34':'Apple','9CE635':'Intel','A007B6':'Roku','A0369F':'Intel','A40A52':'Apple','A44CC8':'Netgear','A4D9A4':'Samsung','A8154D':'Amazon','AC5F3E':'Apple','B0C554':'Huawei','B87879':'Netgear','BCAE7C':'Apple','C0B32A':'TP-Link','C44AD0':'Intel','C808E9':'Apple','CC2D21':'Cisco','CCB3F0':'Apple','D0D0FD':'Cisco','D8CA6D':'Google','DCA632':'Apple','E03F49':'HP','E45F01':'Google','E8D0FA':'Apple','F0D5BF':'Ubiquiti','F4A997':'Apple','F88DEF':'Apple','FC0FE0':'Cisco'};
function lookup(){
    const t=document.getElementById('input').value.trim().toUpperCase().replace(/[^0-9A-F]/g,'');
    const r=document.getElementById('result');
    const info=document.getElementById('oui-info');
    if(t.length<6){r.textContent='Enter a MAC address';r.style.color='var(--text-muted)';info.textContent='';return;}
    const prefix=t.slice(0,6);
    const vendor=OUI[prefix];
    if(vendor){
        r.textContent=vendor;
        r.style.color='var(--success)';
        info.textContent=`OUI: ${prefix} | Full: ${t.slice(0,2)}:${t.slice(2,4)}:${t.slice(4,6)}:${t.slice(6,8)}:${t.slice(8,10)}:${t.slice(10,12)}`;
    }else{
        r.textContent='Unknown Vendor';
        r.style.color='var(--text-muted)';
        info.textContent=`OUI prefix ${prefix} not found in database (${Object.keys(OUI).length} entries)`;
    }
}

    </script>
