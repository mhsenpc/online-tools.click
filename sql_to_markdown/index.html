<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL to Markdown Table Converter | Online Tools</title>
    <meta name="description" content="Convert SQL result sets to GitHub Flavored Markdown tables. Fast, client-side, one-click copy.">
    <link rel="stylesheet" href="../sql_formatter/index.html"> <!-- Reusing styles if I could, but better to inline or link CSS if common -->
    <!-- Wait, I'll just inline the necessary parts to be safe and self-contained -->
</head>
<body>
    <header>
        <div class="header-left">
            <a href="/" class="logo">Online Tools</a>
            <span class="logo-sep">/</span>
            <span class="logo-sub">SQL to Markdown</span>
        </div>
        <div class="header-right">
            <a href="/">Back to Tools</a>
        </div>
    </header>

    <main>
        <div class="editor-container">
            <div class="editor-panel">
                <div class="panel-header">
                    <span class="panel-title">SQL Output Input</span>
                </div>
                <div class="editor-wrapper">
                    <textarea id="input-sql" placeholder="Paste your SQL query result text here..."></textarea>
                </div>
            </div>

            <div class="editor-panel">
                <div class="panel-header">
                    <span class="panel-title">Markdown Output</span>
                    <button class="btn-icon" id="copy-btn">Copy</button>
                </div>
                <div class="output-wrapper">
                    <div class="output-content" id="output-markdown"></div>
                </div>
            </div>
        </div>
        <button class="btn-primary" id="convert-btn">Convert to Table</button>
    </main>

    <style>
        /* Minimal styles to match project */
        body { font-family: sans-serif; background: #0f0f0f; color: white; padding: 20px; }
        header { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #333; }
        .logo { color: white; text-decoration: none; font-weight: bold; }
        .editor-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .editor-panel { background: #1a1a1a; padding: 15px; border-radius: 8px; }
        .panel-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        textarea { width: 100%; height: 300px; background: #141414; color: white; border: 1px solid #444; border-radius: 4px; padding: 10px; }
        .output-content { width: 100%; height: 300px; background: #141414; color: white; border: 1px solid #444; border-radius: 4px; padding: 10px; overflow: auto; white-space: pre; }
        .btn-primary { margin-top: 20px; padding: 10px 20px; background: #fff; color: #000; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-icon { cursor: pointer; background: #333; color: white; border: none; padding: 5px 10px; border-radius: 4px; }
    </style>

    <script>
        document.getElementById('convert-btn').addEventListener('click', () => {
            const input = document.getElementById('input-sql').value;
            const output = convertToMarkdown(input);
            document.getElementById('output-markdown').textContent = output;
        });

        document.getElementById('copy-btn').addEventListener('click', () => {
            const text = document.getElementById('output-markdown').textContent;
            navigator.clipboard.writeText(text);
        });

        function convertToMarkdown(text) {
            const lines = text.trim().split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) return '';

            // Simple parser: guess delimiter
            const delimiter = lines[0].includes('|') ? '|' : (lines[0].includes('\t') ? '\t' : /\s{2,}/);
            
            const rows = lines.map(line => line.split(delimiter).map(cell => cell.trim()));
            
            // Build Markdown
            let markdown = '| ' + rows[0].join(' | ') + ' |\n';
            markdown += '| ' + rows[0].map(() => '---').join(' | ') + ' |\n';
            
            for (let i = 1; i < rows.length; i++) {
                markdown += '| ' + rows[i].join(' | ') + ' |\n';
            }
            return markdown;
        }
    </script>
</body>
</html>
