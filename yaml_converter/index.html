    <main>
        <section class="hero">

            <p>Convert between YAML and JSON formats. Edit in one format and see the result in the other.</p>

<div class="card">
    <div class="card-header">Conversion Direction</div>
    <div class="flex-row" style="align-items:center">
        <select id="direction" style="width:auto;min-width:120px">
            <option value="yaml2json">YAML → JSON</option>
            <option value="json2yaml">JSON → YAML</option>
        </select>
        <button class="btn btn-sm" onclick="convert()">Convert</button>
    </div>
</div>

    <script>
    function toast(msg){
        const t=document.getElementById('toast');t.textContent=msg;t.classList.add('visible');
        setTimeout(()=>t.classList.remove('visible'),2000);
    }
    
function convert(){
    const dir=document.getElementById('direction').value;
    const t=document.getElementById('input').value;
    const out=document.getElementById('output');
    if(!t.trim()){out.textContent='';return;}
    try{
        if(dir==='yaml2json'){
            // Simple YAML parser for basic YAML
            const obj=parseSimpleYAML(t);
            out.textContent=JSON.stringify(obj,null,2);
        }else{
            const obj=JSON.parse(t);
            out.textContent=toSimpleYAML(obj);
        }
        out.style.color='var(--text)';
    }catch(e){
        out.textContent='Error: '+e.message;
        out.style.color='var(--error)';
    }
}
function parseSimpleYAML(t){
    const lines=t.split('\n');
    let result={};
    let path=[];
    let indentStack=[-1];
    for(let i=0;i<lines.length;i++){
        let l=lines[i];
        if(!l.trim()||l.trim().startsWith('#')) continue;
        const indent=l.search(/\S/);
        const content=l.trim();
        while(indentStack.length>1&&indent<=indentStack[indentStack.length-1]){path.pop();indentStack.pop();}
        if(content.endsWith(':')){
            const key=content.slice(0,-1);
            path.push(key);
            indentStack.push(indent);
            setPath(result,path,{});
        }else{
            const m=content.match(/^([^:]+):\s*(.*)/);
            if(m){
                let key=m[1].trim();
                let val=m[2].trim();
                if(val===''||val==='~') val=null;
                else if(val==='true') val=true;
                else if(val==='false') val=false;
                else if(!isNaN(val)&&val!=='') val=Number(val);
                else if((val.startsWith("'")&&val.endsWith("'"))||(val.startsWith('"')&&val.endsWith('"'))) val=val.slice(1,-1);
                setPath(result,[...path,key],val);
            }
        }
    }
    return result;
}
function setPath(obj,path,val){
    let cur=obj;
    for(let i=0;i<path.length-1;i++){
        if(typeof cur[path[i]]==='undefined') cur[path[i]]={};
        cur=cur[path[i]];
    }
    cur[path[path.length-1]]=val;
}
function toSimpleYAML(obj,depth){
    if(typeof depth==='undefined') depth=0;
    const indent='  '.repeat(depth);
    let out='';
    if(Array.isArray(obj)){
        for(const item of obj){
            if(typeof item==='object'&&item!==null){
                out+=indent+'- '+toSimpleYAML(item,depth+1).trimStart();
            }else{
                out+=indent+'- '+formatYAMLVal(item)+'\n';
            }
        }
    }else{
        for(const key of Object.keys(obj)){
            const val=obj[key];
            if(typeof val==='object'&&val!==null&&!Array.isArray(val)){
                out+=indent+key+':\n'+toSimpleYAML(val,depth+1);
            }else if(Array.isArray(val)){
                out+=indent+key+':\n';
                for(const item of val){
                    if(typeof item==='object'&&item!==null){
                        out+=indent+'  - '+toSimpleYAML(item,depth+2).trimStart();
                    }else{
                        out+=indent+'  - '+formatYAMLVal(item)+'\n';
                    }
                }
            }else{
                out+=indent+key+': '+formatYAMLVal(val)+'\n';
            }
        }
    }
    return out;
}
function formatYAMLVal(v){
    if(v===null||typeof v==='undefined') return '~';
    if(typeof v==='boolean') return v?'true':'false';
    if(typeof v==='number') return String(v);
    if(typeof v==='string'&&(/[:{}[\]&*!|>'"%`@,#]/.test(v)||v.trim()!==v||v==='')) return JSON.stringify(v);
    return String(v);
}
function copyResult(){navigator.clipboard.writeText(document.getElementById('output').textContent).then(()=>toast('Copied!'));}

    </script>
