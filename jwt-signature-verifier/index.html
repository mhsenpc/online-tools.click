<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Signature Verifier — Free Online Tool | 100% Client-Side</title>
    <meta name="description" content="Verify JWT signatures locally in your browser. Supports HS256, RS256, ES256 algorithms. 100% private — no server uploads.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
            font-size: 14px;
        }

        textarea, input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: border-color 0.3s;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            text-align: center;
            font-weight: 600;
        }

        .result.valid {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .result.invalid {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .result.error {
            display: block;
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }

        .result-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .help-text {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 JWT Signature Verifier</h1>
            <p>100% Client-Side • No Server Uploads</p>
        </div>

        <div class="input-group">
            <label for="jwt-input">JWT Token</label>
            <textarea
                id="jwt-input"
                placeholder="Paste your JWT token here..."
                spellcheck="false"
            ></textarea>
        </div>

        <div class="input-group">
            <label for="algorithm">Algorithm</label>
            <select id="algorithm">
                <option value="HS256">HS256 - HMAC using SHA-256</option>
                <option value="RS256">RS256 - RSA using SHA-256</option>
                <option value="ES256">ES256 - ECDSA using P-256 and SHA-256</option>
            </select>
        </div>

        <div class="input-group">
            <label for="key-input">Secret or Public Key</label>
            <textarea
                id="key-input"
                placeholder="Enter your secret key or paste PEM-formatted public key..."
                spellcheck="false"
            ></textarea>
            <p class="help-text">
                <strong>HMAC:</strong> Use the shared secret key.
                <strong>RSA/ECDSA:</strong> Use the public key in PEM format (include the -----BEGIN PUBLIC KEY----- header).
            </p>
        </div>

        <div class="button-group">
            <button id="verify-btn">✓ Verify Signature</button>
            <button id="clear-btn">✕ Clear</button>
        </div>

        <div id="result" class="result"></div>
    </div>

    <script type="module" src="dist/bundle.js"></script>
</body>
</html>
