<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Snippet Generator | online-tools.click</title>
    <meta name="description" content="Generate beautiful images from your code snippets.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .snippet-box { @apply bg-gray-900 text-gray-100 p-8 rounded-xl font-mono text-sm; }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider">online-tools.click</a>
            <h1 class="text-3xl font-bold mt-2">Code Snippet Image Generator</h1>
        </header>

        <div class="space-y-6">
            <textarea id="in-code" class="w-full h-64 bg-white dark:bg-gray-900 rounded-2xl p-4 font-mono text-sm outline-none border border-gray-200 dark:border-gray-800 focus:border-blue-500" placeholder="console.log('Hello World');"></textarea>
            <div id="snippet" class="snippet-box">console.log('Hello World');</div>
            <button id="btn-generate" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">Export as Image</button>
        </div>
    </div>

    <script>
        const inCode = document.getElementById('in-code');
        const snippet = document.getElementById('snippet');
        const btnGenerate = document.getElementById('btn-generate');

        inCode.oninput = () => { snippet.innerText = inCode.value || ' '; };

        btnGenerate.onclick = async () => {
            const canvas = await html2canvas(snippet);
            const link = document.createElement('a');
            link.download = 'snippet.png';
            link.href = canvas.toDataURL();
            link.click();
        };
    </script>
</body>
</html>
