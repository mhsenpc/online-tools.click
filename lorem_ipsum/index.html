<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator | online-tools.click</title>
    <meta name="description" content="Free, fast, and secure online Lorem Ipsum generator. Generate placeholder text for design and development projects instantly.">
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
        }
        .dark {
            --bg-card: #111827;
            --text-main: #f9fafb;
        }
        
        body { transition: background-color 0.2s, color 0.2s; }

        .output-area {
            @apply w-full bg-white dark:bg-gray-900 border-2 border-gray-200 dark:border-gray-800 rounded-2xl p-6 text-sm leading-relaxed outline-none focus:border-blue-500 transition-all shadow-inner overflow-y-auto;
            min-height: 300px;
        }
    </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GHGXLWQR4V"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-GHGXLWQR4V');
  </script>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans overflow-y-auto">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="text-center mb-10">
            <div class="mb-4">
                <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider hover:opacity-80 transition-opacity">
                    online-tools.click
                </a>
            </div>
            <h1 class="text-4xl font-bold mb-2 tracking-tight">Lorem Ipsum Generator</h1>
            <p class="text-gray-500 dark:text-gray-400 text-lg">Generate clean placeholder text for your projects.</p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Settings -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 shadow-sm space-y-6">
                    <!-- Type -->
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Generate</label>
                        <select id="opt-type" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2 text-sm outline-none transition-all">
                            <option value="paragraphs">Paragraphs</option>
                            <option value="sentences">Sentences</option>
                            <option value="words">Words</option>
                        </select>
                    </div>

                    <!-- Text Type -->
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Text Type</label>
                        <select id="opt-text-type" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2 text-sm outline-none transition-all">
                            <option value="lorem">Standard Lorem Ipsum</option>
                            <option value="developer">Developer-Themed</option>
                        </select>
                    </div>

                    <!-- Count -->
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Amount</label>
                        <input type="number" id="opt-count" value="3" min="1" max="100" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2 text-sm outline-none transition-all">
                    </div>

                    <!-- Format -->
                    <div class="space-y-3">
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400">Options</label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="opt-tags" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                            <span class="text-sm group-hover:text-blue-500 transition-colors">Wrap with &lt;p&gt; tags</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="opt-start" checked class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                            <span class="text-sm group-hover:text-blue-500 transition-colors">Start with "Lorem ipsum..."</span>
                        </label>
                    </div>

                    <button id="btn-generate" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg shadow-blue-500/20 transition-all active:scale-95">
                        Generate Text
                    </button>
                </div>
            </div>

            <!-- Output -->
            <div class="lg:col-span-8 space-y-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400">Generated Content</h2>
                    <button id="btn-copy" class="text-xs font-bold text-blue-500 hover:text-blue-600 uppercase tracking-tighter transition-colors">Copy to Clipboard</button>
                </div>
                <div id="output-text" class="output-area" contenteditable="false"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="mt-16 text-center text-xs text-gray-400 dark:text-gray-600 border-t border-gray-200 dark:border-gray-800 pt-8 space-y-4">
            <p>🔒 100% Client-Side: Your content stays in the browser. No tracking or logging.</p>
            <div class="flex justify-center gap-4">
                <button onclick="document.documentElement.classList.toggle('dark')" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-tighter">Toggle Theme</button>
                <span>&bull;</span>
                <a href="https://online-tools.click" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-tighter">Utility Hub</a>
            </div>
        </footer>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-2 bg-gray-900 text-white text-sm font-medium rounded-full shadow-2xl opacity-0 translate-y-10 pointer-events-none transition-all duration-300 z-50">
        Copied!
    </div>

    <script>
        const loremWords = ["lorem", "ipsum", "dolor", "sit", "amet", "consectetur", "adipiscing", "elit", "sed", "do", "eiusmod", "tempor", "incididunt", "ut", "labore", "et", "dolore", "magna", "aliqua", "ut", "enim", "ad", "minim", "veniam", "quis", "nostrud", "exercitation", "ullamco", "laboris", "nisi", "ut", "aliquip", "ex", "ea", "commodo", "consequat", "duis", "aute", "irure", "dolor", "in", "reprehenderit", "in", "voluptate", "velit", "esse", "cillum", "dolore", "eu", "fugiat", "nulla", "pariatur", "excepteur", "sint", "occaecat", "cupidatat", "non", "proident", "sunt", "in", "culpa", "qui", "officia", "deserunt", "mollit", "anim", "id", "est", "laborum"];

        const developerWords = ["function", "variable", "array", "object", "string", "number", "boolean", "null", "undefined", "class", "method", "property", "parameter", "argument", "return", "async", "await", "promise", "callback", "error", "exception", "try", "catch", "finally", "throw", "debug", "console", "log", "warn", "error", "info", "fetch", "request", "response", "json", "parse", "stringify", "api", "endpoint", "server", "client", "frontend", "backend", "database", "query", "mutation", "subscription", "schema", "type", "interface", "enum", "union", "implementation", "module", "import", "export", "default", "namespace", "package", "dependency", "version", "release", "deploy", "build", "compile", "runtime", "memory", "cpu", "performance", "optimization", "refactor", "test", "spec", "mock", "stub", "assert", "expect", "describe", "it", "before", "after", "git", "commit", "push", "pull", "merge", "branch", "checkout", "rebase", "cherry", "pick", "repository", "remote", "origin", "master", "main", "develop", "feature", "bugfix", "hotfix", "release", "tag", "semantic", "versioning", "conventional", "changelog"];

        const output = document.getElementById('output-text');
        const btnGenerate = document.getElementById('btn-generate');
        const btnCopy = document.getElementById('btn-copy');
        const optType = document.getElementById('opt-type');
        const optCount = document.getElementById('opt-count');
        const optTextType = document.getElementById('opt-text-type');
        const optTags = document.getElementById('opt-tags');
        const optStart = document.getElementById('opt-start');
        const toast = document.getElementById('toast');

        function getWords() {
            return optTextType.value === 'developer' ? developerWords : loremWords;
        }

        function generate() {
            const type = optType.value;
            const count = Math.min(100, Math.max(1, parseInt(optCount.value) || 1));
            const withTags = optTags.checked;
            const startWithLorem = optStart.checked;
            const words = getWords();

            let result = [];

            if (type === 'words') {
                for (let i = 0; i < count; i++) {
                    result.push(words[Math.floor(Math.random() * words.length)]);
                }
                if (startWithLorem && count >= 2 && optTextType.value === 'lorem') {
                    result[0] = "lorem";
                    result[1] = "ipsum";
                }
                output.innerText = result.join(' ');
            } else if (type === 'sentences') {
                for (let i = 0; i < count; i++) {
                    let s = [];
                    const len = 5 + Math.floor(Math.random() * 10);
                    for (let j = 0; j < len; j++) {
                        s.push(words[Math.floor(Math.random() * words.length)]);
                    }
                    let sentence = s.join(' ');
                    sentence = sentence.charAt(0).toUpperCase() + sentence.slice(1) + '.';
                    result.push(sentence);
                }
                if (startWithLorem && optTextType.value === 'lorem') {
                    let first = result[0].split(' ');
                    first[0] = "Lorem";
                    if (first.length > 1) first[1] = "ipsum";
                    result[0] = first.join(' ');
                }
                output.innerText = result.join(' ');
            } else { // paragraphs
                for (let i = 0; i < count; i++) {
                    let p = [];
                    const numSentences = 3 + Math.floor(Math.random() * 4);
                    for (let j = 0; j < numSentences; j++) {
                        let s = [];
                        const len = 8 + Math.floor(Math.random() * 12);
                        for (let k = 0; k < len; k++) {
                            s.push(words[Math.floor(Math.random() * words.length)]);
                        }
                        let sentence = s.join(' ');
                        p.push(sentence.charAt(0).toUpperCase() + sentence.slice(1) + '.');
                    }
                    let paragraph = p.join(' ');
                    if (i === 0 && startWithLorem && optTextType.value === 'lorem') {
                        paragraph = "Lorem ipsum " + paragraph.charAt(0).toLowerCase() + paragraph.slice(1);
                    }
                    result.push(withTags ? `<p>${paragraph}</p>` : paragraph);
                }
                output.innerText = result.join('\n\n');
            }
        }

        btnGenerate.onclick = generate;

        btnCopy.onclick = () => {
            const text = output.innerText;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                toast.classList.remove('opacity-0', 'translate-y-10');
                setTimeout(() => toast.classList.add('opacity-0', 'translate-y-10'), 2000);
            });
        };

        // Init Theme
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }

        generate();
    </script>
</body>
</html>
