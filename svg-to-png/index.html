<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SVG to PNG Converter</title>
    <style>
        #preview-container { margin-top: 10px; border: 1px solid #ccc; width: 300px; height: 300px; overflow: auto; }
        #preview { max-width: 100%; }
        textarea { width: 100%; height: 200px; }
    </style>
</head>
<body>
    <h1>SVG to PNG Converter</h1>
    <input type="file" id="file-input" accept=".svg">
    <textarea id="svg-input" placeholder="Paste SVG code here..."></textarea>
    <div>
        <label>Scale: <input type="number" id="scale-input" value="1" min="0.1" step="0.1"></label>
        <label>Width: <input type="number" id="width-input" placeholder="px"></label>
        <label>Height: <input type="number" id="height-input" placeholder="px"></label>
        <label>Background: 
            <select id="bg-input">
                <option value="transparent">Transparent</option>
                <option value="#ffffff">White</option>
            </select>
        </label>
    </div>
    <button id="convert-btn">Download PNG</button>
    <div id="preview-container">
        <img id="preview" alt="Preview">
    </div>
    <script type="module" src="dist/bundle.js"></script>
</body>
</html>
