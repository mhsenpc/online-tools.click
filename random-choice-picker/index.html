<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Choice Picker | Online Tools</title>
    <meta name="description" content="A fun and functional tool to randomly pick one or more items from a provided list. 100% client-side.">
    <meta property="og:title" content="Random Choice Picker | Online Tools">
    <meta property="og:description" content="A fun and functional tool to randomly pick one or more items from a provided list.">
    <meta property="og:url" content="https://online-tools.click/random-choice-picker/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://online-tools.click/og-image.png">
    <link rel="canonical" href="https://online-tools.click/random-choice-picker/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --accent: #ff3e00;
            --accent-glow: rgba(255, 62, 0, 0.2);
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

        header { padding: 32px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

        .logo { font-size: 20px; font-weight: 700; text-decoration: none; color: var(--text); }

        main { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        .hero { text-align: center; margin-bottom: 48px; }

        .hero h1 { font-size: 48px; margin-bottom: 12px; }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 24px;
        }

        .setting-group { display: flex; flex-direction: column; gap: 16px; }

        textarea {
            width: 100%;
            height: 200px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            color: var(--text);
            font-family: var(--font-mono);
            resize: vertical;
        }

        .btn-generate {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 16px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-generate:hover { background: #ff5522; }

        .result {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            text-align: center;
            font-size: 24px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
        }

        @media (max-width: 768px) { .settings-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <a href="https://online-tools.click" class="logo">Online Tools / Random Choice Picker</a>
    </header>
    <main>
        <section class="hero">
            <h1>Random Choice Picker</h1>
            <p>Paste your list, pick an item.</p>
        </section>

        <div class="settings-grid">
            <div class="setting-group">
                <label>Items (one per line)</label>
                <textarea id="items-input" placeholder="Enter items here, one per line..."></textarea>
            </div>
            <div class="setting-group">
                <label>Number of picks</label>
                <input type="number" id="num-picks" value="1" min="1" style="background: var(--bg-input); border: 1px solid var(--border); padding: 12px; color: var(--text); border-radius: var(--radius-md);">
                <button class="btn-generate" id="pick-btn">Pick Randomly</button>
            </div>
        </div>

        <div class="result" id="result">Results will appear here</div>
    </main>

    <script>
        const input = document.getElementById('items-input');
        const numPicks = document.getElementById('num-picks');
        const btn = document.getElementById('pick-btn');
        const result = document.getElementById('result');

        btn.addEventListener('click', () => {
            const items = input.value.split('\n').filter(i => i.trim() !== '');
            const count = parseInt(numPicks.value);
            
            if (items.length === 0) {
                result.textContent = "Please enter some items.";
                return;
            }

            // Simple animation
            let iterations = 0;
            const interval = setInterval(() => {
                const randomItem = items[Math.floor(Math.random() * items.length)];
                result.textContent = randomItem;
                iterations++;
                if (iterations > 10) {
                    clearInterval(interval);
                    
                    // Final pick
                    let selected = [];
                    let shuffled = [...items].sort(() => 0.5 - Math.random());
                    selected = shuffled.slice(0, count);
                    result.textContent = selected.join(', ');
                }
            }, 100);
        });
    </script>
</body>
</html>
