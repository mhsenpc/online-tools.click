<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Tools - Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #f472b6;
            --dark: #0f0f1a;
            --light: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--light);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        canvas {
            display: block;
        }

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 2rem;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            text-shadow: 0 0 60px rgba(99, 102, 241, 0.5);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .tagline {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 3rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .coming-soon-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            backdrop-filter: blur(10px);
            margin-bottom: 3rem;
            animation: pulse-border 2s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: rgba(255, 255, 255, 0.1); }
            50% { border-color: rgba(99, 102, 241, 0.5); }
        }

        .pulse-dot {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        .badge-text {
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        .tools-preview {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            max-width: 600px;
            margin-bottom: 3rem;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .tool-card:hover::before {
            opacity: 0.1;
        }

        .tool-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            font-size: 1.2rem;
            position: relative;
            z-index: 1;
        }

        .tool-info {
            text-align: left;
            position: relative;
            z-index: 1;
        }

        .tool-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .tool-desc {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .tool-soon {
            font-size: 0.65rem;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .newsletter {
            max-width: 400px;
            width: 100%;
        }

        .newsletter-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 1rem;
        }

        .newsletter-form {
            display: flex;
            gap: 0.5rem;
        }

        .newsletter-input {
            flex: 1;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--light);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .newsletter-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .newsletter-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .newsletter-btn {
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .newsletter-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .newsletter-btn:active {
            transform: scale(0.98);
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 3rem;
        }

        .social-link {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            transform: translateY(-3px);
        }

        .cursor-follower {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary), transparent);
            pointer-events: none;
            z-index: 1000;
            opacity: 0.5;
            transition: transform 0.1s ease;
        }

        .magnetic-btn {
            transition: transform 0.2s ease;
        }

        @media (max-width: 600px) {
            .tools-preview {
                flex-direction: column;
                align-items: center;
            }
            
            .tool-card {
                width: 100%;
                max-width: 300px;
            }

            .newsletter-form {
                flex-direction: column;
            }

            .newsletter-btn {
                width: 100%;
            }
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }

        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: var(--accent);
            margin-left: 4px;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float-shape 20s linear infinite;
        }

        @keyframes float-shape {
            0% {
                transform: translateY(100vh) rotate(0deg);
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

        <canvas id="particles"></canvas>
    </div>

    <div class="floating-shapes" id="floating-shapes"></div>

    <div class="cursor-follower" id="cursor-follower"></div>

    <div class="content">
        <div class="logo-container">
            <h1 class="logo">ONLINE TOOLS</h1>
        </div>
        
        <p class="tagline">Your All-in-One Utility Hub</p>

        <div class="coming-soon-badge">
            <div class="pulse-dot"></div>
            <span class="badge-text">Coming Soon</span>
        </div>

        <div class="tools-preview" id="tools-preview">
            <div class="tool-card magnetic-btn">

            <div class="tool-card magnetic-btn">
                <div class="tool-icon">Aa</div>
                <div class="tool-info">
                    <div class="tool-name">Text Tools</div>
                    <div class="tool-desc">Transform & analyze text</div>
                </div>
                <span class="tool-soon">Soon</span>
            </div>
            <div class="tool-card magnetic-btn">
                <div class="tool-icon">⟲</div>
                <div class="tool-info">
                    <div class="tool-name">URL Encoder</div>
                    <div class="tool-desc">Encode & decode URLs</div>
                </div>
                <span class="tool-soon">Soon</span>
            </div>
        </div>

        <div class="newsletter">
            <p class="newsletter-text">Get notified when we launch</p>
            <form class="newsletter-form" id="newsletter-form">
                <input type="email" class="newsletter-input" placeholder="your@email.com" required>
                <button type="submit" class="newsletter-btn magnetic-btn">Notify Me</button>
            </form>
        </div>

        <div class="social-links">
            <a href="#" class="social-link" title="Twitter">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">

                </svg>

            <a href="#" class="social-link" title="GitHub">

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const cursorFollower = document.getElementById('cursor-follower');
        let mouseX = 0, mouseY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.hue = Math.random() * 60 + 230;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 150) {
                    const force = (150 - dist) / 150;
                    this.x -= dx * force * 0.02;
                    this.y -= dy * force * 0.02;
                    this.opacity = Math.min(0.8, this.opacity + force * 0.1);
                } else {
                    this.opacity = Math.max(0.1, this.opacity - 0.01);
                }

                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(99, 102, 241, ${0.1 * (1 - dist / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            drawConnections();
            requestAnimationFrame(animate);
        }

        animate();

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            cursorFollower.style.left = e.clientX - 10 + 'px';
            cursorFollower.style.top = e.clientY - 10 + 'px';
        });

        const magneticBtns = document.querySelectorAll('.magnetic-btn');
        magneticBtns.forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
            });

            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'translate(0, 0)';
            });
        });

        const floatingShapes = document.getElementById('floating-shapes');
        const shapes = ['◆', '●', '▲', '★', '♦'];
        
        for (let i = 0; i < 15; i++) {
            const shape = document.createElement('div');
            shape.className = 'shape';
            shape.textContent = shapes[Math.floor(Math.random() * shapes.length)];
            shape.style.left = Math.random() * 100 + '%';
            shape.style.fontSize = Math.random() * 20 + 10 + 'px';
            shape.style.animationDuration = Math.random() * 20 + 15 + 's';
            shape.style.animationDelay = Math.random() * -20 + 's';
            floatingShapes.appendChild(shape);
        }

        const newsletterForm = document.getElementById('newsletter-form');
        newsletterForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = newsletterForm.querySelector('.newsletter-btn');
            const originalText = btn.textContent;
            btn.textContent = '✓ Subscribed!';
            btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            
            createConfetti();
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = 'linear-gradient(135deg, var(--primary), var(--secondary))';
                newsletterForm.reset();
            }, 2000);
        });

        function createConfetti() {
            const colors = ['#6366f1', '#8b5cf6', '#f472b6', '#fbbf24', '#34d399'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-20px';
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = Math.random() * 10 + 5 + 'px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                document.body.appendChild(confetti);

                const duration = Math.random() * 2000 + 2000;
                const xMove = (Math.random() - 0.5) * 200;

                confetti.animate([
                    { transform: `translateY(0) translateX(0) rotate(0deg)`, opacity: 1 },
                    { transform: `translateY(100vh) translateX(${xMove}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                }).onfinish = () => confetti.remove();
            }
        }

        const toolCards = document.querySelectorAll('.tool-card');
        toolCards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                const icon = card.querySelector('.tool-icon');
                icon.style.transform = 'scale(1.1) rotate(5deg)';
                setTimeout(() => {
                    icon.style.transform = 'scale(1) rotate(0deg)';
                }, 200);
            });
        });

        let ticking = false;
        document.addEventListener('mousemove', (e) => {
            if (!ticking) {
                requestAnimationFrame(() => {
                    const rotationX = (e.clientY / window.innerHeight - 0.5) * 10;
                    const rotationY = (e.clientX / window.innerWidth - 0.5) * 10;
                    document.querySelector('.content').style.transform = `perspective(1000px) rotateX(${-rotationX}deg) rotateY(${rotationY}deg)`;
                    ticking = false;
                });
                ticking = true;
            }
        });

        const toolNames = ['JSON Viewer', 'MD5 Decoder', 'Text Tools', 'URL Encoder'];
        let currentToolIndex = 0;
        let currentCharIndex = 0;
        let isDeleting = false;
        let typedText = '';

        function typeWriter() {
            const currentTool = toolNames[currentToolIndex];
            
            if (!isDeleting) {
                typedText = currentTool.substring(0, currentCharIndex + 1);
                currentCharIndex++;
                
                if (currentCharIndex === currentTool.length) {
                    isDeleting = true;
                    setTimeout(typeWriter, 2000);
                    return;
                }
            } else {
                typedText = currentTool.substring(0, currentCharIndex - 1);
                currentCharIndex--;
                
                if (currentCharIndex === 0) {
                    isDeleting = false;
                    currentToolIndex = (currentToolIndex + 1) % toolNames.length;
                }
            }
            
            const toolCards = document.querySelectorAll('.tool-card');
            toolCards.forEach((card, index) => {
                const nameEl = card.querySelector('.tool-name');
                if (index === currentToolIndex) {
                    nameEl.innerHTML = typedText + '<span class="typing-cursor"></span>';
                } else {
                    nameEl.textContent = nameEl.textContent;
                }
            });
            
            setTimeout(typeWriter, isDeleting ? 50 : 100);
        }

        setTimeout(typeWriter, 1000);

        const style = document.createElement('style');
        document.head.appendChild(style);

        let lastTime = 0;
        const throttleMs = 50;

        document.addEventListener('mousemove', (e) => {
            const now = Date.now();
            if (now - lastTime >= throttleMs) {
                lastTime = now;
                
                const orb = document.createElement('div');
                orb.style.cssText = `
                    position: fixed;
                    left: ${e.clientX}px;
                    top: ${e.clientY}px;
                    width: 6px;
                    height: 6px;
                    background: radial-gradient(circle, rgba(99, 102, 241, 0.8), transparent);
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 999;
                `;
                document.body.appendChild(orb);
                
                orb.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: 'translate(-50%, -50%) scale(0)', opacity: 0 }
                ], {
                    duration: 500,
                    easing: 'ease-out'
                }).onfinish = () => orb.remove();
            }
        });

        window.addEventListener('deviceorientation', (e) => {
            if (e.gamma !== null && e.beta !== null) {
                const x = e.gamma / 90;
                const y = e.beta / 90;
                document.body.style.background = `
                    radial-gradient(
                        ellipse at ${50 + x * 30}% ${50 + y * 30}%,
                        rgba(99, 102, 241, 0.15) 0%,
                        transparent 50%
                    ),
                    var(--dark)
                `;
            }
        });
    </script>
</body>
</html>
