<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSL Certificate Decoder | online-tools.click</title>
    <meta name="description" content="Decode SSL/TLS certificates locally in your browser.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.9.0/jsrsasign-all-min.js"></script>
    <style>
        .output-box { @apply bg-gray-50 dark:bg-gray-800 p-4 rounded-xl font-mono text-sm break-all overflow-auto; min-height: 300px; }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider">online-tools.click</a>
            <h1 class="text-3xl font-bold mt-2">SSL/TLS Certificate Decoder</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-4">
                <textarea id="in-pem" class="w-full h-96 bg-white dark:bg-gray-900 rounded-2xl p-4 font-mono text-sm outline-none border border-gray-200 dark:border-gray-800 focus:border-blue-500" placeholder="Paste your PEM certificate here..."></textarea>
                <button id="btn-decode" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">Decode Certificate</button>
            </div>
            
            <div class="space-y-4">
                <div class="output-box" id="output">Decoded details will appear here...</div>
                <button id="btn-copy" class="w-full py-3 bg-gray-200 dark:bg-gray-800 rounded-xl font-bold hover:bg-gray-300 dark:hover:bg-gray-700">Copy JSON</button>
            </div>
        </div>
    </div>

    <script>
        const inPem = document.getElementById('in-pem');
        const output = document.getElementById('output');
        const btnDecode = document.getElementById('btn-decode');
        const btnCopy = document.getElementById('btn-copy');

        btnDecode.onclick = () => {
            try {
                const pem = inPem.value.trim();
                const cert = new X509();
                cert.readCertPEM(pem);
                
                const details = {
                    subject: cert.getSubjectString(),
                    issuer: cert.getIssuerString(),
                    serial: cert.getSerialNumberHex(),
                    notBefore: cert.getNotBefore(),
                    notAfter: cert.getNotAfter(),
                    version: cert.getVersion()
                };
                
                output.innerText = JSON.stringify(details, null, 2);
            } catch(e) {
                output.innerText = "Error decoding certificate: " + e.message;
            }
        };

        btnCopy.onclick = () => navigator.clipboard.writeText(output.innerText);
    </script>
</body>
</html>
