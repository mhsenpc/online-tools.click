<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Shadow Generator</title>
    <style>
        #preview { width: 200px; height: 200px; background: white; margin: 20px; }
        .control { margin: 10px; }
    </style>
</head>
<body>
    <h1>CSS Shadow Generator</h1>
    <div id="preview"></div>
    <div class="control"><label>X:</label><input type="range" id="x" min="-50" max="50" value="10"></div>
    <div class="control"><label>Y:</label><input type="range" id="y" min="-50" max="50" value="10"></div>
    <div class="control"><label>Blur:</label><input type="range" id="blur" min="0" max="100" value="20"></div>
    <div class="control"><label>Spread:</label><input type="range" id="spread" min="-50" max="50" value="0"></div>
    <div class="control"><label>Color:</label><input type="color" id="color" value="#000000"></div>
    <div class="control"><label>Opacity:</label><input type="range" id="opacity" min="0" max="1" step="0.1" value="0.5"></div>
    <textarea id="code-output" readonly></textarea>
    <script type="module" src="dist/bundle.js"></script>
</body>
</html>
