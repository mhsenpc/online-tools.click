<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Shadow Generator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #preview-box { width: 150px; height: 150px; background: #ddd; margin: 40px auto; border-radius: 8px; }
        .controls { display: grid; gap: 10px; max-width: 400px; margin: 0 auto; }
        .control-group { display: flex; justify-content: space-between; }
        #css-output { width: 100%; height: 50px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>CSS Shadow Generator</h1>
    <div id="preview-box"></div>
    <div class="controls">
        <div class="control-group"><label>X:</label><input type="range" id="x" min="-50" max="50" value="10"></div>
        <div class="control-group"><label>Y:</label><input type="range" id="y" min="-50" max="50" value="10"></div>
        <div class="control-group"><label>Blur:</label><input type="range" id="blur" min="0" max="100" value="20"></div>
        <div class="control-group"><label>Spread:</label><input type="range" id="spread" min="-50" max="50" value="0"></div>
        <div class="control-group"><label>Color:</label><input type="color" id="color" value="#000000"></div>
        <div class="control-group"><label>Opacity:</label><input type="range" id="opacity" min="0" max="1" step="0.1" value="0.5"></div>
    </div>
    <textarea id="css-output" readonly></textarea>
    <button id="copy-btn">Copy CSS</button>
    <script type="module" src="dist/bundle.js"></script>
</body>
</html>
