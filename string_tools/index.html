<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Tools | online-tools.click</title>
    <meta name="description" content="Simple and fast text transformations.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .output-box { @apply bg-white dark:bg-gray-900 border-2 border-gray-200 dark:border-gray-800 rounded-xl p-4 font-mono text-sm break-all; min-height: 200px; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GHGXLWQR4V"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag("js", new Date());
      gtag("config", "G-GHGXLWQR4V");
    </script>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans">

    <div class="max-w-2xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider">online-tools.click</a>
            <h1 class="text-3xl font-bold mt-2">String Tools</h1>
        </header>

        <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 shadow-sm space-y-6">
            <textarea id="in-text" class="w-full h-40 bg-gray-50 dark:bg-gray-800 rounded-xl p-4 font-mono text-sm outline-none border border-transparent focus:border-blue-500" placeholder="Enter text here..."></textarea>
            
            <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
                <button onclick="transform('upper')" class="py-2 bg-gray-200 dark:bg-gray-800 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-700">UPPERCASE</button>
                <button onclick="transform('lower')" class="py-2 bg-gray-200 dark:bg-gray-800 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-700">lowercase</button>
                <button onclick="transform('title')" class="py-2 bg-gray-200 dark:bg-gray-800 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-700">Title Case</button>
                <button onclick="transform('sentence')" class="py-2 bg-gray-200 dark:bg-gray-800 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-700">Sentence case</button>
                <button onclick="transform('reverse')" class="py-2 bg-gray-200 dark:bg-gray-800 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-700">Reverse</button>
            </div>

            <div class="output-box" id="output"></div>
            <button id="btn-copy" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        const inText = document.getElementById('in-text');
        const output = document.getElementById('output');
        const btnCopy = document.getElementById('btn-copy');

        function transform(type) {
            const text = inText.value;
            let result = '';
            switch(type) {
                case 'upper': result = text.toUpperCase(); break;
                case 'lower': result = text.toLowerCase(); break;
                case 'title': result = text.replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase()); break;
                case 'sentence': result = text.charAt(0).toUpperCase() + text.slice(1).toLowerCase(); break;
                case 'reverse': result = text.split('').reverse().join(''); break;
            }
            output.innerText = result;
        }

        btnCopy.onclick = () => navigator.clipboard.writeText(output.innerText);
    </script>
</body>
</html>
