<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Color Hex Generator | Online Tools</title>
    <meta name="description" content="Generate random hex color codes. Bulk generation up to 50 colors with visual previews and copy to clipboard. 100% client-side.">
    <meta property="og:title" content="Random Color Hex Generator | Online Tools">
    <meta property="og:description" content="Generate random hex color codes. Bulk generation up to 50 colors with visual previews and copy to clipboard.">
    <meta property="og:url" content="https://online-tools.click/random_color_hex_generator/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://online-tools.click/og-image.png">
    <link rel="canonical" href="https://online-tools.click/random_color_hex_generator/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --accent: #ff3e00;
            --radius-md: 12px;
            --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; }
        header { padding: 32px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .logo { font-weight: 700; text-decoration: none; color: var(--text); }
        .logo-sep { color: var(--text-muted); }
        .logo-sub { color: var(--text-secondary); }
        .header-right a { color: var(--text-secondary); text-decoration: none; padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
        
        main { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 48px; }
        .hero h1 { font-size: 40px; margin-bottom: 12px; }
        .hero p { color: var(--text-secondary); }

        .settings-container { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 40px; background: var(--bg-elevated); padding: 24px; border-radius: var(--radius-md); border: 1px solid var(--border); }
        .input-group { display: flex; align-items: center; gap: 12px; }
        input[type="number"] { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 6px; width: 60px; font-family: var(--font-mono); }
        button { background: var(--accent); color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button:hover { background: #ff5522; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
        .color-card { background: var(--bg-elevated); padding: 12px; border-radius: 8px; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: transform 0.1s; }
        .color-card:hover { transform: translateY(-2px); border-color: var(--border-focus); }
        .swatch { height: 80px; border-radius: 4px; margin-bottom: 8px; border: 1px solid rgba(0,0,0,0.1); }
        .hex-code { font-family: var(--font-mono); font-size: 14px; color: var(--text-secondary); }

        .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg-elevated); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="https://online-tools.click" class="logo">Online Tools</a><span class="logo-sep"> / </span><span class="logo-sub">Hex Generator</span>
        </div>
        <div class="header-right">
            <a href="https://online-tools.click">All Tools</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Random Color Hex Generator</h1>
            <p>Generate random, high-quality hex color codes.</p>
        </section>

        <div class="settings-container">
            <div class="input-group">
                <label>Count:</label>
                <input type="number" id="count-input" value="10" min="1" max="50">
            </div>
            <button id="generate-btn">Generate Colors</button>
            <button id="copy-all-btn" style="background: var(--bg-input);">Copy All</button>
        </div>

        <div class="grid" id="color-grid"></div>
    </main>

    <div class="toast" id="toast">Copied to clipboard</div>

    <script>
        const colorGrid = document.getElementById('color-grid');
        const countInput = document.getElementById('count-input');
        const generateBtn = document.getElementById('generate-btn');
        const copyAllBtn = document.getElementById('copy-all-btn');
        const toast = document.getElementById('toast');

        let currentColors = [];

        function randomHex() {
            return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        }

        function generate() {
            const count = Math.min(Math.max(parseInt(countInput.value) || 1, 1), 50);
            currentColors = [];
            colorGrid.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const color = randomHex();
                currentColors.push(color);
                const card = document.createElement('div');
                card.className = 'color-card';
                card.innerHTML = `
                    <div class="swatch" style="background-color: ${color}"></div>
                    <div class="hex-code">${color}</div>
                `;
                card.onclick = () => copyText(color);
                colorGrid.appendChild(card);
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                toast.textContent = 'Copied: ' + text;
                toast.classList.add('visible');
                setTimeout(() => toast.classList.remove('visible'), 1500);
            });
        }

        generateBtn.onclick = generate;
        copyAllBtn.onclick = () => copyText(currentColors.join('\n'));
        
        generate();
    </script>
</body>
</html>
