<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Escaper/Unescaper — Free Online Tool</title>
  <meta name="description" content="Free online HTML escaper and unescaper. Escape special characters to HTML entities or unescape existing HTML entities instantly." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
    // Dark mode logic
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || (saved === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans">
  <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 shadow-sm p-4">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <h1 class="text-xl font-bold">HTML Escaper/Unescaper</h1>
      <button onclick="toggleTheme()" class="p-2 rounded bg-gray-100 dark:bg-gray-700">Toggle Theme</button>
    </div>
  </header>
  <main class="max-w-4xl mx-auto p-4 space-y-4">
    <textarea id="input" class="w-full h-40 p-4 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter text/HTML here..."></textarea>
    <div class="flex gap-2">
      <button onclick="process('escape')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold transition">Escape</button>
      <button onclick="process('unescape')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold transition">Unescape</button>
      <button onclick="copyToClipboard()" class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 px-4 py-2 rounded-lg font-semibold transition">Copy Output</button>
    </div>
    <textarea id="output" class="w-full h-40 p-4 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Result will appear here..." readonly></textarea>
  </main>
  <script>
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    function process(mode) {
      const input = document.getElementById('input').value;
      const output = document.getElementById('output');
      
      if (mode === 'escape') {
        const map = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;'
        };
        output.value = input.replace(/[&<>"']/g, m => map[m]);
      } else {
        const doc = new DOMParser().parseFromString(input, 'text/html');
        output.value = doc.documentElement.textContent;
      }
    }

    function copyToClipboard() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('Copied to clipboard!');
    }
  </script>
</body>
</html>
