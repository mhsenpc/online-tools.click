<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG to Data URI Converter | Online Tools</title>
    <style>
        :root {
            --bg: #050505;
            --fg: #ffffff;
            --accent: #ff3e00;
            --surface: #111111;
            --border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--fg); padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        textarea { width: 100%; height: 200px; background: var(--surface); color: var(--fg); border: 1px solid var(--border); padding: 1rem; margin-top: 1rem;}
        button { background: var(--accent); color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; margin-top: 1rem;}
    </style>
</head>
<body>
    <div class="container">
        <h1>SVG to Data URI Converter</h1>
        <textarea id="svgInput" placeholder="Paste your SVG here..."></textarea>
        <div style="margin-top: 1rem;">
            <button onclick="convert('base64')">Base64</button>
            <button onclick="convert('url')">URL Encoded</button>
            <button onclick="copyOutput()">Copy to Clipboard</button>
        </div>
        <textarea id="output" placeholder="Output will appear here..." readonly></textarea>
        <div id="preview" style="margin-top: 1rem; border: 1px solid var(--border); padding: 1rem; background: white; min-height: 100px;"></div>
    </div>
    <script>
        function convert(type) {
            let svg = document.getElementById('svgInput').value;
            // Simple optimization
            svg = svg.replace(/\s+/g, ' ')       // collapse whitespace
                     .replace(/>\s+</g, '><')    // remove spaces between tags
                     .replace(/<!--.*?-->/g, '') // remove comments
                     .trim();
            
            let encoded;
            if (type === 'base64') {
                encoded = 'data:image/svg+xml;base64,' + btoa(svg);
            } else {
                encoded = 'data:image/svg+xml,' + encodeURIComponent(svg);
            }
            document.getElementById('output').value = encoded;
            document.getElementById('preview').innerHTML = `<img src="${encoded}" style="max-width: 100%;" />`;
        }
        function copyOutput() {
            const output = document.getElementById('output');
            output.select();
            document.execCommand('copy');
            alert('Copied to clipboard!');
        }
    </script>
</body>
</html>
