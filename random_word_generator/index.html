<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Word Generator | online-tools.click</title>
    <meta name="description" content="Free, fast, and secure online Random Word generator. Generate random words for testing, games, or placeholders instantly.">
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
        }
        .dark {
            --bg-card: #111827;
            --text-main: #f9fafb;
        }
        
        body { transition: background-color 0.2s, color 0.2s; }

        .output-area {
            @apply w-full bg-white dark:bg-gray-900 border-2 border-gray-200 dark:border-gray-800 rounded-2xl p-6 text-sm leading-relaxed outline-none focus:border-blue-500 transition-all shadow-inner overflow-y-auto;
            min-height: 300px;
        }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans overflow-y-auto">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="text-center mb-10">
            <div class="mb-4">
                <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider hover:opacity-80 transition-opacity">
                    online-tools.click
                </a>
            </div>
            <h1 class="text-4xl font-bold mb-2 tracking-tight">Random Word Generator</h1>
            <p class="text-gray-500 dark:text-gray-400 text-lg">Generate random words instantly.</p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Settings -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 shadow-sm space-y-6">
                    <!-- Quantity -->
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Quantity</label>
                        <select id="opt-quantity" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2 text-sm outline-none transition-all">
                            <option value="1">1 Word</option>
                            <option value="5">5 Words</option>
                            <option value="10">10 Words</option>
                        </select>
                    </div>

                    <!-- Length Constraints -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Min Length</label>
                            <input type="number" id="opt-min-len" value="3" min="1" max="20" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2 text-sm outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Max Length</label>
                            <input type="number" id="opt-max-len" value="10" min="1" max="20" class="w-full bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2 text-sm outline-none transition-all">
                        </div>
                    </div>

                    <button id="btn-generate" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg shadow-blue-500/20 transition-all active:scale-95">
                        Generate
                    </button>
                </div>
            </div>

            <!-- Output -->
            <div class="lg:col-span-8 space-y-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400">Generated Words</h2>
                    <button id="btn-copy" class="text-xs font-bold text-blue-500 hover:text-blue-600 uppercase tracking-tighter transition-colors">Copy to Clipboard</button>
                </div>
                <div id="output-text" class="output-area" contenteditable="false"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="mt-16 text-center text-xs text-gray-400 dark:text-gray-600 border-t border-gray-200 dark:border-gray-800 pt-8 space-y-4">
            <p>🔒 100% Client-Side: Your content stays in the browser. No tracking or logging.</p>
            <div class="flex justify-center gap-4">
                <button onclick="document.documentElement.classList.toggle('dark')" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-tighter">Toggle Theme</button>
                <span>&bull;</span>
                <a href="https://online-tools.click" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-tighter">Utility Hub</a>
            </div>
        </footer>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-2 bg-gray-900 text-white text-sm font-medium rounded-full shadow-2xl opacity-0 translate-y-10 pointer-events-none transition-all duration-300 z-50">
        Copied!
    </div>

    <script>
        const dictionary = ["apple", "banana", "cherry", "date", "elderberry", "fig", "grape", "honeydew", "kiwi", "lemon", "mango", "nectarine", "orange", "papaya", "quince", "raspberry", "strawberry", "tangerine", "ugli", "vanilla", "watermelon", "xigua", "yam", "zucchini", "able", "about", "above", "across", "add", "after", "again", "against", "ago", "air", "all", "almost", "alone", "along", "already", "also", "although", "always", "among", "an", "and", "another", "any", "anything", "appear", "are", "area", "around", "as", "ask", "at", "away", "back", "bad", "be", "became", "because", "become", "been", "before", "began", "begin", "behind", "being", "believe", "best", "better", "between", "big", "black", "blue", "body", "both", "book", "boy", "bring", "build", "but", "by", "call", "came", "can", "cannot", "car", "case", "center", "certain", "change", "child", "children", "city", "class", "clear", "close", "come", "could", "course", "cut", "day", "did", "different", "do", "does", "done", "door", "down", "during", "each", "early", "earth", "easy", "eat", "end", "enough", "even", "ever", "every", "example", "eye", "face", "fact", "family", "far", "fast", "father", "feel", "few", "find", "fire", "first", "five", "follow", "food", "for", "form", "found", "four", "friend", "from", "front", "full", "game", "gave", "get", "girl", "give", "go", "good", "got", "government", "great", "group", "grow", "had", "hand", "happen", "hard", "has", "have", "he", "head", "hear", "help", "her", "here", "high", "him", "his", "hold", "home", "horse", "hot", "hour", "house", "how", "however", "hundred", "I", "idea", "if", "important", "in", "increase", "into", "is", "it", "its", "job", "just", "keep", "kind", "knew", "know", "land", "large", "last", "later", "laugh", "lead", "learn", "leave", "left", "less", "let", "letter", "life", "light", "like", "line", "list", "little", "live", "long", "look", "love", "low", "made", "make", "man", "many", "may", "me", "mean", "men", "might", "mile", "mind", "miss", "money", "more", "morning", "most", "mother", "mountain", "move", "much", "must", "my", "name", "near", "need", "never", "new", "next", "night", "no", "not", "nothing", "now", "number", "of", "off", "often", "old", "on", "once", "one", "only", "open", "or", "order", "other", "our", "out", "over", "own", "page", "part", "people", "per", "place", "plan", "play", "point", "possible", "present", "problem", "program", "public", "put", "question", "quite", "ran", "read", "real", "really", "reason", "right", "run", "said", "same", "saw", "say", "school", "see", "seem", "seen", "self", "sentence", "set", "several", "she", "should", "show", "side", "since", "small", "so", "some", "something", "soon", "sound", "stand", "start", "state", "stay", "still", "stop", "story", "study", "such", "sure", "system", "take", "talk", "tell", "ten", "than", "that", "the", "their", "them", "then", "there", "these", "they", "thing", "think", "this", "those", "though", "thought", "three", "through", "time", "to", "together", "too", "took", "top", "toward", "town", "tree", "true", "try", "turn", "two", "under", "until", "up", "upon", "us", "use", "used", "very", "voice", "wait", "walk", "want", "war", "was", "watch", "water", "way", "we", "well", "went", "were", "what", "when", "where", "which", "while", "white", "who", "whole", "why", "will", "with", "within", "without", "woman", "word", "work", "world", "would", "write", "year", "yet", "you", "young", "your"];

        const output = document.getElementById('output-text');
        const btnGenerate = document.getElementById('btn-generate');
        const btnCopy = document.getElementById('btn-copy');
        const optQuantity = document.getElementById('opt-quantity');
        const optMinLen = document.getElementById('opt-min-len');
        const optMaxLen = document.getElementById('opt-max-len');
        const toast = document.getElementById('toast');

        function generate() {
            const quantity = parseInt(optQuantity.value);
            const minLen = parseInt(optMinLen.value);
            const maxLen = parseInt(optMaxLen.value);

            const filteredWords = dictionary.filter(w => w.length >= minLen && w.length <= maxLen);
            
            if (filteredWords.length === 0) {
                output.innerText = "No words found with these length constraints.";
                return;
            }

            let result = [];
            for (let i = 0; i < quantity; i++) {
                result.push(filteredWords[Math.floor(Math.random() * filteredWords.length)]);
            }

            output.innerText = result.join(' ');
        }

        btnGenerate.onclick = generate;

        btnCopy.onclick = () => {
            const text = output.innerText;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                toast.classList.remove('opacity-0', 'translate-y-10');
                setTimeout(() => toast.classList.add('opacity-0', 'translate-y-10'), 2000);
            });
        };

        generate();
    </script>
</body>
</html>
