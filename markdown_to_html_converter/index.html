<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            --bg-editor: #ffffff;
            --text-editor: #1a1a1a;
            --bg-preview: #f8f9fa;
        }
        .dark {
            --bg-editor: #0d1117;
            --text-editor: #c9d1d9;
            --bg-preview: #161b22;
        }

        body {
            transition: background-color 0.2s, color 0.2s;
        }

        .editor-textarea {
            background-color: var(--bg-editor);
            color: var(--text-editor);
            caret-color: #3b82f6;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        .html-code-area {
            background-color: var(--bg-preview);
            color: var(--text-editor);
            resize: none;
            outline: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #30363d;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
            background-color: transparent !important;
        }

        @media (max-width: 767px) {
            .markdown-body {
                padding: 15px;
            }
        }

        .dark .markdown-body {
            color: #c9d1d9;
        }

        /* Prism.js overrides */
        .dark pre[class*="language-"] {
            background: #1a1f26 !important;
        }

        /* Copy button animation */
        .copy-btn:active {
            transform: scale(0.95);
        }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GHGXLWQR4V"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

</head>
<body class="h-screen overflow-hidden bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans">

    <!-- Header / Navbar -->
    <header class="flex items-center justify-between px-6 py-3 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 z-20 relative">
        <div class="flex items-center gap-4">
            <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider hover:opacity-80 transition-opacity">
                online-tools.click
            </a>
            <div class="h-4 w-px bg-gray-300 dark:bg-gray-700"></div>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                Markdown to HTML Converter
            </h1>
        </div>

        <div class="flex items-center gap-3">
            <button id="btn-theme-toggle" class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" aria-label="Toggle theme">
                <svg id="sun-icon" class="hidden w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 17.657l.707.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
                <svg id="moon-icon" class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"></path></svg>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex flex-col lg:flex-row h-[calc(100vh-60px)] overflow-hidden">

        <!-- Left Panel: Markdown Input -->
        <section class="w-full lg:w-1/2 flex flex-col border-b lg:border-b-0 lg:border-r border-gray-200 dark:border-gray-800 h-full">
            <div class="flex items-center justify-between px-4 py-2 bg-gray-100 dark:bg-gray-800 text-xs font-bold text-gray-500 uppercase tracking-widest border-b border-gray-200 dark:border-gray-800">
                <span>Markdown Input</span>
                <span id="char-count">0 characters</span>
            </div>
            <textarea
                id="markdown-input"
                class="editor-textarea flex-1 p-6 font-mono text-sm leading-relaxed"
                placeholder="# Enter your Markdown here

Try some examples:
- **Bold text**
- *Italic text*
- [Links](https://example.com)
- `code`

Tables and task lists work too!"
            ></textarea>
        </section>

        <!-- Right Panel: Preview & HTML Code -->
        <section class="w-full lg:w-1/2 flex flex-col h-full overflow-hidden">

            <!-- Tab Navigation -->
            <div class="flex border-b border-gray-200 dark:border-gray-800 bg-gray-100 dark:bg-gray-800">
                <button id="tab-preview" class="flex-1 px-4 py-2 text-xs font-bold uppercase tracking-widest text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 border-b-2 border-blue-600 text-blue-600 dark:text-blue-400 transition-colors">
                    Preview
                </button>
                <button id="tab-html" class="flex-1 px-4 py-2 text-xs font-bold uppercase tracking-widest text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 border-b-2 border-transparent hover:border-gray-300 dark:hover:border-gray-600 transition-colors">
                    HTML Code
                </button>
            </div>

            <!-- Preview Panel -->
            <div id="panel-preview" class="flex-1 overflow-y-auto bg-white dark:bg-gray-950">
                <div id="markdown-preview" class="markdown-body"></div>
            </div>

            <!-- HTML Code Panel -->
            <div id="panel-html" class="hidden flex-1 flex flex-col bg-gray-900 dark:bg-gray-950">
                <div class="flex items-center justify-between px-4 py-2 bg-gray-800 border-b border-gray-700">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Raw HTML Code</span>
                    <button id="btn-copy-html" class="copy-btn flex items-center gap-1.5 px-3 py-1 text-xs font-medium bg-blue-600 hover:bg-blue-700 text-white rounded shadow-sm transition-all">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m-7 10l7-7"></path></svg>
                        <span id="copy-text">Copy HTML</span>
                    </button>
                </div>
                <textarea
                    id="html-output"
                    class="html-code-area flex-1 p-4 font-mono text-xs leading-relaxed text-green-400"
                    readonly
                ></textarea>
            </div>
        </section>
    </main>

    <script>
        // Configure marked for GFM support
        marked.setOptions({
            gfm: true,
            breaks: true,
            headerIds: false,
            mangle: false
        });

        // DOM Elements
        const markdownInput = document.getElementById('markdown-input');
        const markdownPreview = document.getElementById('markdown-preview');
        const htmlOutput = document.getElementById('html-output');
        const charCount = document.getElementById('char-count');
        const btnCopyHtml = document.getElementById('btn-copy-html');
        const copyText = document.getElementById('copy-text');
        const btnThemeToggle = document.getElementById('btn-theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const tabPreview = document.getElementById('tab-preview');
        const tabHtml = document.getElementById('tab-html');
        const panelPreview = document.getElementById('panel-preview');
        const panelHtml = document.getElementById('panel-html');

        // Initialize theme
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        }

        // Theme toggle
        btnThemeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                localStorage.setItem('theme', 'light');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        });

        // Tab switching
        tabPreview.addEventListener('click', () => {
            tabPreview.classList.add('border-blue-600', 'text-blue-600', 'dark:text-blue-400');
            tabPreview.classList.remove('border-transparent');
            tabHtml.classList.remove('border-blue-600', 'text-blue-600', 'dark:text-blue-400');
            tabHtml.classList.add('border-transparent');
            panelPreview.classList.remove('hidden');
            panelHtml.classList.add('hidden');
        });

        tabHtml.addEventListener('click', () => {
            tabHtml.classList.add('border-blue-600', 'text-blue-600', 'dark:text-blue-400');
            tabHtml.classList.remove('border-transparent');
            tabPreview.classList.remove('border-blue-600', 'text-blue-600', 'dark:text-blue-400');
            tabPreview.classList.add('border-transparent');
            panelHtml.classList.remove('hidden');
            panelPreview.classList.add('hidden');
        });

        // Convert markdown to HTML
        function convertMarkdown() {
            const markdownText = markdownInput.value;

            // Update character count
            charCount.textContent = `${markdownText.length} characters`;

            // Convert to HTML and sanitize
            const rawHtml = marked.parse(markdownText);
            const cleanHtml = DOMPurify.sanitize(rawHtml);

            // Update preview
            markdownPreview.innerHTML = cleanHtml;

            // Update HTML code output
            htmlOutput.value = cleanHtml;

            // Highlight code blocks in preview
            if (typeof Prism !== 'undefined') {
                Prism.highlightAllUnder(markdownPreview);
            }
        }

        // Real-time conversion
        markdownInput.addEventListener('input', convertMarkdown);

        // Copy HTML to clipboard
        btnCopyHtml.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(htmlOutput.value);
                const originalText = copyText.textContent;
                copyText.textContent = 'Copied!';
                btnCopyHtml.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                btnCopyHtml.classList.add('bg-green-600', 'hover:bg-green-700');

                setTimeout(() => {
                    copyText.textContent = originalText;
                    btnCopyHtml.classList.remove('bg-green-600', 'hover:bg-green-700');
                    btnCopyHtml.classList.add('bg-blue-600', 'hover:bg-blue-700');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy:', err);
                // Fallback for older browsers
                htmlOutput.select();
                document.execCommand('copy');
            }
        });

        // Handle tab key in textarea
        markdownInput.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = markdownInput.selectionStart;
                const end = markdownInput.selectionEnd;
                markdownInput.value = markdownInput.value.substring(0, start) + '    ' + markdownInput.value.substring(end);
                markdownInput.selectionStart = markdownInput.selectionEnd = start + 4;
                convertMarkdown();
            }
        });

        // Initial conversion
        convertMarkdown();
    </script>
</body>
</html>
