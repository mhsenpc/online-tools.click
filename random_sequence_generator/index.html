<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Sequence Generator | Online Tools</title>
    <meta name="description" content="Generate random sequences of numbers or items. Customizable, non-repeating, and client-side secure.">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent: #ff3e00;
            --border: rgba(255, 255, 255, 0.12);
        }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--bg-elevated); border: 1px solid var(--border); padding: 24px; border-radius: 12px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-secondary); }
        input, textarea, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: #222; color: white; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        #result { background: #222; padding: 15px; border-radius: 6px; margin-top: 15px; word-break: break-all; min-height: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Random Sequence Generator</h1>
        <div class="card">
            <div class="input-group">
                <label>Mode</label>
                <select id="mode">
                    <option value="numbers">Numbers (Range)</option>
                    <option value="custom">Custom Items</option>
                </select>
            </div>
            <div id="numbers-settings">
                <div class="input-group">
                    <label>Min</label>
                    <input type="number" id="min" value="1">
                </div>
                <div class="input-group">
                    <label>Max</label>
                    <input type="number" id="max" value="100">
                </div>
            </div>
            <div id="custom-settings" style="display: none;">
                <div class="input-group">
                    <label>Items (One per line)</label>
                    <textarea id="items" rows="5">Item 1
Item 2
Item 3</textarea>
                </div>
            </div>
            <div class="input-group">
                <label>Quantity</label>
                <input type="number" id="quantity" value="5">
            </div>
            <button id="generate">Generate Sequence</button>
            <div id="result"></div>
            <button id="copy" style="margin-top: 10px; background: #444;">Copy</button>
        </div>
    </div>
    <script>
        const mode = document.getElementById('mode');
        const numbersSettings = document.getElementById('numbers-settings');
        const customSettings = document.getElementById('custom-settings');
        
        mode.addEventListener('change', () => {
            numbersSettings.style.display = mode.value === 'numbers' ? 'block' : 'none';
            customSettings.style.display = mode.value === 'custom' ? 'block' : 'none';
        });

        document.getElementById('generate').addEventListener('click', () => {
            let list = [];
            if (mode.value === 'numbers') {
                const min = parseInt(document.getElementById('min').value);
                const max = parseInt(document.getElementById('max').value);
                for (let i = min; i <= max; i++) list.push(i);
            } else {
                list = document.getElementById('items').value.split('\n').filter(i => i.trim() !== '');
            }

            const qty = parseInt(document.getElementById('quantity').value);
            const shuffled = list.sort(() => 0.5 - Math.random());
            const result = shuffled.slice(0, qty).join(', ');
            document.getElementById('result').textContent = result;
        });

        document.getElementById('copy').addEventListener('click', () => {
            navigator.clipboard.writeText(document.getElementById('result').textContent);
            alert('Copied!');
        });
    </script>
</body>
</html>
