<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Sequence Generator | Online Tools</title>
    <meta name="description" content="Generate a random sequence of unique numbers or items. Input your custom list or range, pick a count, and generate non-repeating sequences instantly.">
    <meta property="og:title" content="Random Sequence Generator | Online Tools">
    <meta property="og:description" content="Generate random, unique sequences from your input data. 100% client-side.">
    <meta property="og:url" content="https://online-tools.click/random_sequence_generator/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://online-tools.click/og-image.png">
    <link rel="canonical" href="https://online-tools.click/random_sequence_generator/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.2);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        
        header { padding: 32px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 20px; font-weight: 700; text-decoration: none; color: var(--text); }
        .logo-sep { color: var(--text-muted); font-weight: 300; }
        .logo-sub { font-size: 20px; font-weight: 400; color: var(--text-secondary); }
        .header-right a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); transition: all 0.2s; }
        .header-right a:hover { color: var(--text); border-color: var(--border-focus); }

        main { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 48px; }
        .hero h1 { font-size: 48px; font-weight: 700; margin-bottom: 12px; }
        .hero p { color: var(--text-secondary); font-size: 18px; }

        .result-container { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; margin-bottom: 40px; }
        .main-result { display: flex; align-items: center; gap: 16px; }
        .display-area { flex: 1; font-family: var(--font-mono); font-size: 18px; color: var(--text); background: var(--bg-input); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border); min-height: 120px; word-break: break-all; cursor: pointer;}
        
        .btn-generate { background: var(--accent); color: white; border: none; border-radius: var(--radius-md); width: 64px; height: 120px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-generate:hover { background: #1d4ed8; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; }
        .setting-group { display: flex; flex-direction: column; gap: 16px; }
        .setting-label { font-size: 14px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
        textarea, input[type="number"] { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-family: var(--font-sans); }
        textarea { height: 150px; resize: vertical; }

        .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--bg-elevated); border: 1px solid var(--border); padding: 10px 20px; border-radius: var(--radius-sm); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100;}
        .toast.visible { opacity: 1; }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="https://online-tools.click" class="logo">Online Tools</a><span class="logo-sep"> / </span><span class="logo-sub">Random Sequence Generator</span>
        </div>
        <div class="header-right">
            <a href="https://online-tools.click">All Tools</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Random Sequence Generator</h1>
            <p>Generate non-repeating random sequences from your input data.</p>
        </section>

        <div class="result-container">
            <div class="main-result">
                <div class="display-area" id="result-display" title="Click to copy">Result will appear here...</div>
                <button class="btn-generate" id="generate-btn" title="Generate">Gen</button>
            </div>
        </div>

        <div class="settings-grid">
            <div class="setting-group">
                <label class="setting-label">Input Items (Comma or newline separated)</label>
                <textarea id="input-items" placeholder="Item 1, Item 2, Item 3"></textarea>
            </div>
            <div class="setting-group">
                <label class="setting-label">Items to Draw</label>
                <input type="number" id="draw-count" value="3" min="1">
                <div class="setting-label" style="margin-top: 10px;">Options</div>
                <label><input type="checkbox" id="shuffle-result" checked> Shuffle Result</label>
            </div>
        </div>
    </main>

    <div class="toast" id="toast">Copied to clipboard</div>

    <script>
        const inputItems = document.getElementById('input-items');
        const drawCount = document.getElementById('draw-count');
        const generateBtn = document.getElementById('generate-btn');
        const resultDisplay = document.getElementById('result-display');
        const toast = document.getElementById('toast');

        function secureRandom(max) {
            const array = new Uint32Array(1);
            window.crypto.getRandomValues(array);
            return array[0] % max;
        }

        generateBtn.addEventListener('click', () => {
            const items = inputItems.value.split(/[\n,]+/).map(i => i.trim()).filter(i => i !== '');
            const count = parseInt(drawCount.value);
            
            if (items.length === 0) {
                resultDisplay.textContent = 'Please enter some items.';
                return;
            }

            if (count > items.length) {
                resultDisplay.textContent = 'Draw count exceeds number of items.';
                return;
            }

            let shuffled = [...items];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = secureRandom(i + 1);
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            const result = shuffled.slice(0, count);
            resultDisplay.textContent = result.join(', ');
        });

        resultDisplay.addEventListener('click', () => {
            navigator.clipboard.writeText(resultDisplay.textContent);
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 1500);
        });
    </script>
</body>
</html>
