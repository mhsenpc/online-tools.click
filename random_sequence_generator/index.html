<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Sequence Generator | Online Tools</title>
    <meta name="description" content="Generate non-repeating random sequences of numbers or characters. Useful for unique identifiers or random draws. 100% client-side, private, and fast.">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --accent: #ff3e00;
            --radius-md: 12px;
            --font-sans: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; }
        header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 40px; margin-bottom: 10px; }
        .result-container { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 24px; margin-bottom: 24px; }
        .password-display { font-family: var(--font-mono); font-size: 16px; background: var(--bg-input); padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border); min-height: 200px; overflow-y: auto; color: var(--text-secondary); }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .setting-group { display: flex; flex-direction: column; gap: 10px; }
        .setting-label { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
        input, textarea { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; color: var(--text); font-family: var(--font-mono); outline: none; }
        .btn-generate { background: var(--accent); color: white; border: none; padding: 16px; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="https://online-tools.click" style="text-decoration: none; color: var(--text); font-weight: 700;">Online Tools</a>
            <span style="color: var(--text-muted)">Random Sequence Generator</span>
        </header>

        <section class="hero">
            <h1>Random Sequence Generator</h1>
            <p>Generate non-repeating random sequences.</p>
        </section>

        <div class="result-container">
            <textarea class="password-display" id="result-display" readonly placeholder="Generated sequence will appear here..."></textarea>
            <button class="btn-generate" id="generate-btn" style="width: 100%;">Generate Sequence</button>
        </div>

        <div class="settings-grid">
            <div class="setting-group">
                <label class="setting-label">Type</label>
                <select id="type-select" style="background: var(--bg-input); color: var(--text); padding: 12px; border-radius: var(--radius-md);">
                    <option value="numeric">Numeric Range</option>
                    <option value="chars">Custom Characters</option>
                </select>
            </div>
            <div class="setting-group" id="numeric-settings">
                <label class="setting-label">Range (Min - Max)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="min-val" value="1" style="flex: 1;">
                    <input type="number" id="max-val" value="100" style="flex: 1;">
                </div>
            </div>
            <div class="setting-group" id="char-settings" style="display: none;">
                <label class="setting-label">Characters</label>
                <input type="text" id="char-set" value="ABCDEFGHJKLMNPQRSTUVWXYZ">
            </div>
            <div class="setting-group">
                <label class="setting-label">Quantity</label>
                <input type="number" id="quantity" value="10">
            </div>
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generate-btn');
        const resultDisplay = document.getElementById('result-display');
        const typeSelect = document.getElementById('type-select');
        const numericSettings = document.getElementById('numeric-settings');
        const charSettings = document.getElementById('char-settings');

        typeSelect.addEventListener('change', () => {
            const isNumeric = typeSelect.value === 'numeric';
            numericSettings.style.display = isNumeric ? 'flex' : 'none';
            charSettings.style.display = isNumeric ? 'none' : 'flex';
        });

        generateBtn.addEventListener('click', () => {
            const qty = parseInt(document.getElementById('quantity').value);
            let result = [];
            
            if (typeSelect.value === 'numeric') {
                const min = parseInt(document.getElementById('min-val').value);
                const max = parseInt(document.getElementById('max-val').value);
                const range = Array.from({length: max - min + 1}, (_, i) => i + min);
                
                // Shuffle
                for (let i = range.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [range[i], range[j]] = [range[j], range[i]];
                }
                result = range.slice(0, Math.min(qty, range.length));
            } else {
                const chars = document.getElementById('char-set').value.split('');
                for (let i = 0; i < qty; i++) {
                    result.push(chars[Math.floor(Math.random() * chars.length)]);
                }
            }
            
            resultDisplay.value = result.join(', ');
        });
    </script>
</body>
</html>
