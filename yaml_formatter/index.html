<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAML Formatter & Beautifier</title>
    <!-- Dependencies: js-yaml for parsing/dumping, Monaco Editor for a rich editor experience -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --header-bg: #ffffff;
            --border-color: #e2e8f0;
            --primary-color: #3b82f6;
            --text-color: #1e293b;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--header-bg);
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        h1 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #64748b;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .btn-primary:hover {
            background-color: #2563eb;
            border-color: #2563eb;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1), 0 2px 4px -1px rgba(59, 130, 246, 0.06);
        }

        select {
            padding: 0.4rem 0.5rem;
            border-radius: 0.375rem;
            border: 1px solid var(--border-color);
            background: white;
            font-size: 0.875rem;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: var(--primary-color);
            ring: 2px solid rgba(59, 130, 246, 0.1);
        }

        main {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding: 1rem;
            gap: 1rem;
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .editor-header {
            padding: 0.6rem 1rem;
            background: #f8fafc;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #input-editor, #output-editor {
            flex: 1;
        }

        .error-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #fff1f2;
            color: var(--error-color);
            padding: 0.75rem 1.25rem;
            font-size: 0.875rem;
            border-top: 1px solid #fecaca;
            display: none;
            z-index: 10;
            animation: slideUp 0.3s ease-out;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            max-height: 100px;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .status-badge {
            font-size: 0.65rem;
            padding: 0.1rem 0.4rem;
            border-radius: 1rem;
            background: #e2e8f0;
            color: #475569;
        }

        /* Monaco overrides */
        .monaco-editor {
            padding-top: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color)">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            YAML Formatter
        </h1>
        <div class="controls">
            <div class="control-group">
                <label for="indent-size">Indentation</label>
                <select id="indent-size">
                    <option value="2">2 Spaces</option>
                    <option value="4">4 Spaces</option>
                </select>
            </div>
            <button class="btn btn-primary" id="format-btn">Format & Beautify</button>
            <button class="btn" id="copy-btn">Copy Result</button>
            <button class="btn" id="clear-btn">Clear</button>
        </div>
    </header>

    <main>
        <div class="editor-container">
            <div class="editor-header">
                Input
                <span class="status-badge">YAML / JSON</span>
            </div>
            <div id="input-editor"></div>
        </div>
        <div class="editor-container">
            <div class="editor-header">
                Beautified Output
                <span id="output-status" class="status-badge" style="display:none">Formatted</span>
            </div>
            <div id="output-editor"></div>
            <div id="error-message" class="error-overlay"></div>
        </div>
    </main>

    <script>
        // Load Monaco Editor
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

        let inputEditor, outputEditor;

        const defaultContent = `
# Welcome to YAML Formatter
project:
  name: online-tools
  version: 1.0.0
  description: A collection of client-side web tools
  tags: [devops, utility, web]
  authors:
    - name: Jon
      role: Devops Engineer
  active: true
  features:
  - syntax-highlighting
  - error-detection
  - adjustable-indentation
`.trim();

        require(['vs/editor/editor.main'], function () {
            // Configure Monaco
            monaco.languages.json.jsonDefaults.setDiagnosticsOptions({
                validate: true,
                allowComments: true
            });

            inputEditor = monaco.editor.create(document.getElementById('input-editor'), {
                value: defaultContent,
                language: 'yaml',
                theme: 'vs-light',
                automaticLayout: true,
                fontSize: 13,
                lineNumbers: 'on',
                scrollBeyondLastLine: false,
                minimap: { enabled: false },
                padding: { top: 10 }
            });

            outputEditor = monaco.editor.create(document.getElementById('output-editor'), {
                value: '',
                language: 'yaml',
                theme: 'vs-light',
                readOnly: true,
                automaticLayout: true,
                fontSize: 13,
                lineNumbers: 'on',
                scrollBeyondLastLine: false,
                minimap: { enabled: false },
                padding: { top: 10 }
            });

            // Event Listeners
            document.getElementById('format-btn').addEventListener('click', formatYaml);
            document.getElementById('copy-btn').addEventListener('click', copyOutput);
            document.getElementById('clear-btn').addEventListener('click', () => {
                inputEditor.setValue('');
                outputEditor.setValue('');
                document.getElementById('error-message').style.display = 'none';
                document.getElementById('output-status').style.display = 'none';
            });

            // Initial format
            formatYaml();
        });

        function formatYaml() {
            const input = inputEditor.getValue().trim();
            const indent = parseInt(document.getElementById('indent-size').value);
            const errorOverlay = document.getElementById('error-message');
            const outputStatus = document.getElementById('output-status');

            if (!input) {
                outputEditor.setValue('');
                errorOverlay.style.display = 'none';
                outputStatus.style.display = 'none';
                return;
            }

            try {
                // Parse input (supports YAML and JSON)
                const parsed = jsyaml.load(input);
                
                // If it's just a string or null (and not an object), we might still want to dump it
                // but usually null input should result in empty output.
                if (parsed === null || parsed === undefined) {
                    outputEditor.setValue('');
                    return;
                }

                const formatted = jsyaml.dump(parsed, {
                    indent: indent,
                    lineWidth: -1,
                    noRefs: true,
                    quotingType: '"'
                });

                outputEditor.setValue(formatted);
                errorOverlay.style.display = 'none';
                outputStatus.style.display = 'inline-block';
                outputStatus.innerText = 'Formatted';
                outputStatus.style.background = '#dcfce7';
                outputStatus.style.color = '#166534';
            } catch (e) {
                errorOverlay.innerText = \`Parsing Error: \${e.message}\`;
                errorOverlay.style.display = 'block';
                outputStatus.style.display = 'inline-block';
                outputStatus.innerText = 'Error';
                outputStatus.style.background = '#fee2e2';
                outputStatus.style.color = '#991b1b';
            }
        }

        async function copyOutput() {
            const content = outputEditor.getValue();
            if (content) {
                try {
                    await navigator.clipboard.writeText(content);
                    const btn = document.getElementById('copy-btn');
                    const originalText = btn.innerText;
                    btn.innerText = 'Copied!';
                    btn.style.color = 'var(--success-color)';
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.style.color = '';
                    }, 2000);
                } catch (err) {
                    console.error('Failed to copy: ', err);
                }
            }
        }
    </script>
</body>
</html>
