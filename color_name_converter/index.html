    <meta name="description" content="Free, fast, and secure online color name converter. Convert CSS color names to Hex and RGB formats instantly with auto-suggest and visual swatch.">

            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],

    <style>
        :root {
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
        }
        .dark {
            --bg-card: #111827;
            --text-main: #f9fafb;
        }

        body { transition: background-color 0.2s, color 0.2s; }

        .color-swatch {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .color-swatch:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            dark:bg-gray-800;
            border: 1px solid #e5e7eb;
            dark:border-gray-700;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-height: 200px;
            overflow-y: auto;
            z-index: 50;
            display: none;
        }

        .suggestions-dropdown.show {
            display: block;
        }

        .suggestion-item {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.15s;
        }

        .suggestion-item:hover {
            background-color: #f3f4f6;
        }

        .dark .suggestion-item:hover {
            background-color: #374151;
        }

        .suggestion-color {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 1px solid #e5e7eb;
        }

        .copy-btn {
            transition: all 0.2s;
        }

        .copy-btn:hover {
            transform: translateY(-1px);
        }

        .copy-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans overflow-y-auto">

            <h1 class="text-4xl font-bold mb-2 tracking-tight">Color Name to Hex/RGB Converter</h1>

        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">

                    </div>

                    <!-- Quick Examples -->
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Quick Examples</label>
                        <div class="flex flex-wrap gap-2">
                            <button class="example-btn px-3 py-1 bg-gray-100 dark:bg-gray-800 rounded-lg text-xs hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" data-color="rebeccapurple">rebeccapurple</button>
                            <button class="example-btn px-3 py-1 bg-gray-100 dark:bg-gray-800 rounded-lg text-xs hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" data-color="steelblue">steelblue</button>

                    <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-4">Color Preview</h2>
                    <div class="flex items-center justify-center">

                    <!-- Hex Result -->
                    <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded-xl">
                        <div>
                            <div class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">Hex</div>
                            <div id="hex-result" class="font-mono text-sm font-medium">—</div>
                        </div>
                        <button id="copy-hex" class="copy-btn px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-lg transition-colors">
                            Copy

                    </div>

                    <!-- RGB Result -->
                    <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded-xl">
                        <div>
                            <div class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">RGB</div>
                            <div id="rgb-result" class="font-mono text-sm font-medium">—</div>
                        </div>
                        <button id="copy-rgb" class="copy-btn px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-lg transition-colors">
                            Copy
                        </button>
                    </div>
                </div>

                <!-- Error Message -->
                <div id="error-message" class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-4">
                    <div class="flex items-center gap-3">
                        <span class="text-red-500">⚠️</span>
                        <p id="error-text" class="text-sm text-red-600 dark:text-red-400"></p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="mt-16 text-center text-xs text-gray-400 dark:text-gray-600 border-t border-gray-200 dark:border-gray-800 pt-8 space-y-4">
            <p>🔒 100% Client-Side: Your content stays in the browser. No tracking or logging.</p>
            <div class="flex justify-center gap-4">
                <button onclick="document.documentElement.classList.toggle('dark')" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-tighter">Toggle Theme</button>
                <span>&bull;</span>
                <a href="https://online-tools.click" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-tighter">Utility Hub</a>
            </div>
        </footer>
    </div>

    <!-- Toast -->

        Copied!
    </div>

            'springgreen': '#00FF7F',

            'thistle': '#D8BFD8',
            'tomato': '#FF6347',
            'turquoise': '#40E0D0',
            'violet': '#EE82EE',
            'wheat': '#F5DEB3',
            'white': '#FFFFFF',
            'whitesmoke': '#F5F5F5',
            'yellow': '#FFFF00',
            'yellowgreen': '#9ACD32'
        };

        // DOM elements
        const colorInput = document.getElementById('color-input');
        const suggestions = document.getElementById('suggestions');
        const colorSwatch = document.getElementById('color-swatch');
        const hexResult = document.getElementById('hex-result');
        const rgbResult = document.getElementById('rgb-result');
        const copyHexBtn = document.getElementById('copy-hex');
        const copyRgbBtn = document.getElementById('copy-rgb');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const toast = document.getElementById('toast');
        const exampleButtons = document.querySelectorAll('.example-btn');

        // Convert hex to RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        // Show error message
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            colorSwatch.style.backgroundColor = '';
            hexResult.textContent = '—';
            rgbResult.textContent = '—';
        }

        // Hide error message
        function hideError() {
            errorMessage.classList.add('hidden');
        }

        // Update color display
        function updateColor(colorName) {
            if (!colorName) {
                hideError();
                colorSwatch.style.backgroundColor = '';
                hexResult.textContent = '—';
                rgbResult.textContent = '—';
                return;
            }

            const normalizedName = colorName.toLowerCase().trim();
            const hex = cssColors[normalizedName];

            if (!hex) {
                showError(`"${colorName}" is not a valid CSS color name. Try typing to see suggestions.`);
                return;
            }

            hideError();

            // Update swatch
            colorSwatch.style.backgroundColor = hex;

            // Update hex result
            hexResult.textContent = hex;

            // Update RGB result
            const rgb = hexToRgb(hex);
            rgbResult.textContent = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
        }

        // Show suggestions
        function showSuggestions(filter) {
            const normalizedFilter = filter.toLowerCase().trim();

            if (!normalizedFilter) {
                suggestions.classList.remove('show');
                return;
            }

            const matches = Object.keys(cssColors).filter(color =>
                color.startsWith(normalizedFilter)
            ).slice(0, 10); // Limit to 10 suggestions

            if (matches.length === 0) {
                suggestions.classList.remove('show');
                return;
            }

            suggestions.innerHTML = matches.map(color => `
                <div class="suggestion-item" data-color="${color}">
                    <div class="suggestion-color" style="background-color: ${cssColors[color]}"></div>
                    <span class="text-sm">${color}</span>
                </div>
            `).join('');

            suggestions.classList.add('show');

            // Add click handlers to suggestions
            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', () => {
                    const color = item.dataset.color;
                    colorInput.value = color;
                    suggestions.classList.remove('show');
                    updateColor(color);
                });
            });
        }

        // Event listeners
        colorInput.addEventListener('input', (e) => {
            const value = e.target.value;
            showSuggestions(value);

            if (value) {
                updateColor(value);
            } else {
                hideError();
                colorSwatch.style.backgroundColor = '';
                hexResult.textContent = '—';
                rgbResult.textContent = '—';
            }
        });

        // Hide suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.relative')) {
                suggestions.classList.remove('show');
            }
        });

        // Example buttons
        exampleButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const color = btn.dataset.color;
                colorInput.value = color;
                updateColor(color);
            });
        });

        // Copy buttons
        function showToast(message) {
            toast.textContent = message;
            toast.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-10'), 2000);
        }

        copyHexBtn.addEventListener('click', () => {
            const hex = hexResult.textContent;
            if (hex && hex !== '—') {
                navigator.clipboard.writeText(hex).then(() => {
                    showToast('Hex copied!');
                });
            }
        });

        copyRgbBtn.addEventListener('click', () => {
            const rgb = rgbResult.textContent;
            if (rgb && rgb !== '—') {
                navigator.clipboard.writeText(rgb).then(() => {
                    showToast('RGB copied!');
                });
            }
        });

        // Initialize with empty state
        colorInput.focus();
    </script>
