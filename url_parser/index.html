<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Parser | online-tools.click</title>
    <meta name="description" content="Decompose complex URLs and edit query parameters.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .output-box { @apply bg-gray-50 dark:bg-gray-800 p-4 rounded-xl font-mono text-sm break-all; min-height: 200px; }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider">online-tools.click</a>
            <h1 class="text-3xl font-bold mt-2">URL Parser & Query Editor</h1>
        </header>

        <div class="space-y-6">
            <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 border border-gray-200 dark:border-gray-800">
                <label class="font-bold text-xs text-gray-400 uppercase mb-2 block">URL</label>
                <input type="text" id="in-url" class="w-full font-mono text-sm outline-none bg-transparent" placeholder="https://example.com/path?query=1#hash">
            </div>
            
            <div id="components" class="grid grid-cols-2 gap-4 text-sm">
                <div class="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800">
                    <label class="font-bold text-xs text-gray-400 uppercase">Protocol</label>
                    <input type="text" id="out-protocol" class="font-mono w-full bg-transparent outline-none">
                </div>
                <div class="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800">
                    <label class="font-bold text-xs text-gray-400 uppercase">Host</label>
                    <input type="text" id="out-host" class="font-mono w-full bg-transparent outline-none">
                </div>
                <div class="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800">
                    <label class="font-bold text-xs text-gray-400 uppercase">Path</label>
                    <input type="text" id="out-path" class="font-mono w-full bg-transparent outline-none">
                </div>
                <div class="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800">
                    <label class="font-bold text-xs text-gray-400 uppercase">Hash</label>
                    <input type="text" id="out-hash" class="font-mono w-full bg-transparent outline-none">
                </div>
            </div>

            <div class="flex justify-between items-center">
                <h2 class="font-bold">Query Parameters</h2>
                <button id="add-param" class="text-xs bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700">+ Add</button>
            </div>
            <div id="params" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const inUrl = document.getElementById('in-url');
        const outProtocol = document.getElementById('out-protocol');
        const outHost = document.getElementById('out-host');
        const outPath = document.getElementById('out-path');
        const outHash = document.getElementById('out-hash');
        const paramsList = document.getElementById('params');
        const addParamBtn = document.getElementById('add-param');

        function parseUrl() {
            try {
                const url = new URL(inUrl.value);
                outProtocol.value = url.protocol.replace(':', '');
                outHost.value = url.host;
                outPath.value = url.pathname;
                outHash.value = url.hash.replace('#', '');

                paramsList.innerHTML = '';
                url.searchParams.forEach((value, key) => {
                    addParamRow(key, value);
                });
            } catch(e) {
                // Invalid URL
            }
        }

        function reconstructUrl() {
            try {
                const protocol = outProtocol.value || 'https';
                const host = outHost.value || 'example.com';
                const path = outPath.value || '/';
                const hash = outHash.value ? `#${outHash.value}` : '';
                
                const url = new URL(`${protocol}://${host}${path}${hash}`);
                
                Array.from(paramsList.children).forEach(row => {
                    const inputs = row.querySelectorAll('input');
                    if (inputs[0].value) {
                        url.searchParams.append(inputs[0].value, inputs[1].value);
                    }
                });
                
                inUrl.value = url.toString();
            } catch(e) {
                // Ignore reconstruction errors
            }
        }

        function addParamRow(key = '', value = '') {
            const row = document.createElement('div');
            row.className = 'flex gap-2';
            row.innerHTML = `<input value="${key}" class="w-1/2 p-2 rounded-xl bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 param-key">
                             <input value="${value}" class="w-1/2 p-2 rounded-xl bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 param-val">
                             <button class="remove-btn text-gray-400 hover:text-red-500">×</button>`;
            
            row.querySelector('.remove-btn').onclick = () => { row.remove(); reconstructUrl(); };
            row.querySelectorAll('input').forEach(input => input.oninput = reconstructUrl);
            
            paramsList.appendChild(row);
        }

        inUrl.oninput = parseUrl;
        [outProtocol, outHost, outPath, outHash].forEach(el => el.oninput = reconstructUrl);
        addParamBtn.onclick = () => addParamRow();
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GHGXLWQR4V"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-GHGXLWQR4V');
    </script>
</body>
</html>
