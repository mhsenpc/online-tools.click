    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --success: #22c55e;
            --error: #ef4444;
            --success-bg: rgba(34, 197, 94, 0.1);
            --error-bg: rgba(239, 68, 68, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
            --space-section: 112px;
            --space-group: 64px;
            --space-element: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            padding: 32px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;

        .logo-sep {

        .logo-sub {

        .header-right a {

        .header-right a:hover {

        main {
            max-width: 900px;

        .validator-container {

        .input-section {

        .section-title {

        textarea, input[type="text"], select {

        @media (max-width: 768px) {

        .jwt-part {

        .examples {

        .example-item {
            padding: 12px;

            border: 1px solid var(--border);
            border-radius: var(--radius-sm);

            color: var(--text-secondary);
        }

        .example-item:hover {
            border-color: var(--border-focus);
            color: var(--text);
        }

        .example-item:last-child {
            margin-bottom: 0;
        }
    </style>

<body>

    <script>
        // Algorithm descriptions
        const algorithmDescriptions = {
            'HS256': {
                title: 'About HS256',
                description: 'Symmetric algorithm using HMAC with SHA-256. Both signing and verification use the same secret key. Most common algorithm for JWTs.'
            },
            'HS384': {
                title: 'About HS384',
                description: 'Symmetric algorithm using HMAC with SHA-384. Similar to HS256 but with a stronger hash function. Requires a shared secret key.'
            },
            'HS512': {
                title: 'About HS512',
                description: 'Symmetric algorithm using HMAC with SHA-512. The strongest HMAC option. Requires a shared secret key.'
            },
            'RS256': {
                title: 'About RS256',
                description: 'Asymmetric algorithm using RSA with SHA-256. Uses a private key for signing and a public key for verification. More secure for distributed systems.'
            },
            'RS384': {
                title: 'About RS384',
                description: 'Asymmetric algorithm using RSA with SHA-384. Similar to RS256 but with a stronger hash function. Uses public/private key pairs.'
            },
            'RS512': {
                title: 'About RS512',
                description: 'Asymmetric algorithm using RSA with SHA-512. The strongest RSA option. Uses public/private key pairs for maximum security.'
            }
        };

        // Example JWTs
        const examples = {
            hs256: {
                jwt: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c',
                secret: 'your-256-bit-secret',
                algorithm: 'HS256'
            },
            expired: {
                jwt: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyLCJleHAiOjE1MTYyNDkwMjJ9.va1iK_ZY7eEgGbTCHpnBkFqzBMxEdYgmaP8bMY4kBEs',
                secret: 'your-256-bit-secret',
                algorithm: 'HS256'
            }
        };

        // DOM elements
        const jwtInput = document.getElementById('jwt-input');
        const secretInput = document.getElementById('secret-input');
        const algorithmSelect = document.getElementById('algorithm');
        const algorithmInfo = document.getElementById('algorithm-info');
        const verifyBtn = document.getElementById('verify-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultSection = document.getElementById('result-section');
        const resultIcon = document.getElementById('result-icon');
        const resultTitle = document.getElementById('result-title');
        const resultDetails = document.getElementById('result-details');
        const jwtParts = document.getElementById('jwt-parts');
        const exampleItems = document.querySelectorAll('.example-item');

        // Base64 URL decode
        function base64UrlDecode(str) {
            str = str.replace(/-/g, '+').replace(/_/g, '/');
            while (str.length % 4) {
                str += '=';
            }
            return atob(str);
        }

        // Convert string to array buffer
        function stringToArrayBuffer(str) {
            const buffer = new ArrayBuffer(str.length);
            const view = new Uint8Array(buffer);
            for (let i = 0; i < str.length; i++) {
                view[i] = str.charCodeAt(i);
            }
            return buffer;
        }

        // Convert array buffer to hex string
        function arrayBufferToHex(buffer) {
            return Array.from(new Uint8Array(buffer))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        // HMAC implementation using Web Crypto API
        async function hmacSha256(message, secret) {
            const encoder = new TextEncoder();
            const keyData = encoder.encode(secret);
            const messageData = encoder.encode(message);

            const cryptoKey = await crypto.subtle.importKey(
                'raw',
                keyData,
                { name: 'HMAC', hash: 'SHA-256' },
                false,
                ['sign']
            );

            const signature = await crypto.subtle.sign('HMAC', cryptoKey, messageData);
            return arrayBufferToHex(signature);
        }

        // HMAC with SHA-384
        async function hmacSha384(message, secret) {
            const encoder = new TextEncoder();
            const keyData = encoder.encode(secret);
            const messageData = encoder.encode(message);

            const cryptoKey = await crypto.subtle.importKey(
                'raw',
                keyData,
                { name: 'HMAC', hash: 'SHA-384' },
                false,
                ['sign']
            );

            const signature = await crypto.subtle.sign('HMAC', cryptoKey, messageData);
            return arrayBufferToHex(signature);
        }

        // HMAC with SHA-512
        async function hmacSha512(message, secret) {
            const encoder = new TextEncoder();
            const keyData = encoder.encode(secret);
            const messageData = encoder.encode(message);

            const cryptoKey = await crypto.subtle.importKey(
                'raw',
                keyData,
                { name: 'HMAC', hash: 'SHA-512' },
                false,
                ['sign']
            );

            const signature = await crypto.subtle.sign('HMAC', cryptoKey, messageData);
            return arrayBufferToHex(signature);
        }

        // Verify HMAC signature
        async function verifyHMAC(jwt, secret, algorithm) {
            const parts = jwt.split('.');
            if (parts.length !== 3) {
                throw new Error('Invalid JWT format');
            }

            const [header, payload, signature] = parts;
            const data = `${header}.${payload}`;

            let computedSignature;
            switch (algorithm) {
                case 'HS256':
                    computedSignature = await hmacSha256(data, secret);
                    break;
                case 'HS384':
                    computedSignature = await hmacSha384(data, secret);
                    break;
                case 'HS512':
                    computedSignature = await hmacSha512(data, secret);
                    break;
                default:
                    throw new Error('Unsupported algorithm');
            }

            // Convert hex to base64url
            const computedSigBase64 = btoa(
                String.fromCharCode(...new Uint8Array(
                    computedSignature.match(/.{1,2}/g).map(byte => parseInt(byte, 16))
                ))
            ).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');

            return computedSigBase64 === signature;
        }

        // Verify RSA signature
        async function verifyRSA(jwt, publicKey, algorithm) {
            const parts = jwt.split('.');
            if (parts.length !== 3) {
                throw new Error('Invalid JWT format');
            }

            const [header, payload, signature] = parts;
            const data = `${header}.${payload}`;

            try {
                // Convert base64url signature to binary
                const signatureBinary = Uint8Array.from(
                    atob(signature.replace(/-/g, '+').replace(/_/g, '/') + '=='.slice(0, (4 * signature.length) % 4)),
                    c => c.charCodeAt(0)
                );

                // Import public key
                const cryptoKey = await crypto.subtle.importKey(
                    'spki',
                    stringToArrayBuffer(atob(publicKey)),
                    { name: 'RSASSA-PKCS1-v1_5', hash: { name: `SHA-${algorithm.slice(-3)}` } },
                    false,
                    ['verify']
                );

                const isValid = await crypto.subtle.verify(
                    'RSASSA-PKCS1-v1_5',
                    cryptoKey,
                    signatureBinary,
                    new TextEncoder().encode(data)
                );

                return isValid;
            } catch (error) {
                throw new Error('Invalid RSA key or signature');
            }
        }

        // Parse JWT
        function parseJWT(jwt) {
            const parts = jwt.split('.');
            if (parts.length !== 3) {
                throw new Error('Invalid JWT format');
            }

            const [header, payload, signature] = parts;

            let headerObj, payloadObj;
            try {
                headerObj = JSON.parse(base64UrlDecode(header));
                payloadObj = JSON.parse(base64UrlDecode(payload));
            } catch (e) {
                throw new Error('Invalid JWT structure');
            }

            return { header, payload, signature, headerObj, payloadObj };
        }

        // Verify JWT
        async function verifyJWT() {
            const jwt = jwtInput.value.trim();
            const secret = secretInput.value.trim();
            const algorithm = algorithmSelect.value;

            if (!jwt) {
                showError('Please enter a JWT token');
                return;
            }

            if (!secret) {
                showError('Please enter the secret key or public key');
                return;
            }

            try {
                const parsed = parseJWT(jwt);
                let isValid = false;

                if (algorithm.startsWith('HS')) {
                    isValid = await verifyHMAC(jwt, secret, algorithm);
                } else if (algorithm.startsWith('RS')) {
                    isValid = await verifyRSA(jwt, secret, algorithm);
                } else {
                    throw new Error('Unsupported algorithm');
                }

                displayResult(isValid, parsed, algorithm);
            } catch (error) {
                showError(error.message);
            }
        }

        // Display result
        function displayResult(isValid, parsed, algorithm) {
            resultSection.classList.remove('valid', 'invalid');
            resultSection.classList.add('show');
            resultSection.classList.add(isValid ? 'valid' : 'invalid');

            resultIcon.innerHTML = isValid
                ? '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>'
                : '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>';

            resultTitle.textContent = isValid ? 'Valid Signature' : 'Invalid Signature';

            // Check expiration
            const now = Math.floor(Date.now() / 1000);
            const isExpired = parsed.payloadObj.exp && parsed.payloadObj.exp < now;

            resultDetails.innerHTML = `
                <div class="detail-item">
                    <span class="detail-label">Algorithm</span>
                    <span class="detail-value">${parsed.headerObj.alg}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Token Type</span>
                    <span class="detail-value">${parsed.headerObj.typ}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Subject</span>
                    <span class="detail-value">${parsed.payloadObj.sub || 'N/A'}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Issuer</span>
                    <span class="detail-value">${parsed.payloadObj.iss || 'N/A'}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Issued At</span>
                    <span class="detail-value">${parsed.payloadObj.iat ? new Date(parsed.payloadObj.iat * 1000).toLocaleString() : 'N/A'}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Expiration</span>
                    <span class="detail-value">${parsed.payloadObj.exp ? new Date(parsed.payloadObj.exp * 1000).toLocaleString() : 'N/A'}</span>
                </div>
                ${isExpired ? '<div class="detail-item"><span class="detail-label" style="color: var(--error);">⚠️ Token Expired</span></div>' : ''}
            `;

            jwtParts.innerHTML = `
                <div class="jwt-part">
                    <div class="jwt-part-title">Header</div>
                    <div class="jwt-part-content">${parsed.header}</div>
                </div>
                <div class="jwt-part">
                    <div class="jwt-part-title">Payload</div>
                    <div class="jwt-part-content">${parsed.payload}</div>
                </div>
                <div class="jwt-part">
                    <div class="jwt-part-title">Signature</div>
                    <div class="jwt-part-content">${parsed.signature}</div>
                </div>
            `;
        }

        // Show error
        function showError(message) {
            resultSection.classList.remove('valid', 'invalid');
            resultSection.classList.add('show', 'invalid');
            resultIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>';
            resultTitle.textContent = 'Error';
            resultDetails.innerHTML = `<div class="detail-item"><span class="detail-label">Error Message</span><span class="detail-value">${message}</span></div>`;
            jwtParts.innerHTML = '';
        }

        // Clear form
        function clearForm() {
            jwtInput.value = '';
            secretInput.value = '';
            resultSection.classList.remove('show', 'valid', 'invalid');
        }

        // Update algorithm info
        function updateAlgorithmInfo() {
            const algorithm = algorithmSelect.value;
            const info = algorithmDescriptions[algorithm];
            algorithmInfo.innerHTML = `
                <div class="algorithm-info-title">${info.title}</div>
                <div class="algorithm-info-text">${info.description}</div>
            `;

            // Update label based on algorithm
            const label = document.querySelector('label[for="secret-input"]');
            if (algorithm.startsWith('HS')) {
                label.textContent = 'Secret Key';
                secretInput.placeholder = 'your-secret-key';
            } else if (algorithm.startsWith('RS')) {
                label.textContent = 'Public Key (PEM format)';
                secretInput.placeholder = '-----BEGIN PUBLIC KEY-----\n...\n-----END PUBLIC KEY-----';
            }
        }

        // Event listeners
        verifyBtn.addEventListener('click', verifyJWT);
        clearBtn.addEventListener('click', clearForm);
        algorithmSelect.addEventListener('change', updateAlgorithmInfo);

        // Example clicks
        exampleItems.forEach(item => {
            item.addEventListener('click', () => {
                const exampleKey = item.dataset.example;
                const example = examples[exampleKey];
                if (example) {
                    jwtInput.value = example.jwt;
                    secretInput.value = example.secret;
                    algorithmSelect.value = example.algorithm;
                    updateAlgorithmInfo();
                    verifyBtn.click();
                }
            });
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                verifyBtn.click();
            }
        });

        // Initialize
        updateAlgorithmInfo();
    </script>
</body>
</html>
