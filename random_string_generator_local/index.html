<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random String Generator | Online Tools</title>
    <meta name="description" content="Simple tool to generate random strings based on customizable character sets. Client-side, 100% private.">
    <meta property="og:title" content="Random String Generator | Online Tools">
    <meta property="og:description" content="Simple tool to generate random strings based on customizable character sets. Client-side, 100% private.">
    <meta property="og:url" content="https://online-tools.click/random_string_generator_local/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://online-tools.click/og-image.png">
    <link rel="canonical" href="https://online-tools.click/random_string_generator_local/">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --bg-input: #141414;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(255, 255, 255, 0.4);
            --accent: #22c55e;
            --radius-sm: 8px;
            --radius-md: 12px;
            --font-sans: 'Space Grotesk', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 20px; }
        header { max-width: 800px; margin: 0 auto 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 700; color: var(--text); text-decoration: none; }
        main { max-width: 800px; margin: 0 auto; }
        .container { background: var(--bg-elevated); padding: 32px; border-radius: var(--radius-md); border: 1px solid var(--border); }
        .input-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px; }
        input[type="number"], select { width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); }
        .result-box { background: var(--bg-input); padding: 20px; border-radius: var(--radius-sm); font-family: var(--font-mono); font-size: 18px; word-break: break-all; margin-bottom: 20px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        button { padding: 12px 24px; background: var(--accent); color: #000; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #22c55e; color: #000; padding: 10px 20px; border-radius: var(--radius-sm); display: none; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">Online Tools / Random String Generator</a>
        <a href="/" style="color: var(--text-secondary);">All Tools</a>
    </header>
    <main>
        <div class="container">
            <div class="input-group">
                <label>Length</label>
                <input type="number" id="length" value="16" min="1" max="1024">
            </div>
            <div class="controls">
                <div class="input-group">
                    <label>Character Set</label>
                    <select id="charset">
                        <option value="alphanumeric">Alphanumeric (A-Z, a-z, 0-9)</option>
                        <option value="alphabetic">Alphabetic (A-Z, a-z)</option>
                        <option value="numeric">Numeric (0-9)</option>
                        <option value="hex">Hexadecimal (0-9, a-f)</option>
                    </select>
                </div>
            </div>
            <div class="result-box" id="result">---</div>
            <button id="generate">Generate String</button>
        </div>
        <div class="toast" id="toast">Copied to clipboard!</div>
    </main>
    <script>
        const generate = document.getElementById('generate');
        const result = document.getElementById('result');
        const lengthInput = document.getElementById('length');
        const charsetInput = document.getElementById('charset');
        const toast = document.getElementById('toast');

        function generateString() {
            const length = parseInt(lengthInput.value);
            const type = charsetInput.value;
            let charset = '';
            if (type === 'alphanumeric') charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            else if (type === 'alphabetic') charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
            else if (type === 'numeric') charset = '0123456789';
            else if (type === 'hex') charset = '0123456789abcdef';
            
            let str = '';
            const values = new Uint32Array(length);
            window.crypto.getRandomValues(values);
            for (let i = 0; i < length; i++) {
                str += charset[values[i] % charset.length];
            }
            result.textContent = str;
        }

        generate.addEventListener('click', generateString);
        generateString();
        result.addEventListener('click', () => {
            navigator.clipboard.writeText(result.textContent);
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        });
    </script>
</body>
</html>
