<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Formatter / Minifier | online-tools.click</title>
    <meta name="description" content="Format or minify SQL queries instantly.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .output-box { @apply bg-gray-50 dark:bg-gray-800 p-4 rounded-xl font-mono text-sm break-all; min-height: 200px; }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <a href="https://online-tools.click" class="text-blue-600 dark:text-blue-400 font-bold text-sm uppercase tracking-wider">online-tools.click</a>
            <h1 class="text-3xl font-bold mt-2">SQL Formatter</h1>
        </header>

        <div class="space-y-6">
            <textarea id="in-sql" class="w-full h-64 bg-white dark:bg-gray-900 rounded-2xl p-4 font-mono text-sm outline-none border border-gray-200 dark:border-gray-800 focus:border-blue-500" placeholder="SELECT * FROM table..."></textarea>
            
            <div class="flex gap-4">
                <button id="btn-format" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">Format</button>
                <button id="btn-minify" class="flex-1 py-3 bg-gray-600 text-white rounded-xl font-bold hover:bg-gray-700">Minify</button>
            </div>

            <div class="output-box" id="output"></div>
        </div>
    </div>

    <script>
        const inSql = document.getElementById('in-sql');
        const output = document.getElementById('output');
        const btnFormat = document.getElementById('btn-format');
        const btnMinify = document.getElementById('btn-minify');

        btnFormat.onclick = () => {
            const sql = inSql.value;
            output.innerText = sql.replace(/\s+/g, ' ').replace(/,(?=[^\s])/g, ', ').replace(/FROM|WHERE|SELECT|JOIN|LEFT|RIGHT/gi, '\n$&').trim();
        };

        btnMinify.onclick = () => {
            const sql = inSql.value;
            output.innerText = sql.replace(/\s+/g, ' ').trim();
        };
    </script>
</body>
</html>
